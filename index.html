<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>沙畫遊戲 · Peel. Pour. Paint.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── 深灰沉穩（預設）────────────────────────────── */
  :root {
    --bodyBg: #26282c;
    --frameBg: #383b40;
    --onFrame: #ece9e3;
    --muted: #a9a59d;
    --accent: #e0a36e;
    --wellRim: #2c2e32;
    --lineTrack: rgba(255,255,255,.16);
    --chipRing: #383b40;
    --btnBg: rgba(255,255,255,.07);
    --btnBd: rgba(255,255,255,.15);
    --ovl: rgba(28,30,34,.86);
    --card: #43464c;
    --bd: rgba(255,255,255,.12);
    --bd-strong: rgba(255,255,255,.28);
    /* 圓角／凹陷設定（沿用深灰版）*/
    --deviceRadius: 30px;
    --wellRadius: 18px;
    --stageRadius: 13px;
    --rimPad: 7px;
    --font-round: "SF Pro Rounded", ui-rounded, "Hiragino Maru Gothic ProN", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    --font-serif: "Noto Serif TC", "Songti TC", "Source Han Serif TC", serif;
  }
  /* ── 淨白簡約 ────────────────────────────── */
  html.light {
    --bodyBg: #e4ddcc;
    --frameBg: #efe9dd;
    --onFrame: #4a443a;
    --muted: #948c7e;
    --accent: #cf7a4c;
    --wellRim: #e2dac8;
    --lineTrack: rgba(80,72,60,.18);
    --chipRing: #efe9dd;
    --btnBg: rgba(0,0,0,.05);
    --btnBd: rgba(80,72,60,.18);
    --ovl: rgba(239,233,221,.86);
    --card: #fbf6ea;
    --bd: rgba(80,72,60,.16);
    --bd-strong: rgba(80,72,60,.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }  /* 連點不選字、不跳複製/剪下/貼上選單 */
  html, body {
    height: 100%;
    background: var(--bodyBg);
    color: var(--onFrame);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Segoe UI", system-ui, sans-serif;
    overflow: hidden; overscroll-behavior: none; touch-action: none;
  }
  #app {
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top, 8px) 10px env(safe-area-inset-bottom, 8px);
  }

  /* 機身外框 */
  .device {
    width: min(94vw, 88vh, 680px);   /* 放大到貼近 iPad 遊玩尺寸（同時受高度限制，橫放不溢出）*/
    color: var(--onFrame);
    display: flex; flex-direction: column; gap: 13px;
    position: relative;
  }
  .topbar { display: flex; align-items: center; gap: 10px; padding: 0 2px; }
  .topbar .title { font-family: var(--font-round); font-size: 16px; font-weight: 600; letter-spacing: 3px; margin-left: auto; }
  .pillBtn {
    font-family: inherit; font-size: 12px; font-weight: 500; white-space: nowrap;
    padding: 7px 13px; border-radius: 20px; background: var(--btnBg); color: var(--onFrame);
    border: 1px solid var(--btnBd); cursor: pointer; transition: transform .08s ease;
  }
  .iconBtn {
    width: 34px; height: 34px; border-radius: 50%; padding: 0; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
    background: var(--btnBg); color: var(--onFrame); border: 1px solid var(--btnBd);
    cursor: pointer; transition: transform .08s ease;
  }
  .pillBtn:active, .iconBtn:active { transform: scale(.94); }

  /* 沙盤 + 側欄 */
  .playRow { display: flex; gap: 12px; align-items: stretch; }
  .sandwell {
    position: relative; flex: 1; aspect-ratio: 1/1; align-self: flex-start;
    border-radius: var(--wellRadius); padding: var(--rimPad); background: var(--wellRim);
    box-shadow: inset 0 2px 5px rgba(0,0,0,.22), inset 0 -1px 2px rgba(255,255,255,.22);
  }
  .sandwell::after {
    content: ""; position: absolute; inset: var(--rimPad); border-radius: var(--stageRadius);
    pointer-events: none; z-index: 4; box-shadow: inset 0 3px 7px -3px rgba(0,0,0,.28);
  }
  #stage {
    position: relative; width: 100%; height: 100%;
    border-radius: var(--stageRadius); overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
  }
  #stage > canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .rail { width: 84px; display: flex; flex-direction: column; align-items: center; }
  .rail #colorRow { display: grid; grid-template-columns: repeat(2, 34px); gap: 8px; justify-content: center; }
  .rail #colorTabs { display: flex; gap: 5px; margin-bottom: 9px; justify-content: center; }
  .grpTab { width: 24px; height: 24px; border-radius: 7px; padding: 0; font-size: 12px; font-weight: 600;
    background: var(--btnBg); color: var(--muted); border: 1px solid var(--btnBd); cursor: pointer; transition: transform .08s; }
  .grpTab:active { transform: scale(.9); }
  .grpTab.on { color: var(--onFrame); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .rail .tools { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding-top: 12px; }
  .swatch {
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer; flex: 0 0 auto;
    box-shadow: 0 2px 4px rgba(0,0,0,.28), inset 0 1px 2px rgba(255,255,255,.4), inset 0 -2px 3px rgba(0,0,0,.22);
    transition: transform .1s ease, box-shadow .15s ease;
  }
  .swatch:active { transform: scale(.88); }
  .swatch.sel {
    transform: scale(1.12);
    box-shadow: 0 0 0 2px var(--chipRing), 0 0 0 4px var(--accent), 0 3px 6px rgba(0,0,0,.3);
  }

  /* 底部細線進度 */
  .baseline { height: 3px; border-radius: 3px; background: var(--lineTrack); overflow: hidden; }
  .baseline > #progressBar { height: 100%; width: 0%; border-radius: 3px; background: var(--accent); transition: width .15s ease-out; }

  .hint { font-size: 11px; color: var(--muted); min-height: 15px; text-align: center; line-height: 1.5; }

  /* 遮罩：選圖案 / 完成 */
  .overlay {
    position: absolute; inset: 0; z-index: 5;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 13px; background: var(--ovl); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    text-align: center; padding: 18px;
  }
  .overlay.show { display: flex; }
  .overlay .big { font-family: var(--font-round); font-size: 16px; color: var(--onFrame); font-weight: 600; letter-spacing: .5px; white-space: nowrap; }
  .overlay .small { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .overlay button {
    font-family: inherit; font-size: 13px; font-weight: 500; color: var(--onFrame); white-space: nowrap;
    background: var(--btnBg); border: 1px solid var(--btnBd); padding: 9px 18px; border-radius: 12px; cursor: pointer;
  }
  .overlay button:active { transform: scale(.95); }
  .stepDot {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: 600;
    background: var(--accent); color: #fff; margin-right: 6px; vertical-align: -3px;
  }
  .pickRow { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
  .pickBtn {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-family: var(--font-round); font-size: 14px; font-weight: 600; color: var(--onFrame);
    background: var(--card); border: 1px solid var(--bd);
    border-radius: 16px; padding: 14px 14px 11px; cursor: pointer;
    transition: transform .12s ease, border-color .15s, box-shadow .15s;
    box-shadow: 0 6px 16px -8px rgba(0,0,0,.5);
  }
  .pickBtn:hover { border-color: var(--bd-strong); }
  .pickBtn:active { transform: scale(.93); }
  .pickBtn canvas { width: 84px; height: 84px; display: block; border-radius: 11px; }

  /* 顆粒造型切換 */
  .grainPick { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .grainLabel { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .grainToggle { display: flex; gap: 10px; }
  .grainOpt {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    font-family: var(--font-round); font-size: 11px; font-weight: 600; color: var(--muted);
    background: var(--card); border: 1px solid var(--bd); border-radius: 13px;
    padding: 9px 14px 7px; cursor: pointer; transition: transform .1s ease, border-color .15s, color .15s;
  }
  .grainOpt svg { width: 30px; height: 30px; display: block; }
  .grainOpt svg polygon, .grainOpt svg rect {
    fill: color-mix(in srgb, var(--accent) 26%, transparent);
    stroke: var(--accent); stroke-width: 2; stroke-linejoin: round;
  }
  .grainOpt:active { transform: scale(.94); }
  .grainOpt.sel { color: var(--onFrame); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  /* 選圖案時隱藏遊戲 UI，避免和選單重疊 */
  #app.picking .gameUi { display: none; }

  /* 完成提示：上方小膠囊，不蓋住作品 */
  #winBanner {
    position: absolute; top: 12px; left: 50%;
    transform: translate(-50%, -20px);
    background: var(--frameBg); color: var(--accent);
    border: 1px solid var(--bd-strong);
    padding: 9px 16px; border-radius: 22px; font-size: 11.5px; font-weight: 500;
    box-shadow: 0 6px 18px -6px rgba(0,0,0,.5);
    opacity: 0; transition: opacity .45s ease, transform .45s ease;
    pointer-events: none; z-index: 6; max-width: 92%; text-align: center;
  }
  #winBanner.show { opacity: 1; transform: translate(-50%, 0); }

  /* ── 選圖：畫廊 + 單張聚焦（全螢幕）── */
  .screen-ov {
    position: fixed; inset: 0; z-index: 20; display: none;
    flex-direction: column; background: var(--bodyBg); color: var(--onFrame);
    font-family: var(--font-round);
  }
  .screen-ov.show { display: flex; }
  .ovTop { display: flex; align-items: center; gap: 10px; padding: calc(env(safe-area-inset-top,10px) + 12px) 22px 6px; }
  .ovTop .ovTitle { font-size: 16px; font-weight: 600; letter-spacing: 3px; margin-right: auto; }
  .ovUpd { font-size: 11px; color: var(--muted); letter-spacing: .5px; white-space: nowrap; opacity: .95; }

  .galScroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px 22px calc(env(safe-area-inset-bottom,16px) + 28px); }
  .galHead { padding: 14px 2px 18px; }
  .galHead .over { font-size: 10px; letter-spacing: 4px; color: var(--accent); font-weight: 600; }
  .galHead h2 { font-size: 25px; font-weight: 650; margin: 9px 0 5px; letter-spacing: 1px; }
  .galHead .s { font-size: 11px; color: var(--muted); letter-spacing: 2px; }

  .heroRandom { width: 100%; display: flex; align-items: center; gap: 14px; text-align: left; cursor: pointer;
    padding: 15px 16px; border-radius: 18px; margin-bottom: 18px; font-family: inherit; color: var(--onFrame);
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, transparent), color-mix(in srgb, var(--accent) 7%, transparent));
    border: 1px solid color-mix(in srgb, var(--accent) 38%, transparent); transition: transform .1s ease; }
  .heroRandom:active { transform: scale(.99); }
  .heroRandom .t { font-size: 15px; font-weight: 650; letter-spacing: .5px; }
  .heroRandom .d { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .heroRandom .sh { margin-left: auto; width: 48px; height: 48px; border-radius: 50%; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; background: var(--accent); color: #20242a; }

  .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { font-family: inherit; font-size: 12px; padding: 7px 14px; border-radius: 16px; white-space: nowrap; cursor: pointer;
    color: var(--muted); background: transparent; border: 1px solid var(--bd); }
  .chip.on { color: #2a2017; background: var(--accent); border-color: var(--accent); font-weight: 600; }

  .galGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 14px; }
  @media (min-width: 640px) { .galGrid { grid-template-columns: 1fr 1fr 1fr; } }
  .galCard { background: var(--btnBg); border: 1px solid var(--bd); border-radius: 16px; padding: 8px 8px 12px; cursor: pointer;
    font-family: inherit; text-align: left; color: var(--onFrame); transition: transform .12s ease, border-color .15s; }
  .galCard:active { transform: scale(.96); }
  .galCard:hover { border-color: var(--bd-strong); }
  .galCard canvas { width: 100%; height: auto; display: block; border-radius: 12px; box-shadow: inset 0 2px 6px -2px rgba(0,0,0,.26); }
  .gcName { font-size: 13.5px; font-weight: 600; margin-top: 9px; padding-left: 2px; }
  .gcTag { font-size: 9.5px; color: var(--muted); padding-left: 2px; letter-spacing: 1px; margin-top: 1px; }

  /* 單張聚焦 */
  .focTop { display: flex; align-items: center; justify-content: space-between; padding: calc(env(safe-area-inset-top,10px) + 14px) 22px 0; }
  .ovGhost { font-family: inherit; font-size: 13px; color: var(--muted); background: none; border: none; cursor: pointer; }
  .ovChip { font-family: inherit; font-size: 12px; color: var(--accent); cursor: pointer;
    background: none; border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); padding: 7px 13px; border-radius: 16px; }
  .focStage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    padding: 16px 26px calc(env(safe-area-inset-bottom,16px) + 24px); }
  .focBig canvas { width: min(74vw, 300px); height: min(74vw, 300px); border-radius: 22px;
    box-shadow: 0 24px 48px -18px rgba(0,0,0,.55), inset 0 2px 8px -3px rgba(0,0,0,.28); }
  .focCap { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .focNav { width: 42px; height: 42px; border-radius: 50%; cursor: pointer; flex: 0 0 auto;
    background: var(--btnBg); border: 1px solid var(--btnBd); color: var(--onFrame); font-size: 18px;
    display: flex; align-items: center; justify-content: center; }
  .focCapMid { text-align: center; min-width: 116px; }
  .focCapMid .nm { font-size: 24px; font-weight: 650; letter-spacing: 2px; }
  .focCapMid .tg { font-size: 11px; color: var(--accent); letter-spacing: 3px; margin-top: 4px; }
  .focGrain { display: flex; align-items: center; gap: 10px; }
  .focGrain > span { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .focToggle { display: flex; gap: 6px; }
  .gOpt { font-family: inherit; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
    background: var(--btnBg); border: 1px solid var(--bd); border-radius: 12px; padding: 7px 14px; }
  .gOpt.sel { color: var(--onFrame); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .focDots { display: flex; gap: 6px; }
  .focDots i { width: 6px; height: 6px; border-radius: 50%; background: var(--lineTrack); }
  .focDots i.on { background: var(--accent); width: 18px; border-radius: 4px; }
  .focStart { font-family: inherit; font-size: 15px; font-weight: 650; color: #20242a; cursor: pointer; white-space: nowrap;
    background: var(--accent); border: none; padding: 14px 46px; border-radius: 28px; letter-spacing: 1px;
    box-shadow: 0 12px 24px -12px color-mix(in srgb, var(--accent) 80%, transparent); transition: transform .1s ease; }
  .focStart:active { transform: scale(.97); }
  .focTilt { font-size: 11px; color: var(--muted); min-height: 14px; text-align: center; }

  /* ── 遊玩工具面板（齒輪浮動）── */
  .iconBtn.hot { background: color-mix(in srgb, var(--accent) 26%, transparent); border-color: var(--accent); color: #fff; }
  #toolPanel {
    position: absolute; top: 46px; right: 0; width: 234px; z-index: 10; display: none;
    background: var(--frameBg); border: 1px solid var(--bd-strong); border-radius: 18px; padding: 14px 15px 16px;
    box-shadow: 0 22px 44px -18px rgba(0,0,0,.7); color: var(--onFrame); font-family: var(--font-round);
  }
  #toolPanel.open { display: block; }
  .tpHead { font-size: 13px; font-weight: 650; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .tpX { background: none; border: none; color: var(--muted); font-size: 19px; line-height: 1; cursor: pointer; }
  .tpGrp + .tpGrp { margin-top: 14px; padding-top: 13px; border-top: 1px solid var(--bd); }
  .tiltRow { display: flex; align-items: center; gap: 9px; }
  .tlight { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: 0 0 auto; transition: background .2s, box-shadow .2s; }
  .tlight.on { background: #9aa384; box-shadow: 0 0 0 3px color-mix(in srgb, #9aa384 28%, transparent); }
  .tlabel { font-size: 12px; font-weight: 600; }
  .tsub { font-size: 10.5px; color: var(--onFrame); margin-left: auto; background: var(--btnBg); border: 1px solid var(--btnBd); padding: 5px 10px; border-radius: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .ctlLabel { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 7px; }
  .seg { display: flex; gap: 6px; }
  .segBtn { font-family: var(--font-round); font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
    background: var(--btnBg); border: 1px solid var(--bd); border-radius: 11px; padding: 8px 0; flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px; }
  .segBtn svg { width: 18px; height: 18px; }
  .segBtn svg polygon, .segBtn svg rect { fill: color-mix(in srgb, var(--accent) 26%, transparent); stroke: var(--accent); stroke-width: 2; stroke-linejoin: round; }
  .segBtn.sel { color: var(--onFrame); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .sizeRow { display: flex; align-items: center; gap: 11px; }
  .sizeRow .cap { font-size: 10.5px; color: var(--muted); flex: 0 0 auto; }
  #sizeRange { flex: 1; -webkit-appearance: none; appearance: none; height: 5px; border-radius: 3px; background: var(--lineTrack); }
  #sizeRange::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #f0ece5; box-shadow: 0 2px 5px rgba(0,0,0,.4); cursor: pointer; }
  #sizeRange::-moz-range-thumb { width: 18px; height: 18px; border: none; border-radius: 50%; background: #f0ece5; box-shadow: 0 2px 5px rgba(0,0,0,.4); cursor: pointer; }

  /* 標題旁的隨機鈕 */
  .titleRow { display: flex; align-items: center; gap: 13px; margin: 9px 0 5px; }
  .titleRow h2 { margin: 0; white-space: nowrap; }
  .randomBtn { width: 42px; height: 42px; border-radius: 50%; flex: 0 0 auto; cursor: pointer; border: none;
    background: var(--accent); color: #2a2017; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 18px -8px color-mix(in srgb, var(--accent) 75%, transparent); transition: transform .14s ease; }
  .randomBtn:active { transform: scale(.9) rotate(-14deg); }
  .randomBtn svg { width: 21px; height: 21px; }

  /* 亮色版：減輕陰影深度 */
  html.light .focBig canvas { box-shadow: 0 14px 30px -16px rgba(80,72,60,.30), inset 0 2px 8px -3px rgba(80,72,60,.16); }
  html.light .galCard canvas { box-shadow: inset 0 1px 4px -2px rgba(80,72,60,.18); }
  .ovGhost, .ovChip, .gOpt, .focGrain > span, .focCapMid .nm { white-space: nowrap; }

  /* ── 成就 · 美術館方向：襯線標題、完成卡鑲金線、小金點 ── */
  .galHead h2 { font-family: var(--font-serif); font-weight: 600; }
  .ovTop .ovTitle, .focCapMid .nm { font-family: var(--font-serif); }
  .gcName { font-family: var(--font-serif); display: flex; align-items: center; gap: 7px; }
  .gcDot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: 0 0 auto;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  .galCard.done { border-color: color-mix(in srgb, var(--accent) 34%, var(--bd)); }
  .galCard.done canvas { box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent), inset 0 2px 6px -2px rgba(0,0,0,.26); }
  html.light .galCard.done canvas { box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent), inset 0 1px 4px -2px rgba(80,72,60,.18); }
  /* 完成揭曉：沙面微光由下而上掃過一次 */
  #winShimmer { position: absolute; left: -10%; right: -10%; height: 55%; bottom: -55%; z-index: 5; pointer-events: none; opacity: 0;
    background: linear-gradient(0deg, rgba(255,248,232,0) 0%, rgba(255,248,232,.6) 50%, rgba(255,248,232,0) 100%); mix-blend-mode: screen; }
  #winShimmer.play { animation: shimmerSweep 1.9s cubic-bezier(.4,0,.3,1) forwards; }
  @keyframes shimmerSweep { 0% { transform: translateY(0); opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translateY(-300%); opacity: 0; } }
  #winBanner { font-family: var(--font-serif); }

const _wave = (topY, amp, ph) => (c) => { c.beginPath(); c.moveTo(0, 430); c.lineTo(0, topY); for (let x = 0; x <= 480; x += 12) { c.lineTo(x, topY + Math.sin(x*0.0185 + ph)*amp); } c.lineTo(480, 430); c.closePath(); };

// 用法：svgRegion('#d23b3b', 'M240 168 C... Z')
function svgRegion(color, d, opt) {
  opt = opt || {};
  let p2d;
  if (opt.scale || opt.dx || opt.dy) {
    const s = opt.scale || 1;
    p2d = new Path2D();
    p2d.addPath(new Path2D(d), new DOMMatrix([s, 0, 0, s, opt.dx || 0, opt.dy || 0]));
  } else {
    p2d = new Path2D(d);
  }
  return { color, p2d, stroke: opt.stroke, lw: opt.lw };

// 遮罩式區塊：把一張白色遮罩 canvas 染成指定顏色（依 mask+color 快取，免每幀重算）
const _tintCache = new WeakMap();
function tintMask(mask, color) {
  let m = _tintCache.get(mask); if (!m) { m = new Map(); _tintCache.set(mask, m); }
  let c = m.get(color); if (c) return c;
  c = document.createElement('canvas'); c.width = W; c.height = H;
  const x = c.getContext('2d');
  x.drawImage(mask, 0, 0);
  x.globalCompositeOperation = 'source-in';
  x.fillStyle = color; x.fillRect(0, 0, W, H);
  m.set(color, c); return c;
}

// 把一個區塊畫到 ctx
function paintRegion(ctx, region, opt) {
  if (region.mask) {                                  // 遮罩式區塊（從圖檔轉出的題目）
    ctx.save();
    ctx.globalAlpha = opt.alpha == null ? 1 : opt.alpha;
    ctx.drawImage(tintMask(region.mask, opt.color), 0, 0);
    ctx.restore();
    return;
  }
  ctx.save();
  ctx.globalAlpha = opt.alpha == null ? 1 : opt.alpha;
  ctx.fillStyle = opt.color; ctx.strokeStyle = opt.color;
  const strokeMode = opt.stroke != null ? opt.stroke : region.stroke;
  if (strokeMode) { ctx.lineWidth = opt.lw || region.lw || 9; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; }
  if (region.p2d) {                                   // SVG 向量路徑區塊（Path2D）
    if (strokeMode) ctx.stroke(region.p2d); else ctx.fill(region.p2d);
  } else {
    region.shape(ctx);
    if (strokeMode) ctx.stroke(); else ctx.fill();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────
// 視覺工具：沙粒顆粒上色 + 程序紙纖維紋理（純繪製，不影響邏輯）
// ─────────────────────────────────────────────────────────────
function hexToRgb(h){ h=h.replace('#',''); if(h.length===3) h=h.split('').map(x=>x+x).join(''); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function clamp8(v){ return v<0?0:v>255?255:v|0; }
function mix(rgb, target, t){ return [clamp8(rgb[0]+(target-rgb[0])*t), clamp8(rgb[1]+(target-rgb[1])*t), clamp8(rgb[2]+(target-rgb[2])*t)]; }
function rgbStr(r){ return 'rgb('+r[0]+','+r[1]+','+r[2]+')'; }
const _grainCache = new Map();
function grainShades(hex){
  let s = _grainCache.get(hex);
  if (!s) {
    const c = hexToRgb(hex);
    s = {
      darkest: mix(c, 0, 0.34), dark: mix(c, 0, 0.18),
      base: c, light: mix(c, 255, 0.16), lightest: mix(c, 255, 0.34),
      hi: mix(c, 255, 0.5),
    };
    _grainCache.set(hex, s);
  }
  return s;
}

// ── 多角細沙：每色預烘焙數張「顆粒團」貼圖，drawImage 取代逐顆描路徑 ──
//   顆粒造型：'angular' = 多角不規則（預設）｜'faceted' = 方菱小面（可在開始畫面切換）
let GRAIN_SHAPE = 'angular';      // 固定多角（方菱外觀差異不大，已移除切換）
const SAND_SIZE = 0.42;           // 沙粒大小（固定；要改大小直接調此值）
const GRAIN_SCALE = 0.7;          // 顆粒相對大小（70%）：每團裝多顆更細的沙
const RP = 7;                     // sprite 內顆粒基準半徑
const SPRITE = 20;                // sprite 畫布尺寸（含陰影/高光邊距）
const GRAIN_VARIANTS = 8;         // 每色預烘焙的隨機變體數
const _spriteCache = new Map();   // hex -> [canvas,...]

function _gh(a, b){ const x = Math.sin(a*127.1 + b*311.7) * 43758.5453; return x - Math.floor(x); }
// 描出單顆造型路徑（中心 cx,cy、約略半徑 r、旋轉 rot）
function _traceGrain(ctx, cx, cy, r, rot, sd, shape){
  ctx.beginPath();
  if (shape === 'faceted') {                       // 方/菱
    const sq = sd < 0.5;
    for (let i = 0; i < 4; i++){ const a = rot + i*1.5708, rr = r*(sq ? 1 : (i%2 ? 0.7 : 1.15));
      const px = cx+Math.cos(a)*rr, py = cy+Math.sin(a)*rr; i ? ctx.lineTo(px,py) : ctx.moveTo(px,py); }
    ctx.closePath(); return;
  }
  const n = 4 + Math.floor(sd*3);                  // angular：4–6 邊不規則多角
  for (let i = 0; i < n; i++){
    const jr = 0.64 + _gh(r+sd, i)*0.6;            // 各頂點半徑抖動 → 稜角
    const ja = (i + (_gh(r+sd, i+9)-0.5)*0.55) / n * 6.283;
    const a = rot + ja, rr = r*jr, px = cx+Math.cos(a)*rr, py = cy+Math.sin(a)*rr;
    i ? ctx.lineTo(px,py) : ctx.moveTo(px,py);
  }
  ctx.closePath();
}
// 在 sprite 上畫一顆有立體感的細沙（接觸陰影＋球體漸層＋亮度抖動＋高光＋偶發反光）
function _drawOneGrain(ctx, x, y, r, g, sd, shape){
  const rot = sd*6.283;
  const lum = 0.299*g.base[0] + 0.587*g.base[1] + 0.114*g.base[2];
  const shA = lum > 205 ? 0.05 : 0.17;        // 亮色（白）大幅調淡接觸陰影 → 不再像西米露
  const edge = lum > 205 ? 0.03 : 0.09;       // 亮色邊緣也少壓暗，白沙乾淨
  ctx.globalAlpha = shA; ctx.fillStyle = rgbStr(g.darkest);
  _traceGrain(ctx, x+r*0.15, y+r*0.2, r*0.96, rot, sd, shape); ctx.fill(); ctx.globalAlpha = 1;
  const jb = mix(g.base, sd<0.5 ? 0 : 255, _gh(sd, r)*0.12);
  const grd = ctx.createRadialGradient(x-r*0.3, y-r*0.34, r*0.08, x, y, r);
  grd.addColorStop(0, rgbStr(mix(jb,255,0.24))); grd.addColorStop(0.55, rgbStr(jb)); grd.addColorStop(1, rgbStr(mix(jb,0,edge)));
  ctx.fillStyle = grd; _traceGrain(ctx, x, y, r*0.92, rot, sd, shape); ctx.fill();
  // 反差細邊：只有近白沙(lum>195)才描深邊解決淺底看不見；其餘大地色一律描淺邊，避免中性色被壓濁變灰
  if (lum > 205) {                                  // 近白沙：極淡細邊，不再灰髒（仍保留一絲輪廓）
    ctx.globalAlpha = 0.24; ctx.lineWidth = Math.max(0.6, r*0.1); ctx.strokeStyle = rgbStr(mix(g.base, 0, 0.22));
    _traceGrain(ctx, x, y, r*0.92, rot, sd, shape); ctx.stroke(); ctx.globalAlpha = 1;
  } else if (lum > 168) {                            // 淺色（淺米/淺灰）：中等深邊，淺底也讀得出
    ctx.globalAlpha = 0.36; ctx.lineWidth = Math.max(0.7, r*0.14); ctx.strokeStyle = rgbStr(mix(g.base, 0, 0.34));
    _traceGrain(ctx, x, y, r*0.92, rot, sd, shape); ctx.stroke(); ctx.globalAlpha = 1;
  } else {                                          // 其餘色：淡淺邊提輪廓，不弄濁顏色
    ctx.globalAlpha = 0.32; ctx.lineWidth = Math.max(0.7, r*0.14); ctx.strokeStyle = rgbStr(mix(g.base, 255, 0.5));
    _traceGrain(ctx, x, y, r*0.92, rot, sd, shape); ctx.stroke(); ctx.globalAlpha = 1;
  }
  ctx.globalAlpha = 0.55; ctx.fillStyle = rgbStr(g.hi);
  ctx.beginPath(); ctx.arc(x-r*0.3, y-r*0.32, r*0.22, 0, 7); ctx.fill(); ctx.globalAlpha = 1;
  if (sd > 0.9){ ctx.globalAlpha = 0.85; ctx.fillStyle = rgbStr(mix(g.hi,255,0.45));
    ctx.beginPath(); ctx.arc(x-r*0.18, y-r*0.2, r*0.12, 0, 7); ctx.fill(); ctx.globalAlpha = 1; }
}
// 烘焙一張「顆粒團」：3–4 顆 70% 細多角沙填滿一個物理沙粒的範圍
function _bakeGrain(hex, vi, shape){
  const g = grainShades(hex);
  const c = document.createElement('canvas'); c.width = SPRITE; c.height = SPRITE;
  const ctx = c.getContext('2d');
  const cx = SPRITE/2, cy = SPRITE/2, sb = vi*2.71 + 0.13;
  const sub = 3 + Math.floor(_gh(sb, 7)*2);
  const arr = [{ dx:0, dy:0, gr: RP*0.5 }];   // 主粒（基準半徑，下方再乘 GRAIN_SCALE）
  for (let k = 1; k < sub; k++){ const a = _gh(sb,k)*6.283, d = RP*(0.3 + _gh(sb,k+3)*0.35);
    arr.push({ dx: Math.cos(a)*d, dy: Math.sin(a)*d, gr: RP*(0.36 + _gh(sb,k+5)*0.16) }); }
  arr.sort((a,b)=> a.dy - b.dy);
  for (const o of arr){ const x = cx+o.dx, y = cy+o.dy, sd = _gh(sb, x*0.7+y);
    _drawOneGrain(ctx, x, y, o.gr*GRAIN_SCALE, g, sd, shape); }
  return c;
}
function grainSprites(hex){
  const key = hex + '|' + GRAIN_SHAPE;
  let a = _spriteCache.get(key);
  if (!a){ a = []; for (let i = 0; i < GRAIN_VARIANTS; i++) a.push(_bakeGrain(hex, i, GRAIN_SHAPE)); _spriteCache.set(key, a); }
  return a;
}
// 取代原 paintGrain：貼一張預烘焙的多角細沙團，依半徑挑變體（穩定不閃爍）
function paintGrain(ctx, x, y, r, hex){
  const sprites = grainSprites(hex);
  const spr = sprites[(Math.floor(r*997)) % GRAIN_VARIANTS];
  const ds = r * 2.4;                                // sprite 覆蓋約 2.4r → 維持原覆蓋
  ctx.drawImage(spr, x - ds/2, y - ds/2, ds, ds);
}
// 切換顆粒造型（sprite 依 hex|shape 分別快取，不需清除）
function setGrainShape(shape){ GRAIN_SHAPE = shape; }
// 預製紙纖維貼圖（每主題一張，重畫時不重洗 → 穩定）
const _fiberTex = {};
function fiberTexFor(themeKey){
  if (_fiberTex[themeKey]) return _fiberTex[themeKey];
  const t = THEMES[themeKey];
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const x = c.getContext('2d');
  for (let i = 0; i < 9000; i++) {                    // 細密斑點＝紙纖維
    x.fillStyle = Math.random() < 0.5 ? t.fiberDark : t.fiberLight;
    x.globalAlpha = Math.random() * 0.6;
    const s = Math.random() < 0.9 ? 1 : 2;
    x.fillRect(Math.random()*W, Math.random()*H, s, s);
  }
  for (let i = 0; i < 240; i++) {                     // 少量短纖維
    x.strokeStyle = Math.random() < 0.5 ? t.fiberDark : t.fiberLight;
    x.globalAlpha = Math.random() * 0.4; x.lineWidth = 0.6;
    const px = Math.random()*W, py = Math.random()*H, a = Math.random()*Math.PI, len = 3 + Math.random()*5;
    x.beginPath(); x.moveTo(px, py); x.lineTo(px + Math.cos(a)*len, py + Math.sin(a)*len); x.stroke();
  }
  _fiberTex[themeKey] = c; return c;
}

// LayerManager：依圖案建立遮罩、撕膜狀態、進度
// ─────────────────────────────────────────────────────────────
class LayerManager {
  constructor(pattern) {
    this.pattern = pattern;
    this.regions = pattern.regions;
    this.regionId = new Uint8Array(W * H);   // 0 = 無，1..n
    this.filled   = new Uint8Array(W * H);
    this.peeled   = new Set();                // 已撕膜的區塊 id (1..n)
    this.bgIds    = new Set();                // 背景區塊 id：可撕可填，但不計完整度、不進剪影
    this.objIds   = [];                       // 物件（主體）區塊 id：完成度只看這些
    this.pxCount  = [0];
    this.coveredCount = 0;                     // 已填像素數（增量維護，免每幀全掃）
    this.totalCount = 0;                       // 已撕區塊的總像素數
    this._build();
    this.regions.forEach((r, i) => { if (r.prePeel) this.peel(i + 1); });   // 開場自動撕開（如輪廓，可先填）
  }
  _build() {
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const oc = off.getContext('2d');
    this.regions.forEach((region, i) => {
      const rid = i + 1;
      if (region.bg) this.bgIds.add(rid); else this.objIds.push(rid);
      oc.clearRect(0, 0, W, H);
      paintRegion(oc, region, { color:'#fff' });
      const data = oc.getImageData(0, 0, W, H).data;
      for (let p = 0; p < W * H; p++) if (data[p * 4 + 3] > 40) this.regionId[p] = rid;
      this.pxCount[rid] = 0;
    });
    for (let p = 0; p < W * H; p++) { const r = this.regionId[p]; if (r) this.pxCount[r]++; }
    // 背景遮罩聯集（快照時用來把「沒填的背景」洗成乾淨底紙）
    this.bgMaskUnion = null;
    const bgRegs = this.regions.filter(r => r.bg && r.mask);
    if (bgRegs.length) {
      const u = document.createElement('canvas'); u.width = W; u.height = H;
      const uc = u.getContext('2d'); bgRegs.forEach(r => uc.drawImage(r.mask, 0, 0));
      this.bgMaskUnion = u;
    }
  }
  peel(rid) {
    if (this.peeled.has(rid)) return;          // 防止重複撕導致總數重複累加
    this.peeled.add(rid);
    if (!this.bgIds.has(rid)) this.totalCount += this.pxCount[rid];   // 背景不計入完整度分母
  }
  covered() { return this.coveredCount; }
  ratio() { return this.totalCount ? this.coveredCount / this.totalCount : 0; }
  allPeeled() { return this.objIds.every(id => this.peeled.has(id)); }   // 只要主體都撕開即可，背景與否不影響完成
  maskAt(x, y) {
    if (x < 0 || y < 0 || x >= W || y >= H) return 0;
    const p = (y | 0) * W + (x | 0);
    const r = this.regionId[p];
    return (r && this.peeled.has(r) && !this.filled[p]) ? r : 0;
  }
  stamp(x, y, r) {
    const x0 = Math.max(0, x - r | 0), x1 = Math.min(W - 1, x + r | 0);
    const y0 = Math.max(0, y - r | 0), y1 = Math.min(H - 1, y + r | 0);
    const r2 = r * r;
    for (let yy = y0; yy <= y1; yy++)
      for (let xx = x0; xx <= x1; xx++) {
        const dx = xx - x, dy = yy - y;
        if (dx * dx + dy * dy > r2) continue;
        const p = yy * W + xx;
        const rg = this.regionId[p];
        if (rg && this.peeled.has(rg) && !this.filled[p]) {
          this.filled[p] = 1;
          if (!this.bgIds.has(rg)) this.coveredCount++;   // 背景沙照樣黏住、照樣顯示，只是不算進完整度
        }
      }
  }
}

// ─────────────────────────────────────────────────────────────
// ParticleSystem
// ─────────────────────────────────────────────────────────────
class ParticleSystem {
  constructor() { this.list = []; }
  scoop(color, n) {
    for (let i = 0; i < n && this.list.length < MAX_PARTICLES; i++) {
      const a = Math.random() * 7, rr = Math.random() * 48;
      this.list.push({
        x: W / 2 + Math.cos(a) * rr,
        y: H / 2 + Math.sin(a) * rr,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: (3 + Math.random() * 2) * SAND_SIZE,
        c: color,
      });
    }
  }
  step(gx, gy, layers, stuckCtx) {
    const ax = gx * ACCEL, ay = (gy + BASE_GRAVITY) * ACCEL;
    // 傾斜／拖曳改變重力方向 → 喚醒整堆，讓沙重新流動
    if (this._lgx === undefined || Math.abs(gx - this._lgx) + Math.abs(gy - this._lgy) > 0.05) {
      for (const s of this.list) { s.sleep = false; s.still = 0; }
    }
    this._lgx = gx; this._lgy = gy;
    // 1. 套用重力、阻尼、移動、撞牆（睡著的沙不動，不被重力反覆推 → 靜止不抖）
    for (const s of this.list) {
      s.ox = s.x; s.oy = s.y;
      if (s.sleep) continue;
      s.vx = (s.vx + ax) * DAMP;
      s.vy = (s.vy + ay) * DAMP;
      const sp = Math.hypot(s.vx, s.vy);
      if (sp > MAX_SPEED) { s.vx = s.vx / sp * MAX_SPEED; s.vy = s.vy / sp * MAX_SPEED; }
      else if (sp < REST_SPEED) { s.vx = 0; s.vy = 0; }   // 太慢就停，不漂浮
      s.x += s.vx; s.y += s.vy;
      if (s.x < s.r) { s.x = s.r; s.vx = 0; }
      else if (s.x > W - s.r) { s.x = W - s.r; s.vx = 0; }
      if (s.y < s.r) { s.y = s.r; s.vy = 0; }
      else if (s.y > H - s.r) { s.y = H - s.r; s.vy = 0; }
    }
    // 2. 沙粒互相推開＝堆疊出厚度與落地感
    this._separate();
    // 2b. 沉睡判定：這一幀淨位移幾乎為零的沙，累積數幀後睡著；被推動或傾斜時自動醒來
    for (const s of this.list) {
      const moved = Math.abs(s.x - s.ox) + Math.abs(s.y - s.oy);
      if (moved < SLEEP_EPS) {
        if (!s.sleep && (s.still = (s.still || 0) + 1) >= SLEEP_FRAMES) { s.sleep = true; s.vx = 0; s.vy = 0; }
      } else { s.still = 0; s.sleep = false; }
    }
    // 3. 滑過膠水時黏住
    const keep = [];
    for (const s of this.list) {
      if (layers && layers.maskAt(s.x, s.y) && Math.random() < STICK_CHANCE) {
        layers.stamp(s.x, s.y, s.r);
        // 同色實底（半徑小於顆粒貼圖、藏在底下）→ 保證填滿不露貼紙、又不會讓單顆看起來偏大；
        // 再密疊數顆「同尺寸」顆粒做堆疊質感（仿檢視圖）。
        const _sh = grainShades(s.c);
        stuckCtx.fillStyle = rgbStr(_sh.base);
        stuckCtx.beginPath(); stuckCtx.arc(s.x, s.y, s.r * 0.95, 0, 7); stuckCtx.fill();
        paintGrain(stuckCtx, s.x, s.y, s.r, s.c);
        for (let k = 0; k < 3; k++) {
          const a = Math.random() * 6.283, d = s.r * (0.25 + Math.random() * 0.45);
          paintGrain(stuckCtx, s.x + Math.cos(a) * d, s.y + Math.sin(a) * d, s.r * (0.82 + Math.random() * 0.26), s.c);
        }
      } else keep.push(s);
    }
    this.list = keep;
  }
  // 空間網格做鄰近沙粒分離，避免重疊、形成沙堆。多迭代＝堆得更緊實
  _separate() {
    const cs = 11;
    const key = (cx, cy) => cx * 100000 + cy;
    const L = this.list;
    for (let iter = 0; iter < SEPARATE_ITERS; iter++) {
      const buckets = new Map();
      for (let i = 0; i < L.length; i++) {
        const cx = (L[i].x / cs) | 0, cy = (L[i].y / cs) | 0;
        const k = key(cx, cy);
        let arr = buckets.get(k); if (!arr) { arr = []; buckets.set(k, arr); }
        arr.push(i);
      }
      for (let i = 0; i < L.length; i++) {
        const a = L[i];
        const cx = (a.x / cs) | 0, cy = (a.y / cs) | 0;
        for (let ox = -1; ox <= 1; ox++) for (let oy = -1; oy <= 1; oy++) {
          const arr = buckets.get(key(cx + ox, cy + oy));
          if (!arr) continue;
          for (const j of arr) {
            if (j <= i) continue;
            const b = L[j];
            let dx = b.x - a.x, dy = b.y - a.y;
            const min = (a.r + b.r) * PACK;
            let d2 = dx * dx + dy * dy;
            if (d2 >= min * min || d2 === 0) {
              if (d2 === 0) { dx = (Math.random() - 0.5) * 0.5; dy = (Math.random() - 0.5) * 0.5; d2 = dx * dx + dy * dy; }
              else continue;
            }
            const d = Math.sqrt(d2) || 0.01;
            const push = (min - d) * 0.5;
            const nx = dx / d, ny = dy / d;
            a.x -= nx * push; a.y -= ny * push;
            b.x += nx * push; b.y += ny * push;
            if (a.sleep || b.sleep) { a.sleep = false; b.sleep = false; a.still = b.still = 0; }  // 被擠到就醒
          }
        }
      }
    }
    // 推開後再夾回邊界
    for (const s of L) {
      if (s.x < s.r) s.x = s.r; else if (s.x > W - s.r) s.x = W - s.r;
      if (s.y < s.r) s.y = s.r; else if (s.y > H - s.r) s.y = H - s.r;
    }
  }
  draw(ctx) {
    for (const s of this.list) {
      // 先鋪一塊實心底圓＝找回美化前的團塊體積感，再疊顆粒紋理（保留美化質感）
      ctx.fillStyle = rgbStr(grainShades(s.c).base);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.92, 0, 7); ctx.fill();
      paintGrain(ctx, s.x, s.y, s.r, s.c);   // 散沙：顆粒明暗 + 微高光
    }
  }
  clear() { this.list = []; }
}

// ─────────────────────────────────────────────────────────────
// InputManager
// ─────────────────────────────────────────────────────────────
class InputManager {
  constructor() {
    this.gx = 0; this.gy = 1; this.tilt = false;
    this.manual = null;
    this._keys = { x: 0, y: 0 };
    window.addEventListener('keydown', e => this._key(e, 1));
    window.addEventListener('keyup', e => this._key(e, 0));
  }
  _key(e, v) {
    if (e.key === 'ArrowLeft') this._keys.x = -v;
    else if (e.key === 'ArrowRight') this._keys.x = v;
    else if (e.key === 'ArrowUp') this._keys.y = -v;
    else if (e.key === 'ArrowDown') this._keys.y = v;
    else return;
    e.preventDefault();
  }
  gravity() {
    if (this.manual) return this.manual;
    if (this.tilt) return { x: this.gx, y: this.gy };
    if (this._keys.x || this._keys.y) return { x: this._keys.x, y: this._keys.y || 0.2 };
    return { x: 0, y: 1 };
  }
  async enableTilt() {
    const handler = (e) => {
      const g = e.gamma || 0, b = e.beta || 0;
      this.gx = Math.max(-1, Math.min(1, g / 35));
      this.gy = Math.max(-1, Math.min(1, (b - 35) / 35));
      this.tilt = true;
    };
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') { window.addEventListener('deviceorientation', handler); return true; }
        return false;
      } catch { return false; }
    } else if (typeof DeviceOrientationEvent !== 'undefined') {
      window.addEventListener('deviceorientation', handler); return true;
    }
    return false;
  }
}

const glueCv = document.getElementById('glue');
const stuck = document.getElementById('stuck');
const main = document.getElementById('main');
[bg, glueCv, stuck, main].forEach(c => { c.width = W; c.height = H; });
const bgCtx = bg.getContext('2d');
const glueCtx = glueCv.getContext('2d');
const stuckCtx = stuck.getContext('2d');
const mainCtx = main.getContext('2d');

// 主題狀態 + 套用
let themeKey = 'dark';   // dark = 深灰沉穩（預設） · light = 淨白簡約
function drawTray() {
  const t = TH;
  const g = bgCtx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, t.trayA); g.addColorStop(1, t.trayB);
  bgCtx.fillStyle = g; bgCtx.fillRect(0, 0, W, H);
  bgCtx.save();
  for (let i = 0; i < 46; i++) {                      // 木紋／長纖維直紋
    const px = Math.random() * W;
    bgCtx.strokeStyle = Math.random() < 0.5 ? t.woodGrain : t.woodHi;
    bgCtx.globalAlpha = 0.3 + Math.random() * 0.5;
    bgCtx.lineWidth = 0.4 + Math.random() * 1.1;
    bgCtx.beginPath();
    for (let yy = 0; yy <= H; yy += 10) {
      const xx = px + Math.sin(yy * 0.025 + px) * 3;
      if (yy === 0) bgCtx.moveTo(xx, yy); else bgCtx.lineTo(xx, yy);
    }
    bgCtx.stroke();
  }
  bgCtx.globalAlpha = 0.5;
  bgCtx.drawImage(fiberTexFor(themeKey), 0, 0);        // 疊上紙纖維斑點
  bgCtx.restore();
}
// 把紙纖維/膜光澤質感貼進某個「面」區塊
function textureRegion(region, peeled) {
  if (region.mask) {                                  // 遮罩式區塊：先做質感再用遮罩裁形
    const t = document.createElement('canvas'); t.width = W; t.height = H;
    const tx = t.getContext('2d');
    if (peeled) { tx.globalAlpha = 0.9; tx.drawImage(fiberTexFor(themeKey), 0, 0); }
    else {
      const g = tx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, 'rgba(255,255,255,0)'); g.addColorStop(0.42, TH.filmHi); g.addColorStop(0.62, 'rgba(255,255,255,0)');
      tx.fillStyle = g; tx.fillRect(0, 0, W, H);
    }
    tx.globalCompositeOperation = 'destination-in'; tx.drawImage(region.mask, 0, 0);
    glueCtx.drawImage(t, 0, 0);
    return;
  }
  glueCtx.save();
  if (region.p2d) glueCtx.clip(region.p2d);
  else { region.shape(glueCtx); glueCtx.clip(); }
  if (peeled) {                                        // 撕開＝黏貼面紙纖維
    glueCtx.globalAlpha = 0.9;
    glueCtx.drawImage(fiberTexFor(themeKey), 0, 0);
  } else {                                             // 未撕＝膜的斜向光澤
    const g = glueCtx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.42, TH.filmHi);
    g.addColorStop(0.62, 'rgba(255,255,255,0)');
    glueCtx.fillStyle = g; glueCtx.fillRect(0, 0, W, H);
  }
  glueCtx.restore();
}

const particles = new ParticleSystem();
const input = new InputManager();
let layers = null;
let won = false;
let currentKey = null;

// ── 音效（Web Audio 即時合成，無外部檔案）──
const Sound = {
  ctx: null, muted: false, _noise: null, _slideOut: null, _grainAcc: 0, _lastGrainT: 0,
  _bedSrc: null, _bedGain: null,   // 方案A：顆粒層底下的連續底噪（黏合劑，極低音量）
  init() {
    if (this.ctx) { if (this.ctx.state === 'suspended') this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    const len = Math.floor(this.ctx.sampleRate * 1.0);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    this._noise = buf;
  },
  pour() {                                    // 倒沙：依參考檔＝一段持續約1秒的「沙流」（漸起→維持→漸收），非短促拋落
    if (this.muted || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const t = this.ctx.currentTime;
    const src = this.ctx.createBufferSource(); src.buffer = this._noise; src.loop = true;
    const hp = this.ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 900;   // 砍掉低頻轟鳴＝去鑼鼓感
    const lp = this.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 9000; lp.Q.value = 0.3;  // 明亮輕盈（rainstick）
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.07, t + 0.08);            // 音量降低、柔起
    g.gain.setValueAtTime(0.07, t + 0.34);                     // 維持＝傾倒流
    g.gain.exponentialRampToValueAtTime(0.0004, t + 0.72);     // 漸收
    src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(this.ctx.destination);
    src.start(t); src.stop(t + 0.76);
  },
  _ensureSlideOut() {                         // 滑沙的輸出匯流（顆粒都接到這裡）
    if (this._slideOut || !this.ctx) return;
    this._slideOut = this.ctx.createGain(); this._slideOut.gain.value = 1;
    this._slideOut.connect(this.ctx.destination);
    this._grainAcc = 0; this._lastGrainT = this.ctx.currentTime;
    // 方案A 底噪：一條持續的低通沙沙聲，填滿顆粒間的空隙 → 去掉「一顆顆啵」的斷裂感
    const src = this.ctx.createBufferSource(); src.buffer = this._noise; src.loop = true;
    const hp = this.ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 300; // 砍低頻轟鳴
    const lp = this.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1400; lp.Q.value = 0.4; // 鈍而柔，不嘶
    const g = this.ctx.createGain(); g.gain.value = 0;   // 初始靜音，由 slideTick 依沙量推上去
    src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(this._slideOut);
    src.start();
    this._bedSrc = src; this._bedGain = g;
  },
  _grain(now, amp) {                          // 一顆柔沙粒：更長、更軟起音、更低頻 → 鬆而柔，不再炸物感
    const dur = 0.06 + Math.random() * 0.10;            // 60–160ms，更長＝更平滑
    const src = this.ctx.createBufferSource(); src.buffer = this._noise;
    const bp = this.ctx.createBiquadFilter(); bp.type = 'bandpass';
    bp.frequency.value = 600 + Math.random() * 1100;    // 600–1700Hz，再砍高頻尖端＝少嘶
    bp.Q.value = 0.4 + Math.random() * 0.6;             // 更低 Q＝更柔、更鈍
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(amp * (0.5 + Math.random() * 0.5), now + 0.045);   // 起音再放軟（45ms）＝單顆不「啵」
    g.gain.exponentialRampToValueAtTime(0.0003, now + dur);
    src.connect(bp); bp.connect(g); g.connect(this._slideOut);
    const off = Math.random() * (0.96 - dur);
    src.start(now, Math.max(0, off), dur + 0.02);
  },
  // 每幀依「移動中沙量」灑沙粒：高密度+低音量＝綿密；沙少＝稀疏；靜止＝自然收尾（不硬切）
  slideTick(activity) {
    if (this.muted || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this._ensureSlideOut();
    const now = this.ctx.currentTime;
    let dt = now - this._lastGrainT; this._lastGrainT = now;
    if (dt < 0 || dt > 0.1) dt = 0.016;
    const rate = Math.min(68, activity * 0.8);          // 再降密度＝更一粒粒、少連續嘶聲
    this._grainAcc += rate * dt;
    let n = 0;
    while (this._grainAcc >= 1 && n < 6) { this._grainAcc -= 1; this._grain(now + Math.random() * dt, 0.013); n++; }  // 顆粒音量降低＝彈跳感更弱
    // 方案A：底噪音量隨沙量平滑跟隨（顆粒調弱後，底噪稍提一點補活力）；ramp 避免爆音
    if (this._bedGain) {
      const target = Math.min(1, rate / 68) * 0.014;   // 上限 ~0.014，仍低於顆粒尖峰
      this._bedGain.gain.setTargetAtTime(target, now, 0.05);
    }
  },
  slideOff() {                                          // 停止灑粒，殘餘沙粒自然收尾
    this._grainAcc = 0; this._lastGrainT = this.ctx ? this.ctx.currentTime : 0;
    if (this._bedGain && this.ctx) this._bedGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.08);  // 底噪柔收
  },
  ding() {                                    // 完成：柔和三音
    if (this.muted || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    [523.25, 659.25, 783.99].forEach((f, i) => {
      const t = this.ctx.currentTime + i * 0.16;
      const o = this.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.16, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0008, t + 0.9);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(t); o.stop(t + 1.0);
    });
  },
  toggle() {
    this.muted = !this.muted;
    if (this.muted) { this.slideOff(); }
    else { this.init(); }
    return this.muted;
  },
};

// ── 成就：本機儲存「已完成」作品＋快照（重開還在，不需登入）──

// 把沙盤合成一張，存成你「親手上色那一幅」的真實快照
// 只拍已點定的作品（托盤＋貼紙板＋黏住的沙），不拍還在落的浮沙 → 與落沙時機無關
function captureSnapshot() {
  const s = 300, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d');
  // 乾淨米紙為底（與畫廓剪影卡同調）——沒填的背景不記錄，只留下你真正倒的沙
  x.fillStyle = TH.thumbPaper; x.fillRect(0, 0, s, s);
  x.save(); x.globalAlpha = 0.5; x.drawImage(fiberTexFor(themeKey), 0, 0, W, H, 0, 0, s, s); x.restore();
  // 貼紙板：把背景區挨掉，未填的背景露出乾淨底紙（填了的背景沙在 stuck 上照常顯示）
  const tmp = document.createElement('canvas'); tmp.width = W; tmp.height = H;
  const t = tmp.getContext('2d'); t.drawImage(glueCv, 0, 0);
  if (layers && layers.bgMaskUnion) { t.globalCompositeOperation = 'destination-out'; t.drawImage(layers.bgMaskUnion, 0, 0); }
  x.drawImage(tmp, 0, 0, s, s);
  x.drawImage(stuck, 0, 0, s, s);
  return c.toDataURL('image/jpeg', 0.9);
}

// 畫貼紙板：未撕膜＝灰、撕掉＝黏貼面；加紙纖維/光澤質感與刀模壓痕
function drawBoard() {
  glueCtx.clearRect(0, 0, W, H);
  if (!layers) return;
  // 1. 底色：灰膜 / 撕開的黏貼面
  layers.regions.forEach((region, i) => {
    const peeled = layers.peeled.has(i + 1);
    paintRegion(glueCtx, region, { color: peeled ? TH.peeled : TH.film });
  });
  // 2. 質感：只處理「面」區塊（描線型如亮面/黑框略過）
  layers.regions.forEach((region, i) => {
    if (region.stroke) return;
    textureRegion(region, layers.peeled.has(i + 1));
  });
  // 3. 刀模壓痕：只畫「未撕」區塊邊緣，做亮邊+暗溝的浮雕感，撕開後消失
  glueCtx.save();
  glueCtx.lineCap = 'round'; glueCtx.lineJoin = 'round';
  glueCtx.setLineDash([5, 3]);
  layers.regions.forEach((region, i) => {
    if (layers.peeled.has(i + 1)) return;
    if (region.mask) return;                           // 遮罩區塊靠線稿顯示邊界，不畫刀模虛線
    glueCtx.globalAlpha = 0.5; glueCtx.lineWidth = 1; glueCtx.strokeStyle = TH.filmHi;
    glueCtx.save(); glueCtx.translate(0, -0.7);
    if (region.p2d) glueCtx.stroke(region.p2d); else { region.shape(glueCtx); glueCtx.stroke(); }
    glueCtx.restore();
    glueCtx.globalAlpha = 0.6; glueCtx.lineWidth = 1.3; glueCtx.strokeStyle = TH.diecut;
    if (region.p2d) glueCtx.stroke(region.p2d); else { region.shape(glueCtx); glueCtx.stroke(); }
  });
  glueCtx.restore();
  // 3b. 背景十字刀模虛線：沿中心十字切線畫虛線，只在「未撕的背景」上顯示（撕開即消失）
  if (layers.pattern && layers.pattern.bgCross) {
    const cx = layers.pattern.bgCross.x, cy = layers.pattern.bgCross.y;
    const um = document.createElement('canvas'); um.width = W; um.height = H;
    const uc = um.getContext('2d'); let any = false;
    layers.regions.forEach((region, i) => {
      if (!region.bg || layers.peeled.has(i + 1) || !region.mask) return;
      uc.drawImage(region.mask, 0, 0); any = true;
    });
    if (any) {
      const dc = document.createElement('canvas'); dc.width = W; dc.height = H;
      const dx = dc.getContext('2d');
      dx.lineCap = 'round'; dx.setLineDash([5, 3]);
      dx.globalAlpha = 0.55; dx.lineWidth = 1; dx.strokeStyle = TH.filmHi;
      dx.save(); dx.translate(0, -0.7);
      dx.beginPath(); dx.moveTo(cx, 0); dx.lineTo(cx, H); dx.moveTo(0, cy); dx.lineTo(W, cy); dx.stroke(); dx.restore();
      dx.globalAlpha = 0.6; dx.lineWidth = 1.3; dx.strokeStyle = TH.diecut;
      dx.beginPath(); dx.moveTo(cx, 0); dx.lineTo(cx, H); dx.moveTo(0, cy); dx.lineTo(W, cy); dx.stroke();
      dx.setLineDash([]); dx.globalAlpha = 1; dx.globalCompositeOperation = 'destination-in';
      dx.drawImage(um, 0, 0);                            // 裁到「未撕背景」範圍
      glueCtx.drawImage(dc, 0, 0);
    }
  }
  // 4. 遮罩類題目：繪製線稿（像著色本的永久輪廓，讓圖一直認得出來）
  if (layers.pattern && layers.pattern.lineMask) {
    glueCtx.save();
    glueCtx.globalAlpha = themeKey === 'light' ? 0.4 : 0.48;   // 淡導引線（輪廓是可填區，填上黑沙會蓋過它）
    glueCtx.drawImage(tintMask(layers.pattern.lineMask, layers.pattern.lineColor || '#2c261f'), 0, 0);
    glueCtx.restore();
  }
}

// 點圖面撕貼紙：點到哪一塊就撕開那塊
function tapToPeel(clientX, clientY) {
  if (!layers) return;
  const rect = stage.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width * W;
  const y = (clientY - rect.top) / rect.height * H;
  if (x < 0 || y < 0 || x >= W || y >= H) return;
  const rid = layers.regionId[(y | 0) * W + (x | 0)];
  if (rid && !layers.peeled.has(rid)) { layers.peel(rid); drawBoard(); }
}

}

// 單色剪影縮圖（未填神秘感：看得到形、藏住顏色）
function drawSilhouette(canvas, pattern, S) {
  canvas.width = S * 2; canvas.height = S * 2;
  canvas.style.width = S + 'px'; canvas.style.height = S + 'px';
  const x = canvas.getContext('2d'); x.setTransform(1,0,0,1,0,0); x.scale(2, 2);
  x.clearRect(0, 0, S, S);
  x.fillStyle = TH.thumbPaper; x.fillRect(0, 0, S, S);
  x.save(); x.globalAlpha = 0.5; x.drawImage(fiberTexFor(themeKey), 0, 0, W, H, 0, 0, S, S); x.restore();
  x.save(); x.scale(S / W, S / W);
  x.fillStyle = TH.silTone; x.strokeStyle = TH.silTone; x.lineCap = 'round'; x.lineJoin = 'round';
  pattern.regions.forEach(r => {
    if (r.bg) return;                        // 背景不進剪影：選圖縮圖維持物件外型
    if (r.mask) { x.drawImage(tintMask(r.mask, TH.silTone), 0, 0); }
    else if (r.p2d) { if (r.stroke) { x.lineWidth = r.lw || 9; x.stroke(r.p2d); } else x.fill(r.p2d); }
    else if (r.stroke) { x.lineWidth = r.lw || 9; r.shape(x); x.stroke(); }
    else { r.shape(x); x.fill(); }
    x.beginPath();
  });
  if (pattern.lineMask) x.drawImage(tintMask(pattern.lineMask, TH.silTone), 0, 0);  // 填平縫隙，保持實心剪影
  x.restore();
}

  const im = new Image();
  im.onload = () => { x.drawImage(im, 0, 0, S * 2, S * 2); };
  im.src = dataUrl;
}

// ── 從圖檔轉成的「遮罩式」題目（之後任何線稿都能照此加入）──
function buildMaskPattern(url, meta, done) {
  const im = new Image();
  im.onload = () => {
    const oc = document.createElement('canvas'); oc.width = W; oc.height = H;
    const ox = oc.getContext('2d'); ox.drawImage(im, 0, 0, W, H);
    const d = ox.getImageData(0, 0, W, H).data; const NP = W * H;
    const n = meta.colors.length;
    const imgs = []; for (let i = 0; i <= n; i++) imgs.push(new ImageData(W, H));
    let lineHit = 0;
    for (let p = 0; p < NP; p++) {
      const idx = d[p * 4];
      let t = -1;
      if (idx >= 1 && idx <= n) t = idx - 1;
      else if (idx === n + 1) t = n;
      if (t >= 0) { const m = imgs[t].data; m[p*4]=255; m[p*4+1]=255; m[p*4+2]=255; m[p*4+3]=255; if (t === n) lineHit++; }
    }
    const canv = imgs.map(id => { const c = document.createElement('canvas'); c.width = W; c.height = H; c.getContext('2d').putImageData(id, 0, 0); return c; });
    const regions = meta.colors.map((col, i) => {
      const key = (meta.keys && meta.keys[i]) || ('r' + i);
      return { key, color: col, mask: canv[i],
        bg: meta.bgCount ? i >= n - meta.bgCount : false,                       // 最後 bgCount 塊 = 背景
        prePeel: !!(meta.prePeelKeys && meta.prePeelKeys.includes(key)) };       // 開場自動撕開（如輪廓，可先填）
    });
    let lineMask = lineHit ? canv[n] : null;                                     // 傳統向量輪廓（n+1 索引）
    if (meta.lineFromKey) { const lr = regions.find(r => r.key === meta.lineFromKey); if (lr) lineMask = lr.mask; }  // 輪廓既是可填區塊、又當淡導引線
    done({ name: meta.name, en: meta.en, tag: meta.tag, regions, lineMask, lineColor: meta.lineColor || '#2c261f', bgCross: meta.bgCross || null });
  };
  im.onerror = () => console.warn('遮罩題目載入失敗:', url);
  im.src = url;
}

// 主迴圈
const progressBar = document.getElementById('progressBar');
function loop() {
  const g = input.gravity();
  particles.step(g.x, g.y, layers, stuckCtx);
  // 滑沙聲（顆粒合成）：依「實際移動的沙量」灑沙粒；回畫廊（picking）時不發聲
  if (layers && !appEl.classList.contains('picking')) {
    let act = 0;
    for (const p of particles.list) { const sp = Math.abs(p.vx) + Math.abs(p.vy); if (sp > REST_SPEED) act += sp; }
    Sound.slideTick(act);
  } else {
    Sound.slideOff();
  }
  mainCtx.clearRect(0, 0, W, H);
  particles.draw(mainCtx);
  if (layers) {
    const r = layers.ratio();
    progressBar.style.width = (r * 100).toFixed(0) + '%';
    if (!won && layers.allPeeled() && r >= WIN_RATIO) {
      won = true;
      if (currentKey) { COMPLETED[currentKey] = { thumb: captureSnapshot(), at: Date.now() }; saveCompleted(); }
      Sound.ding();   // 完成音；滑沙聲交給主迴圈依沙動續播，不強制切斷
      playReveal();
    }
  }
  requestAnimationFrame(loop);
}
loop();

// 控制鈕
document.getElementById('dumpBtn').addEventListener('click', () => { particles.clear(); Sound.slideOff(); });
(() => {
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', () => {
    const m = Sound.toggle();
    muteBtn.textContent = m ? '🔇' : '🔊';
  });
})();
document.getElementById('changeBtn').addEventListener('click', () => {
  // 已完成（已存起來）或沒進度 → 直接換；有未存的進度才確認
  if (layers && layers.covered() > 0 && !won && !confirm('要換圖案嗎？目前的作品會清掉。')) return;
  showPicker();
});
// （傾斜權限改在「開始這一幅」按鈕觸發時請求）

// 主題切換（深灰沉穩 ↔ 淨白簡約）— 影響 CSS 與盤面/托盤質感，不動沙作品
function applyTheme(key) {
  themeKey = key; TH = THEMES[key];
  document.documentElement.classList.toggle('light', key === 'light');
  const tg = document.getElementById('themeBtnG'); if (tg) tg.textContent = key === 'light' ? '☾' : '☀';
  document.querySelectorAll('#panelTheme .segBtn').forEach(b => b.classList.toggle('sel', b.dataset.theme === key));
  drawTray();
  drawBoard();
  if (typeof buildGrid === 'function') buildGrid();
}
document.getElementById('themeBtnG').addEventListener('click', () => applyTheme(themeKey === 'dark' ? 'light' : 'dark'));
applyTheme('dark');   // 初始：繪製托盤底色、設定圖示

// 徹底防縮放（雙擊放大 + 雙指縮放）— 避免進入縮放狀態打斷 AudioContext
let _lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - _lastTap < 350) e.preventDefault();   // 雙擊放大多在 touchend 觸發，攔這裡才有效
  _lastTap = now;
}, { passive: false });
// iOS Safari 的雙指縮放手勢
['gesturestart', 'gesturechange', 'gestureend'].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault(), { passive: false }));
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });

})();
</script>
</body>
</html>
