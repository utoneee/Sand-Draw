<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>沙畫遊戲 · Peel. Pour. Paint.</title>
<style>
  :root {
    --bg: #1a1208;
    --panel: #2a1f12;
    --gold: #e8b96b;
    --text: #f3e4cc;
    --accent: #d98a4b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: env(safe-area-inset-top, 6px) 8px env(safe-area-inset-bottom, 6px);
  }
  header { text-align: center; position: relative; width: min(80vmin, 460px); }
  .backBtn {
    position: absolute; left: 0; top: 0;
    font-size: 12px; padding: 6px 10px; border-radius: 10px;
    background: var(--panel); color: var(--text);
    border: 1px solid rgba(232,185,107,.25);
  }
  header h1 { font-size: 19px; letter-spacing: 1px; color: var(--gold); font-weight: 600; }
  header .sub { font-size: 11px; letter-spacing: 3px; color: var(--accent); margin-top: 2px; opacity: .85; }

  #stage {
    position: relative;
    width: min(80vmin, 460px);
    height: min(80vmin, 460px);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(232,185,107,.15);
  }
  #stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  #progressWrap {
    width: min(80vmin, 460px);
    height: 10px;
    background: var(--panel);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.4);
  }
  #progressBar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width .15s ease-out;
  }

  .row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .label { font-size: 11px; color: var(--accent); opacity: .8; width: 100%; text-align: center; margin-bottom: -2px; }

  /* 撕膠膜按鈕 */
  .peel {
    font-size: 13px; color: var(--text);
    background: var(--panel); border: 1px solid rgba(232,185,107,.25);
    padding: 7px 12px; border-radius: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: transform .08s, opacity .15s;
  }
  .peel:active { transform: scale(.94); }
  .peel .dot { width: 12px; height: 12px; border-radius: 50%; }
  .peel.peeled { opacity: .45; }
  .peel.peeled::after { content: '✓'; color: var(--gold); font-size: 12px; }

  .swatch {
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; border: 2px solid rgba(0,0,0,.2); transition: transform .08s;
  }
  .swatch:active { transform: scale(.9); }
  .swatch.sel { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,185,107,.5); }

  button {
    font-family: inherit; font-size: 13px;
    color: var(--text); background: var(--panel);
    border: 1px solid rgba(232,185,107,.25);
    padding: 8px 14px; border-radius: 11px;
    cursor: pointer; transition: transform .08s, background .15s;
  }
  button:active { transform: scale(.95); }
  button.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .hint { font-size: 11px; color: var(--accent); opacity: .85; min-height: 15px; text-align: center; }

  /* 遮罩：選圖案 / 完成 */
  .overlay {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; background: rgba(26,18,8,.9); backdrop-filter: blur(4px);
    z-index: 5; text-align: center;
  }
  .overlay.show { display: flex; }
  .overlay .big { font-size: 24px; color: var(--gold); }
  .overlay .small { font-size: 13px; color: var(--text); opacity: .85; }
  .pickRow { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .pickBtn {
    font-family: inherit; font-size: 18px; color: var(--text);
    background: var(--panel); border: 2px solid var(--gold);
    border-radius: 14px; padding: 16px 26px; cursor: pointer;
    transition: transform .1s, background .15s;
  }
  .pickBtn:active { transform: scale(.93); }

  /* 選圖案時隱藏遊戲 UI，避免和選單重疊 */
  #app.picking .gameUi { display: none; }

  /* 完成提示：上方小膠囊，不蓋住作品 */
  #winBanner {
    position: absolute; top: 10px; left: 50%;
    transform: translate(-50%, -20px);
    background: rgba(40,28,12,.88); color: var(--gold);
    padding: 8px 16px; border-radius: 20px; font-size: 12px;
    opacity: 0; transition: opacity .4s, transform .4s;
    pointer-events: none; z-index: 6; max-width: 92%; text-align: center;
  }
  #winBanner.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>
<div id="app" class="picking">
  <header>
    <button id="changeBtn" class="gameUi backBtn">← 換圖案</button>
    <h1>沙畫遊戲</h1>
    <div class="sub">PEEL · POUR · PAINT</div>
  </header>

  <div id="stage">
    <canvas id="bg"></canvas>
    <canvas id="glue"></canvas>
    <canvas id="stuck"></canvas>
    <canvas id="main"></canvas>

    <!-- 開始畫面：先啟用傾斜，再選圖案 -->
    <div class="overlay show" id="pickOverlay">
      <div class="small">① 先啟用傾斜（iPad 必要）</div>
      <button id="tiltBtn" class="pickBtn">啟用傾斜</button>
      <div class="small" id="tiltStatus">　</div>
      <div class="big">② 選一個圖案</div>
      <div class="pickRow" id="pickRow"></div>
    </div>

    <!-- 完成：上方小提示，不蓋住作品 -->
    <div id="winBanner"><span>✨ 完成！慢慢欣賞 · 想換就按左上角「換圖案」</span></div>
  </div>

  <div id="progressWrap" class="gameUi"><div id="progressBar"></div></div>

  <div class="row gameUi" id="peelRow"><div class="label">① 撕膠膜（露出黏貼處）</div></div>
  <div class="row gameUi" id="colorRow"><div class="label">② 點顏色 → 在中央倒一堆沙</div></div>

  <div class="row gameUi">
    <button id="dumpBtn">倒掉散沙</button>
  </div>
  <div class="hint gameUi" id="hint">③ 傾斜 iPad 讓沙滑過膠水黏住 · 填好按「倒掉散沙」換下一色</div>
</div>

<script>
"use strict";
(() => {

// ─────────────────────────────────────────────────────────────
// 設定
// ─────────────────────────────────────────────────────────────
const W = 480, H = 480;
const MAX_PARTICLES = 440;
const SCOOP_AMOUNT = 200;
const STICK_CHANCE = 0.16;
const ACCEL = 0.9;               // 重力加速係數
const DAMP = 0.8;                // 阻尼（低＝摩擦大、會停下不飄）
const MAX_SPEED = 6;
const BASE_GRAVITY = 0.22;       // 永遠存在的微量向下重力（給「下方」的實體感）
const REST_SPEED = 0.14;         // 低於此速度就視為靜止（消除漂浮抖動）
const WIN_RATIO = 0.85;
const OUTSIDE_COLOR = '#6b5638';   // 圖案外圍（不能填的部分）底色
const FILM_GRAY = '#9c9587';       // 未撕膜的貼紙（灰）
const PEELED_WHITE = '#fcf8f0';    // 撕掉膠膜後露出的白色黏貼面

const SAND_COLORS = ['#262626', '#ffffff', '#d23b3b', '#4caf50', '#7a4a22', '#e7c08a', '#f2cf3e', '#5aa9e6'];
const OUTLINE_COLOR = '#262626';   // 黑框（輪廓）填色用的黑沙顏色
const OUTLINE_LW = 11;             // 黑框粗細

// 共用輪廓路徑：本體填色與黑框共用同一條線，邊緣才會貼合
function appleSilhouette(c) {
  c.beginPath();
  c.moveTo(240, 168);
  c.bezierCurveTo(220, 132, 168, 122, 144, 152);
  c.bezierCurveTo(100, 188, 100, 270, 130, 330);
  c.bezierCurveTo(150, 372, 196, 390, 240, 354);
  c.bezierCurveTo(284, 390, 330, 372, 350, 330);
  c.bezierCurveTo(380, 270, 380, 188, 336, 152);
  c.bezierCurveTo(312, 122, 260, 132, 240, 168);
  c.closePath();
}
function bananaSilhouette(c) {
  c.beginPath();
  c.moveTo(130, 168);
  c.bezierCurveTo(185, 126, 300, 138, 372, 252);
  c.bezierCurveTo(384, 280, 362, 304, 334, 298);
  c.bezierCurveTo(262, 252, 200, 250, 140, 214);
  c.bezierCurveTo(116, 204, 116, 180, 130, 168);
  c.closePath();
}

// ─────────────────────────────────────────────────────────────
// 圖案資料：每個區塊只定義 path（不 fill/stroke），由呼叫端決定畫法
// 區塊順序＝遮罩疊加順序（後者覆蓋前者）；黑框放最後，蓋住邊緣
// ─────────────────────────────────────────────────────────────
const PATTERNS = {
  apple: {
    name: '蘋果',
    regions: [
      { id:'body',  label:'果身', color:'#d23b3b', shape: appleSilhouette },
      { id:'leaf',  label:'葉', color:'#4caf50', shape(c){
          c.save(); c.translate(300, 138); c.rotate(-0.5);
          c.beginPath(); c.ellipse(0, 0, 44, 21, 0, 0, 7); c.restore();
      }},
      { id:'stem',  label:'梗', color:'#7a4a22', shape(c){
          c.beginPath();
          c.moveTo(236, 152); c.quadraticCurveTo(246, 112, 262, 102);
          c.lineTo(273, 110); c.quadraticCurveTo(256, 122, 250, 154);
          c.closePath();
      }},
      { id:'shine', label:'反光', color:'#ffe0e0', shape(c){
          c.save(); c.translate(178, 232); c.rotate(-0.4);
          c.beginPath(); c.ellipse(0, 0, 22, 40, 0, 0, 7); c.restore();
      }},
      { id:'outline', label:'黑框', color: OUTLINE_COLOR, stroke:true, lw: OUTLINE_LW, shape: appleSilhouette },
    ],
  },
  banana: {
    name: '香蕉',
    regions: [
      { id:'body',  label:'果身', color:'#f2cf3e', shape: bananaSilhouette },
      { id:'tip',   label:'蒂頭', color:'#5a4020', shape(c){
          c.beginPath(); c.ellipse(132, 176, 16, 13, -0.4, 0, 7);
      }},
      { id:'shine', label:'亮面', color:'#fff3b0', stroke:true, lw:9, shape(c){
          c.beginPath();
          c.moveTo(175, 178);
          c.bezierCurveTo(245, 162, 305, 182, 348, 252);
      }},
      { id:'outline', label:'黑框', color: OUTLINE_COLOR, stroke:true, lw: OUTLINE_LW, shape: bananaSilhouette },
    ],
  },
};

// 把一個區塊畫到 ctx
function paintRegion(ctx, region, opt) {
  ctx.save();
  ctx.globalAlpha = opt.alpha == null ? 1 : opt.alpha;
  ctx.fillStyle = opt.color; ctx.strokeStyle = opt.color;
  const strokeMode = opt.stroke != null ? opt.stroke : region.stroke;
  if (strokeMode) { ctx.lineWidth = opt.lw || region.lw || 9; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; }
  region.shape(ctx);
  if (strokeMode) ctx.stroke(); else ctx.fill();
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────
// LayerManager：依圖案建立遮罩、撕膜狀態、進度
// ─────────────────────────────────────────────────────────────
class LayerManager {
  constructor(pattern) {
    this.pattern = pattern;
    this.regions = pattern.regions;
    this.regionId = new Uint8Array(W * H);   // 0 = 無，1..n
    this.filled   = new Uint8Array(W * H);
    this.peeled   = new Set();                // 已撕膜的區塊 id (1..n)
    this.pxCount  = [0];
    this._build();
  }
  _build() {
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const oc = off.getContext('2d');
    this.regions.forEach((region, i) => {
      const rid = i + 1;
      oc.clearRect(0, 0, W, H);
      paintRegion(oc, region, { color:'#fff' });
      const data = oc.getImageData(0, 0, W, H).data;
      for (let p = 0; p < W * H; p++) if (data[p * 4 + 3] > 40) this.regionId[p] = rid;
      this.pxCount[rid] = 0;
    });
    for (let p = 0; p < W * H; p++) { const r = this.regionId[p]; if (r) this.pxCount[r]++; }
  }
  peel(rid) { this.peeled.add(rid); }
  total() { let t = 0; this.peeled.forEach(r => t += this.pxCount[r]); return t; }
  covered() {
    let c = 0;
    for (let p = 0; p < W * H; p++) if (this.filled[p] && this.peeled.has(this.regionId[p])) c++;
    return c;
  }
  ratio() { const t = this.total(); return t ? this.covered() / t : 0; }
  allPeeled() { return this.peeled.size === this.regions.length; }
  maskAt(x, y) {
    if (x < 0 || y < 0 || x >= W || y >= H) return 0;
    const p = (y | 0) * W + (x | 0);
    const r = this.regionId[p];
    return (r && this.peeled.has(r) && !this.filled[p]) ? r : 0;
  }
  stamp(x, y, r) {
    const x0 = Math.max(0, x - r | 0), x1 = Math.min(W - 1, x + r | 0);
    const y0 = Math.max(0, y - r | 0), y1 = Math.min(H - 1, y + r | 0);
    const r2 = r * r;
    for (let yy = y0; yy <= y1; yy++)
      for (let xx = x0; xx <= x1; xx++) {
        const dx = xx - x, dy = yy - y;
        if (dx * dx + dy * dy > r2) continue;
        const p = yy * W + xx;
        if (this.regionId[p] && this.peeled.has(this.regionId[p]) && !this.filled[p]) this.filled[p] = 1;
      }
  }
}

// ─────────────────────────────────────────────────────────────
// ParticleSystem
// ─────────────────────────────────────────────────────────────
class ParticleSystem {
  constructor() { this.list = []; }
  scoop(color, n) {
    for (let i = 0; i < n && this.list.length < MAX_PARTICLES; i++) {
      const a = Math.random() * 7, rr = Math.random() * 48;
      this.list.push({
        x: W / 2 + Math.cos(a) * rr,
        y: H / 2 + Math.sin(a) * rr,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: 3 + Math.random() * 2,
        c: color,
      });
    }
  }
  step(gx, gy, layers, stuckCtx) {
    const ax = gx * ACCEL, ay = (gy + BASE_GRAVITY) * ACCEL;
    // 1. 套用重力、阻尼、移動、撞牆
    for (const s of this.list) {
      s.vx = (s.vx + ax) * DAMP;
      s.vy = (s.vy + ay) * DAMP;
      const sp = Math.hypot(s.vx, s.vy);
      if (sp > MAX_SPEED) { s.vx = s.vx / sp * MAX_SPEED; s.vy = s.vy / sp * MAX_SPEED; }
      else if (sp < REST_SPEED) { s.vx = 0; s.vy = 0; }   // 太慢就停，不漂浮
      s.x += s.vx; s.y += s.vy;
      if (s.x < s.r) { s.x = s.r; s.vx = 0; }
      else if (s.x > W - s.r) { s.x = W - s.r; s.vx = 0; }
      if (s.y < s.r) { s.y = s.r; s.vy = 0; }
      else if (s.y > H - s.r) { s.y = H - s.r; s.vy = 0; }
    }
    // 2. 沙粒互相推開＝堆疊出厚度與落地感
    this._separate();
    // 3. 滑過膠水時黏住
    const keep = [];
    for (const s of this.list) {
      if (layers && layers.maskAt(s.x, s.y) && Math.random() < STICK_CHANCE) {
        layers.stamp(s.x, s.y, s.r);
        stuckCtx.fillStyle = s.c;
        stuckCtx.beginPath(); stuckCtx.arc(s.x, s.y, s.r, 0, 7); stuckCtx.fill();
      } else keep.push(s);
    }
    this.list = keep;
  }
  // 空間網格做鄰近沙粒分離，避免重疊、形成沙堆
  _separate() {
    const cs = 11, cols = Math.ceil(W / cs);
    const buckets = new Map();
    const key = (cx, cy) => cx * 100000 + cy;
    const L = this.list;
    for (let i = 0; i < L.length; i++) {
      const cx = (L[i].x / cs) | 0, cy = (L[i].y / cs) | 0;
      const k = key(cx, cy);
      let arr = buckets.get(k); if (!arr) { arr = []; buckets.set(k, arr); }
      arr.push(i);
    }
    for (let i = 0; i < L.length; i++) {
      const a = L[i];
      const cx = (a.x / cs) | 0, cy = (a.y / cs) | 0;
      for (let ox = -1; ox <= 1; ox++) for (let oy = -1; oy <= 1; oy++) {
        const arr = buckets.get(key(cx + ox, cy + oy));
        if (!arr) continue;
        for (const j of arr) {
          if (j <= i) continue;
          const b = L[j];
          let dx = b.x - a.x, dy = b.y - a.y;
          const min = a.r + b.r;
          let d2 = dx * dx + dy * dy;
          if (d2 >= min * min || d2 === 0) {
            if (d2 === 0) { dx = (Math.random() - 0.5) * 0.5; dy = (Math.random() - 0.5) * 0.5; d2 = dx * dx + dy * dy; }
            else continue;
          }
          const d = Math.sqrt(d2) || 0.01;
          const push = (min - d) * 0.5;
          const nx = dx / d, ny = dy / d;
          a.x -= nx * push; a.y -= ny * push;
          b.x += nx * push; b.y += ny * push;
        }
      }
    }
    // 推開後再夾回邊界
    for (const s of L) {
      if (s.x < s.r) s.x = s.r; else if (s.x > W - s.r) s.x = W - s.r;
      if (s.y < s.r) s.y = s.r; else if (s.y > H - s.r) s.y = H - s.r;
    }
  }
  draw(ctx) {
    for (const s of this.list) {
      ctx.fillStyle = s.c;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
    }
  }
  clear() { this.list = []; }
}

// ─────────────────────────────────────────────────────────────
// InputManager
// ─────────────────────────────────────────────────────────────
class InputManager {
  constructor() {
    this.gx = 0; this.gy = 1; this.tilt = false;
    this._keys = { x: 0, y: 0 };
    window.addEventListener('keydown', e => this._key(e, 1));
    window.addEventListener('keyup', e => this._key(e, 0));
  }
  _key(e, v) {
    if (e.key === 'ArrowLeft') this._keys.x = -v;
    else if (e.key === 'ArrowRight') this._keys.x = v;
    else if (e.key === 'ArrowUp') this._keys.y = -v;
    else if (e.key === 'ArrowDown') this._keys.y = v;
    else return;
    e.preventDefault();
  }
  gravity() {
    if (this.tilt) return { x: this.gx, y: this.gy };
    if (this._keys.x || this._keys.y) return { x: this._keys.x, y: this._keys.y || 0.2 };
    return { x: 0, y: 1 };
  }
  async enableTilt() {
    const handler = (e) => {
      const g = e.gamma || 0, b = e.beta || 0;
      this.gx = Math.max(-1, Math.min(1, g / 35));
      this.gy = Math.max(-1, Math.min(1, (b - 35) / 35));
      this.tilt = true;
    };
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') { window.addEventListener('deviceorientation', handler); return true; }
        return false;
      } catch { return false; }
    } else if (typeof DeviceOrientationEvent !== 'undefined') {
      window.addEventListener('deviceorientation', handler); return true;
    }
    return false;
  }
}

// ─────────────────────────────────────────────────────────────
// 組裝
// ─────────────────────────────────────────────────────────────
const stage = document.getElementById('stage');
const bg = document.getElementById('bg');
const glueCv = document.getElementById('glue');
const stuck = document.getElementById('stuck');
const main = document.getElementById('main');
[bg, glueCv, stuck, main].forEach(c => { c.width = W; c.height = H; });
const bgCtx = bg.getContext('2d');
const glueCtx = glueCv.getContext('2d');
const stuckCtx = stuck.getContext('2d');
const mainCtx = main.getContext('2d');

bgCtx.fillStyle = OUTSIDE_COLOR;
bgCtx.fillRect(0, 0, W, H);

const particles = new ParticleSystem();
const input = new InputManager();
let layers = null;
let selectedColor = SAND_COLORS[0];
let won = false;

// 畫貼紙板：未撕膜＝灰、撕掉＝白（沙黏在白色面上）
function drawBoard() {
  glueCtx.clearRect(0, 0, W, H);
  if (!layers) return;
  layers.regions.forEach((region, i) => {
    const peeled = layers.peeled.has(i + 1);
    paintRegion(glueCtx, region, { color: peeled ? PEELED_WHITE : FILM_GRAY });
  });
}

// 撕膠膜列
const peelRow = document.getElementById('peelRow');
function buildPeelRow(pattern) {
  peelRow.querySelectorAll('.peel').forEach(el => el.remove());
  pattern.regions.forEach((region, i) => {
    const b = document.createElement('div');
    b.className = 'peel';
    b.innerHTML = `<span class="dot" style="background:${region.color}"></span>${region.label}`;
    b.addEventListener('click', () => {
      layers.peel(i + 1);
      b.classList.add('peeled');
      drawBoard();
    });
    peelRow.appendChild(b);
  });
}

// 顏色盤
const colorRow = document.getElementById('colorRow');
SAND_COLORS.forEach((col, i) => {
  const s = document.createElement('div');
  s.className = 'swatch' + (i === 0 ? ' sel' : '');
  s.style.background = col;
  s.addEventListener('click', () => {
    selectedColor = col;
    colorRow.querySelectorAll('.swatch').forEach(el => el.classList.remove('sel'));
    s.classList.add('sel');
    particles.scoop(col, SCOOP_AMOUNT);
  });
  colorRow.appendChild(s);
});

// 選圖案畫面：縮圖
const pickRow = document.getElementById('pickRow');
const pickOverlay = document.getElementById('pickOverlay');
const winBanner = document.getElementById('winBanner');
const appEl = document.getElementById('app');
const PATTERN_ICONS = { apple: '🍎', banana: '🍌' };
Object.keys(PATTERNS).forEach(key => {
  const b = document.createElement('button');
  b.className = 'pickBtn';
  b.textContent = `${PATTERN_ICONS[key] || ''} ${PATTERNS[key].name}`;
  b.addEventListener('click', () => startPattern(key));
  pickRow.appendChild(b);
});

// 開始一個圖案
function startPattern(key) {
  layers = new LayerManager(PATTERNS[key]);
  particles.clear();
  stuckCtx.clearRect(0, 0, W, H);
  mainCtx.clearRect(0, 0, W, H);
  buildPeelRow(PATTERNS[key]);
  drawBoard();
  won = false;
  winBanner.classList.remove('show');
  pickOverlay.classList.remove('show');
  appEl.classList.remove('picking');
  document.getElementById('progressBar').style.width = '0%';
}

// 回到選圖案
function showPicker() {
  pickOverlay.classList.add('show');
  winBanner.classList.remove('show');
  appEl.classList.add('picking');
}

// 主迴圈
const progressBar = document.getElementById('progressBar');
function loop() {
  const g = input.gravity();
  particles.step(g.x, g.y, layers, stuckCtx);
  mainCtx.clearRect(0, 0, W, H);
  particles.draw(mainCtx);
  if (layers) {
    const r = layers.ratio();
    progressBar.style.width = (r * 100).toFixed(0) + '%';
    if (!won && layers.allPeeled() && r >= WIN_RATIO) {
      won = true; winBanner.classList.add('show');
    }
  }
  requestAnimationFrame(loop);
}
loop();

// 控制鈕
document.getElementById('dumpBtn').addEventListener('click', () => particles.clear());
document.getElementById('changeBtn').addEventListener('click', () => {
  // 已經有沙黏上去才確認，避免把作品清掉；沒進度就直接換
  if (layers && layers.covered() > 0 && !confirm('要換圖案嗎？目前的作品會清掉。')) return;
  showPicker();
});
document.getElementById('tiltBtn').addEventListener('click', async (e) => {
  const ok = await input.enableTilt();
  document.getElementById('tiltStatus').textContent =
    ok ? '✓ 傾斜已啟用' : '此裝置不支援傾斜，將用方向鍵／預設重力';
  if (ok) { e.target.textContent = '傾斜已啟用'; e.target.disabled = true; e.target.style.opacity = .55; }
});

})();
</script>
</body>
</html>
