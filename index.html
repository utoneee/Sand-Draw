<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="沙畫">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon2.png?v=2">
<link rel="icon" type="image/png" href="icon2.png?v=2">
<title>沙畫遊戲 · Peel. Pour. Paint.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── 深灰沉穩（預設）────────────────────────────── */
  :root {
    --bodyBg: #26282c;
    --frameBg: #383b40;
    --onFrame: #ece9e3;
    --muted: #a9a59d;
    --accent: #D6A067;   /* accent 焦糖褐（深色主題暖光版，配炭灰底）；色系出自換色 skill 褐/灰候選 */
    --wellRim: #2c2e32;
    --lineTrack: rgba(255,255,255,.16);
    --chipRing: #383b40;
    --btnBg: rgba(255,255,255,.07);
    --btnBd: rgba(255,255,255,.15);
    --ovl: rgba(28,30,34,.86);
    --card: #43464c;
    --bd: rgba(255,255,255,.12);
    --bd-strong: rgba(255,255,255,.28);
    /* 圓角／凹陷設定（沿用深灰版）*/
    --deviceRadius: 30px;
    --wellRadius: 18px;
    --stageRadius: 13px;
    --rimPad: 7px;
    --font-round: "SF Pro Rounded", ui-rounded, "Hiragino Maru Gothic ProN", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    --font-serif: "Noto Serif TC", "Songti TC", "Source Han Serif TC", serif;
  }
  /* ── 淨白簡約 ────────────────────────────── */
  html.light {
    --bodyBg: #e4ddcc;
    --frameBg: #efe9dd;
    --onFrame: #4a443a;
    --muted: #948c7e;
    --accent: #A9744F;   /* accent 焦糖褐（淺色主題用選定深版，配奶油底）；色系出自換色 skill 褐/灰候選 */
    --wellRim: #e2dac8;
    --lineTrack: rgba(80,72,60,.18);
    --chipRing: #efe9dd;
    --btnBg: rgba(0,0,0,.05);
    --btnBd: rgba(80,72,60,.18);
    --ovl: rgba(239,233,221,.86);
    --card: #fbf6ea;
    --bd: rgba(80,72,60,.16);
    --bd-strong: rgba(80,72,60,.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }  /* 連點不選字、不跳複製/剪下/貼上選單 */
  html, body {
    height: 100%;
    background: var(--bodyBg);
    color: var(--onFrame);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Segoe UI", system-ui, sans-serif;
    overflow: hidden; overscroll-behavior: none; touch-action: none;
  }
  #app {
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top, 8px) 10px env(safe-area-inset-bottom, 8px);
  }

  /* 旋轉提示：遊玩頁 topbar 靜態小字，提醒鎖定螢幕旋轉 */
  .rotTip { font-size: 11px; color: var(--muted); letter-spacing: .3px; white-space: nowrap; opacity: .85; display: inline-flex; align-items: center; gap: 4px; }
  .rotTip svg { width: 13px; height: 13px; flex: 0 0 auto; }
  .rtTxtShort { display: none; }   /* 短版提示僅手機模式顯示（見 body.phone） */

  /* 機身外框 */
  .device {
    width: min(94vw, 88vh, 680px);   /* 放大到貼近 iPad 遊玩尺寸（同時受高度限制，橫放不溢出）*/
    color: var(--onFrame);
    display: flex; flex-direction: column; gap: 13px;
    position: relative;
  }
  .topbar { display: flex; align-items: center; gap: 10px; padding: 0 2px; }
  /* 三顆(主題＋音效＋工具)放大、靠右對齊到色票欄(rail width:100px)右緣 */
  .topbar .tbRight { margin-left: auto; display: flex; gap: 6px; justify-content: flex-end; }
  .topbar .tbRight .iconBtn { width: 38px; height: 38px; }
  .pillBtn {
    font-family: inherit; font-size: 13px; font-weight: 500; white-space: nowrap;
    padding: 10px 16px; border-radius: 20px; background: var(--btnBg); color: var(--onFrame);
    border: 1px solid var(--btnBd); cursor: pointer; transition: transform .08s ease;
  }
  .iconBtn {
    width: 40px; height: 40px; border-radius: 50%; padding: 0; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
    background: var(--btnBg); color: var(--onFrame); border: 1px solid var(--btnBd);
    cursor: pointer; transition: transform .08s ease;
  }
  .pillBtn:active, .iconBtn:active { transform: scale(.94); }
  .pillBtn { display: inline-flex; align-items: center; gap: 5px; }
  .iconBtn svg { width: 21px; height: 21px; }
  .pillBtn svg { width: 16px; height: 16px; }
  #dumpBtn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  #dumpBtn svg { width: 17px; height: 17px; }
  @media (hover:hover) { .iconBtn:hover, .pillBtn:hover { border-color: var(--accent); } }
  .iconBtn.spin svg { animation: btnspin .8s linear infinite; }
  @keyframes btnspin { to { transform: rotate(360deg); } }

  /* 沙盤 + 側欄 */
  .playRow { display: flex; gap: 12px; align-items: stretch; }
  .sandwell {
    position: relative; flex: 1; align-self: flex-start;
    border-radius: var(--wellRadius); padding: var(--rimPad); background: var(--wellRim);
    box-shadow: inset 0 2px 5px rgba(0,0,0,.22), inset 0 -1px 2px rgba(255,255,255,.22);
  }
  .sandwell::after {
    content: ""; position: absolute; inset: var(--rimPad); border-radius: var(--stageRadius);
    pointer-events: none; z-index: 4; box-shadow: inset 0 3px 7px -3px rgba(0,0,0,.28);
  }
  #stage {
    position: relative; width: 100%; aspect-ratio: 1/1;
    border-radius: var(--stageRadius); overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
  }
  #stage > canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .rail { width: 100px; display: flex; flex-direction: column; align-items: center; }
  /* min-height 固定保留最多色盤(B=18 色/9 列=9*34+8*22=482px)的高度，切換 A/B/C 不跑版 */
  .rail #colorRow { display: grid; grid-template-columns: repeat(2, 34px); gap: 22px 26px; justify-content: center; align-content: start; min-height: 482px; }
  .rail #colorTabs { display: flex; gap: 5px; margin-top: 10px; margin-bottom: 18px; justify-content: center; }
  .grpTab { width: 24px; height: 24px; border-radius: 7px; padding: 0; font-size: 12px; font-weight: 600;
    background: var(--btnBg); color: var(--muted); border: 1px solid var(--btnBd); cursor: pointer; transition: transform .08s; }
  .grpTab:active { transform: scale(.9); }
  .grpTab.on { color: var(--onFrame); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .rail .tools { margin-top: auto; padding-top: 12px; width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .rail .tools #dumpBtn, .rail .tools #peelBtn { width: 100%; height: 52px; font-size: 13px; font-family: var(--font-round); letter-spacing: 1px; border-radius: 7px; }
  /* 撕下：選中貼紙才亮（accent 邊框），沒選中則灰掉不可按 */
  #peelBtn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  #peelBtn svg { width: 17px; height: 17px; }
  #peelBtn.armed { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); color: var(--onFrame); }
  #peelBtn:disabled { opacity: .4; cursor: default; }
  .swatch {
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer; flex: 0 0 auto;
    box-shadow: 0 2px 4px rgba(0,0,0,.28), inset 0 1px 2px rgba(255,255,255,.4), inset 0 -2px 3px rgba(0,0,0,.22);
    transition: transform .1s ease, box-shadow .15s ease;
  }
  .swatch:active { transform: scale(.88); }
  .swatch.sel {
    transform: scale(1.12);
    box-shadow: 0 0 0 2px var(--chipRing), 0 0 0 4px var(--accent), 0 3px 6px rgba(0,0,0,.3);
  }

  /* 底部細線進度 */
  .baseline { height: 3px; border-radius: 3px; background: var(--lineTrack); overflow: hidden; }
  .baseline > #progressBar { height: 100%; width: 0%; border-radius: 3px; background: var(--accent); transition: width .15s ease-out; }

  .hint { font-size: 11px; color: var(--muted); min-height: 15px; text-align: center; line-height: 1.5; }

  /* 遮罩：選圖案 / 完成 */
  .overlay {
    position: absolute; inset: 0; z-index: 5;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 13px; background: var(--ovl); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    text-align: center; padding: 18px;
  }
  .overlay.show { display: flex; }
  .overlay .big { font-family: var(--font-round); font-size: 16px; color: var(--onFrame); font-weight: 600; letter-spacing: .5px; white-space: nowrap; }
  .overlay .small { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .overlay button {
    font-family: inherit; font-size: 13px; font-weight: 500; color: var(--onFrame); white-space: nowrap;
    background: var(--btnBg); border: 1px solid var(--btnBd); padding: 9px 18px; border-radius: 12px; cursor: pointer;
  }
  .overlay button:active { transform: scale(.95); }
  .stepDot {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: 600;
    background: var(--accent); color: #fff; margin-right: 6px; vertical-align: -3px;
  }
  .pickRow { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
  .pickBtn {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-family: var(--font-round); font-size: 14px; font-weight: 600; color: var(--onFrame);
    background: var(--card); border: 1px solid var(--bd);
    border-radius: 16px; padding: 14px 14px 11px; cursor: pointer;
    transition: transform .12s ease, border-color .15s, box-shadow .15s;
    box-shadow: 0 6px 16px -8px rgba(0,0,0,.5);
  }
  .pickBtn:hover { border-color: var(--bd-strong); }
  .pickBtn:active { transform: scale(.93); }
  .pickBtn canvas { width: 84px; height: 84px; display: block; border-radius: 11px; }

  /* 顆粒造型切換 */
  .grainPick { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .grainLabel { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .grainToggle { display: flex; gap: 10px; }
  .grainOpt {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    font-family: var(--font-round); font-size: 11px; font-weight: 600; color: var(--muted);
    background: var(--card); border: 1px solid var(--bd); border-radius: 13px;
    padding: 9px 14px 7px; cursor: pointer; transition: transform .1s ease, border-color .15s, color .15s;
  }
  .grainOpt svg { width: 30px; height: 30px; display: block; }
  .grainOpt svg polygon, .grainOpt svg rect {
    fill: color-mix(in srgb, var(--accent) 26%, transparent);
    stroke: var(--accent); stroke-width: 2; stroke-linejoin: round;
  }
  .grainOpt:active { transform: scale(.94); }
  .grainOpt.sel { color: var(--onFrame); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  /* 選圖案時隱藏遊戲 UI，避免和選單重疊 */
  #app.picking .gameUi { display: none; }

  /* 完成提示：上方小膠囊，不蓋住作品 */
  #winBanner {
    position: absolute; top: 12px; left: 50%;
    transform: translate(-50%, -20px);
    background: var(--frameBg); color: var(--accent);
    border: 1px solid var(--bd-strong);
    padding: 9px 16px; border-radius: 22px; font-size: 11.5px; font-weight: 500;
    box-shadow: 0 6px 18px -6px rgba(0,0,0,.5);
    opacity: 0; transition: opacity .45s ease, transform .45s ease;
    pointer-events: none; z-index: 6; max-width: 92%; text-align: center;
  }
  #winBanner.show { opacity: 1; transform: translate(-50%, 0); }

  /* ── 選圖：畫廊 + 單張聚焦（全螢幕）── */
  .screen-ov {
    position: fixed; inset: 0; z-index: 20; display: none;
    flex-direction: column; background: var(--bodyBg); color: var(--onFrame);
    font-family: var(--font-round);
  }
  .screen-ov.show { display: flex; }
  .ovTop { display: flex; align-items: center; gap: 10px; padding: calc(env(safe-area-inset-top,10px) + 12px) 22px 6px; }
  .ovUpd { font-size: 11px; color: var(--muted); letter-spacing: .5px; white-space: nowrap; opacity: .95; margin-left: auto; }

  .galScroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px 22px calc(env(safe-area-inset-bottom,16px) + 28px); scrollbar-width: none; }
  .galScroll::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .galHead { padding: 14px 2px 18px; }
  .galHead .over { font-size: 10px; letter-spacing: 4px; color: var(--accent); font-weight: 600; }
  .galHead h2 { font-size: 25px; font-weight: 650; margin: 9px 0 5px; letter-spacing: 1px; }
  .galHead h2.brand { font-size: 31px; font-weight: 650; letter-spacing: 4px; }

  .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { font-family: inherit; font-size: 12px; padding: 7px 14px; border-radius: 16px; white-space: nowrap; cursor: pointer;
    color: var(--muted); background: transparent; border: 1px solid var(--bd); }
  .chip.on { color: #2a2017; background: var(--accent); border-color: var(--accent); font-weight: 600; }

  .galGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 14px; }
  @media (min-width: 640px) { .galGrid { grid-template-columns: 1fr 1fr 1fr; } }
  .galCard { background: var(--btnBg); border: 1px solid var(--bd); border-radius: 16px; padding: 8px 8px 12px; cursor: pointer;
    font-family: inherit; text-align: left; color: var(--onFrame); transition: transform .12s ease, border-color .15s; }
  .galCard:active { transform: scale(.96); }
  .galCard:hover { border-color: var(--bd-strong); }
  .galCard canvas { width: 100%; height: auto; display: block; border-radius: 12px; box-shadow: inset 0 2px 6px -2px rgba(0,0,0,.26); }
  .gcName { font-size: 13.5px; font-weight: 600; margin-top: 9px; padding-left: 2px; }
  .gcTag { font-size: 9.5px; color: var(--muted); padding-left: 2px; letter-spacing: 1px; margin-top: 1px; }

  /* 單張聚焦 */
  .focTop { width: min(74vw, 300px); display: flex; align-items: center; justify-content: space-between; padding: 0; }
  .ovGhost { font-family: inherit; font-size: 13px; color: var(--muted); background: none; border: none; cursor: pointer; }
  .ovChip { font-family: inherit; font-size: 12px; color: var(--accent); cursor: pointer;
    background: none; border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); padding: 7px 13px; border-radius: 16px; }
  .focStage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    padding: 16px 26px calc(env(safe-area-inset-bottom,16px) + 24px); }
  .focBig canvas { width: min(74vw, 300px); height: min(74vw, 300px); border-radius: 22px;
    box-shadow: 0 24px 48px -18px rgba(0,0,0,.55), inset 0 2px 8px -3px rgba(0,0,0,.28); }
  .focCap { width: min(74vw, 300px); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .focNav { width: 42px; height: 42px; border-radius: 50%; cursor: pointer; flex: 0 0 auto;
    background: var(--btnBg); border: 1px solid var(--btnBd); color: var(--onFrame); font-size: 18px;
    display: flex; align-items: center; justify-content: center; }
  .focCapMid { flex: 1; min-width: 0; text-align: center; }
  .focCapMid .nm { font-size: 24px; font-weight: 650; letter-spacing: 2px; }
  .focCapMid .tg { font-size: 11px; color: var(--accent); letter-spacing: 3px; margin-top: 4px; }
  .focGrain { display: flex; align-items: center; gap: 10px; }
  .focGrain > span { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .focToggle { display: flex; gap: 6px; }
  .gOpt { font-family: inherit; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
    background: var(--btnBg); border: 1px solid var(--bd); border-radius: 12px; padding: 7px 14px; }
  .gOpt.sel { color: var(--onFrame); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .focStart { font-family: inherit; font-size: 15px; font-weight: 650; color: #20242a; cursor: pointer; white-space: nowrap;
    background: var(--accent); border: none; padding: 14px 46px; border-radius: 28px; letter-spacing: 1px;
    box-shadow: 0 12px 24px -12px color-mix(in srgb, var(--accent) 80%, transparent); transition: transform .1s ease; }
  .focStart:active { transform: scale(.97); }
  .focTilt { font-size: 11px; color: var(--muted); min-height: 14px; text-align: center; }

  /* ── 遊玩工具面板（齒輪浮動）── */
  .iconBtn.hot { background: color-mix(in srgb, var(--accent) 26%, transparent); border-color: var(--accent); color: #fff; }
  #toolPanel {
    position: absolute; top: 46px; right: 0; width: 234px; z-index: 10; display: none;
    background: var(--frameBg); border: 1px solid var(--bd-strong); border-radius: 18px; padding: 14px 15px 16px;
    box-shadow: 0 22px 44px -18px rgba(0,0,0,.7); color: var(--onFrame); font-family: var(--font-round);
  }
  #toolPanel.open { display: block; }
  .tpHead { font-size: 13px; font-weight: 650; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .tpX { background: none; border: none; color: var(--muted); font-size: 19px; line-height: 1; cursor: pointer; }
  .tpGrp + .tpGrp { margin-top: 14px; padding-top: 13px; border-top: 1px solid var(--bd); }
  .tiltRow { display: flex; align-items: center; gap: 9px; }
  .tlight { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: 0 0 auto; transition: background .2s, box-shadow .2s; }
  .tlight.on { background: #9aa384; box-shadow: 0 0 0 3px color-mix(in srgb, #9aa384 28%, transparent); }
  .tlabel { font-size: 12px; font-weight: 600; }
  .tsub { font-size: 10.5px; color: var(--onFrame); margin-left: auto; background: var(--btnBg); border: 1px solid var(--btnBd); padding: 5px 10px; border-radius: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .ctlLabel { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 7px; }
  .seg { display: flex; gap: 6px; }
  .segBtn { font-family: var(--font-round); font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
    background: var(--btnBg); border: 1px solid var(--bd); border-radius: 11px; padding: 8px 0; flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px; }
  .segBtn svg { width: 18px; height: 18px; }
  .segBtn svg polygon, .segBtn svg rect { fill: color-mix(in srgb, var(--accent) 26%, transparent); stroke: var(--accent); stroke-width: 2; stroke-linejoin: round; }
  .segBtn.sel { color: var(--onFrame); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .pourWrap { margin: 2px 0 4px; }
  .pourLbl { display: block; font-size: 10.5px; color: var(--muted); letter-spacing: 1px; margin-bottom: 5px; text-align: center; }
  #pourSeg .segBtn { padding: 6px 0; font-size: 11.5px; }
  .sizeRow { display: flex; align-items: center; gap: 11px; }
  .sizeRow .cap { font-size: 10.5px; color: var(--muted); flex: 0 0 auto; }
  #sizeRange { flex: 1; -webkit-appearance: none; appearance: none; height: 5px; border-radius: 3px; background: var(--lineTrack); }
  #sizeRange::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #f0ece5; box-shadow: 0 2px 5px rgba(0,0,0,.4); cursor: pointer; }
  #sizeRange::-moz-range-thumb { width: 18px; height: 18px; border: none; border-radius: 50%; background: #f0ece5; box-shadow: 0 2px 5px rgba(0,0,0,.4); cursor: pointer; }

  /* 大標「沙畫」那一列（右側放隨機/收藏圓鈕）*/
  .titleRow { display: flex; align-items: center; gap: 13px; margin: 9px 0 5px; }
  .titleRow h2 { margin: 0; white-space: nowrap; }

  /* 亮色版：減輕陰影深度 */
  html.light .focBig canvas { box-shadow: 0 14px 30px -16px rgba(80,72,60,.30), inset 0 2px 8px -3px rgba(80,72,60,.16); }
  html.light .galCard canvas { box-shadow: inset 0 1px 4px -2px rgba(80,72,60,.18); }
  .ovGhost, .ovChip, .gOpt, .focGrain > span, .focCapMid .nm { white-space: nowrap; }

  /* ── v36：選圖頁大標的圓鈕（隨機笑臉／收藏愛心，外框不變色）── */
  .heroBtns { display: flex; gap: 9px; margin-left: auto; }
  .circBtn { width: 44px; height: 44px; border-radius: 50%; flex: 0 0 auto; cursor: pointer; font-family: inherit;
    background: var(--btnBg); border: 1px solid var(--btnBd); color: var(--onFrame);
    display: flex; align-items: center; justify-content: center; transition: border-color .15s, transform .12s ease; }
  .circBtn:hover { border-color: var(--bd-strong); }
  .circBtn:active { transform: scale(.92); }
  .circBtn svg { width: 22px; height: 22px; }

  /* ── v36：返回鈕（確定頁／收藏頁共用，箭頭統一）── */
  .navBack { font-family: inherit; font-size: 14px; color: var(--muted); background: none; border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 2px; }
  .navBack svg { width: 16px; height: 16px; }

  /* ── v36：確定頁「換一張」文字＋笑臉圓鈕 ── */
  .rerollWrap { display: flex; align-items: center; gap: 9px; margin-left: auto; }
  .rerollLbl { font-size: 13px; color: var(--muted); letter-spacing: 1px; }

  /* ── v36：收藏（展示）頁 ── */
  .albTitle { font-size: 16px; font-weight: 600; letter-spacing: 3px; margin-left: 4px; }
  .albEditBtn { font-family: inherit; font-size: 12px; color: var(--onFrame); cursor: pointer; margin-left: auto;
    background: none; border: 1px solid var(--btnBd); padding: 7px 14px; border-radius: 15px; }
  .albBar { display: none; align-items: center; justify-content: space-between; padding: 0 22px 6px;
    font-size: 13px; color: var(--muted); }
  #album.editing .albBar { display: flex; }
  .albBar b { color: var(--onFrame); }
  .albDel { font-family: inherit; font-size: 13px; cursor: pointer; padding: 6px 15px; border-radius: 15px;
    background: transparent; border: 1px solid color-mix(in srgb, #d8694f 60%, transparent); color: #e0907e; }
  .albEmpty { display: none; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.9; padding: 60px 20px; }
  .albCard { position: relative; border: 1px solid var(--bd); border-radius: 16px; padding: 0; overflow: hidden; cursor: pointer;
    background: var(--btnBg); transition: transform .12s ease, border-color .15s; }
  .albCard:active { transform: scale(.96); }
  .albCard canvas { width: 100%; height: auto; display: block; }
  #album.editing .albCard { cursor: default; }
  .albCard .chk { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%;
    background: rgba(20,20,22,.5); border: 1.5px solid #fff; color: transparent;
    display: none; align-items: center; justify-content: center; }
  #album.editing .albCard .chk { display: flex; }
  .albCard .chk svg { width: 15px; height: 15px; }
  .albCard.sel { border-color: var(--accent); }
  .albCard.sel .chk { background: var(--accent); border-color: var(--accent); color: #2a2017; }

  /* ── 收藏放大燈箱：點圖卡全螢幕、點任意處關閉 ── */
  #lightbox { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center;
    background: rgba(12,11,10,.86); backdrop-filter: blur(6px); padding: 24px; cursor: zoom-out; }
  #lightbox.show { display: flex; }
  /* 用 width 撐到目標尺寸（快照原生 300px，不設 width 會只顯示 300px、比展覽卡還小）；高度過高時退回 86vh */
  #lightbox img { width: min(88vw, 86vh, 500px); height: auto; border-radius: 18px;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,.8); image-rendering: auto; }

  /* ── 美術館方向：襯線標題（招牌「沙畫」與題名）── */
  .galHead h2 { font-family: var(--font-serif); font-weight: 600; }
  .focCapMid .nm { font-family: var(--font-serif); }
  .gcName { font-family: var(--font-serif); display: flex; align-items: center; gap: 7px; }
  html.light .galCard.done canvas { box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent), inset 0 1px 4px -2px rgba(80,72,60,.18); }
  /* 完成揭曉：沙面微光由下而上掃過一次 */
  #winShimmer { position: absolute; left: -10%; right: -10%; height: 55%; bottom: -55%; z-index: 5; pointer-events: none; opacity: 0;
    background: linear-gradient(0deg, rgba(255,248,232,0) 0%, rgba(255,248,232,.6) 50%, rgba(255,248,232,0) 100%); mix-blend-mode: screen; }
  #winShimmer.play { animation: shimmerSweep 1.9s cubic-bezier(.4,0,.3,1) forwards; }
  @keyframes shimmerSweep { 0% { transform: translateY(0); opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translateY(-300%); opacity: 0; } }
  #winBanner { font-family: var(--font-serif); }
  #winBanner .ic { color: var(--accent); margin-right: 6px; }

  /* ===== 手機模式（body.phone）：使用者在選圖頁手動切換，平板版面（無此 class）完全不受影響。
     只做「直式堆疊」一套版面（沙盤上、色票下）；不分螢幕方向，橫放也沿用同一套。
     沙盤加 max-width:86vh 上限：直式時 width:100% 勝出＝吃滿寬；橫放時改受高度限制、置中、不掉回平板左右排版。 ===== */
  #layoutBtn svg { width: 21px; height: 21px; }
  body.phone .device { width: min(98vw, 100%); gap: 10px; }
  body.phone .playRow { flex-direction: column; gap: 12px; align-items: stretch; }
  body.phone .sandwell { width: 100%; max-width: 86vh; margin: 0 auto; align-self: stretch; flex: none; }
  body.phone .rail { width: 100%; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 12px; }
  body.phone #colorTabs { order: 1; margin: 0; }
  body.phone .rail .tools { order: 2; margin: 0 0 0 auto; padding: 0; width: auto; flex-direction: row; gap: 8px; }
  body.phone .rail .tools #dumpBtn, body.phone .rail .tools #peelBtn { width: auto; height: 44px; padding: 0 22px; }
  body.phone #colorRow {
    order: 3; flex: 0 0 100%; padding: 2px 0;
    grid-template-columns: repeat(auto-fill, 34px); justify-content: center;
    align-content: center; gap: 16px 16px;
    min-height: 140px;   /* 預留最多色盤(3列)高度 → 切 A/B/C 總高不變、畫面不跳；少色的 C 自動垂直置中 */
  }
  body.phone .hint { display: none; }   /* 手機畫面小 → 隱藏下方說明小字，把空間留給沙盤 */
  /* 手機 topbar 太窄：鎖旋轉提示換成短版「要鎖旋轉」，避免長文 nowrap 撐寬把右側3顆鈕擠出畫面 */
  body.phone .rotTip .rtTxt { display: none; }
  body.phone .rotTip .rtTxtShort { display: inline; }
  body.phone .rotTip { margin-right: 2px; }
</style>

<script>
"use strict";
(() => {

// ─────────────────────────────────────────────────────────────
// 設定
// ─────────────────────────────────────────────────────────────
const W = 480, H = 480;
const MAX_PARTICLES = 1300;      // 上限提高，容納更大坨的沙
const BUILD = 'v51';   // 版號：每次改完只動這一處（對應 git tag vN-backup），JS 自動同步顯示
{ const el = document.getElementById('ovUpd'); if (el) el.textContent = BUILD; }
const SCOOP_AMOUNT = 450;        // 單次倒沙量（1300/450≈3，倒滿上限約需3次，中間可換色混色）
const MIX_STRENGTH = 0.45;       // 沙混色強度（B 減法相乘）：0=不混(純新色) 1=全相乘(最深)；交界沙落別色舊沙時生效
const MIX_THRESH = 90;           // 判定「不同色」門檻（曼哈頓色差）：低於此視為同色不混。要高於「同色顆粒明暗差」否則單色區會冒暗雜質點
const PACK = 0.68;               // 分離目標距離倍率（<1＝容許重疊、擠成沙堆而非排排站）
const STICK_CHANCE = 0.85;        // 黏贴機率（越高＝沙黏得越快、剩沙少→不易混色溢出）
const ACCEL = 1.1;               // 重力加速係數（提高＝沙落得更乾脆，不慢飄）
const DAMP = 0.8;                // 阻尼（低＝摩擦大、會停下不飄）
const MAX_SPEED = 7.5;
const SPEED_FAST = 2.2;          // 「快」速度倍率（手機畫面小、視覺偏慢時切此檔）；乘在加速度與速度上限
const SPEED_KEY = 'sandplay.speed';
let speedMult = (() => { try { return localStorage.getItem(SPEED_KEY) === 'fast' ? SPEED_FAST : 1; } catch (e) { return 1; } })();
const POUR_POS = { center: [W / 2, H / 2], bl: [104, 376] };   // 落沙點：中央 / 左下角（左下離牆夠遠、撒沙叢不貼邊）
const POUR_KEY = 'sandplay.pour';
let pourKey = (() => { try { return POUR_POS[localStorage.getItem(POUR_KEY)] ? localStorage.getItem(POUR_KEY) : 'center'; } catch (e) { return 'center'; } })();
const BASE_GRAVITY = 0.32;       // 永遠存在的微量向下重力（給「下方」的實體感）
const REST_SPEED = 0.24;         // 低於此速度就視為靜止（提高＝更快停、減少緩慢漂移）
const SLEEP_EPS = 0.4;           // 一幀淨位移小於此 → 視為沒動
const SLEEP_FRAMES = 6;          // 連續這麼多幀幾乎沒動 → 沙粒睡著（靜止不再被重力推、不抖）
const SEPARATE_ITERS = 2;        // 分離鬆弛迭代次數（越多＝堆得越緊實，但較耗效能）
const WIN_RATIO = 0.85;
// 主題：深灰沉穩 / 淨白簡約（只影響盤面、貼紙、托盤質感，不動沙作品）
const THEMES = {
  // 深灰沉穩（預設）：板岩灰托盤
  dark: {
    trayA:'#4e5258', trayB:'#393d43',                 // 板岩灰托盤（外圍不可填區）
    woodGrain:'rgba(0,0,0,.24)', woodHi:'rgba(255,255,255,.06)',
    film:'#8f9298', filmHi:'rgba(255,255,255,.12)',   // 未撕的灰膜
    peeled:'#dcd7cb',                                  // 撕開後的黏貼面（淺，讓白沙看得見）
    fiberDark:'rgba(0,0,0,.12)', fiberLight:'rgba(255,255,255,.10)',
    diecut:'#5c5f64',
    thumbPaper:'#565b62', silTone:'#828893',          // 剪影卡：灰卡紙底 + 淺灰鬼影
  },
  // 淨白簡約：淺米托盤
  light: {
    trayA:'#f1ece1', trayB:'#e7e0d1',
    woodGrain:'rgba(120,110,90,.08)', woodHi:'rgba(255,255,255,.5)',
    film:'#d7cfbd', filmHi:'rgba(255,255,255,.55)',
    peeled:'#c6bb9e',                                  // 加深卡其：與白沙拉開明度差，白沙浮得出來

// ─────────────────────────────────────────────────────────────
// 圖案資料：每個區塊只定義 path（不 fill/stroke），由呼叫端決定畫法
// 區塊順序＝遮罩疊加順序（後者覆蓋前者）；黑框放最後，蓋住邊緣
// ─────────────────────────────────────────────────────────────
// 形狀產生器（療癒母題）
const _ring = (r) => (c) => { c.beginPath(); c.arc(240, 240, r, 0, 7); };
const _disc = (x, y, r) => (c) => { c.beginPath(); c.arc(x, y, r, 0, 7); };
const _ell = (x, y, rx, ry, rot) => (c) => { c.beginPath(); c.ellipse(x, y, rx, ry, rot || 0, 0, 7); };
const _star = (x, y, s) => (c) => { c.beginPath(); for (let i = 0; i < 8; i++) { const a = -Math.PI/2 + i*Math.PI/4, rr = i%2 ? s*0.4 : s; const px = x+Math.cos(a)*rr, py = y+Math.sin(a)*rr; i ? c.lineTo(px, py) : c.moveTo(px, py); } c.closePath(); };
const _poly = (pts) => (c) => { c.beginPath(); pts.forEach((p, i) => i ? c.lineTo(p[0], p[1]) : c.moveTo(p[0], p[1])); c.closePath(); };
// 多顆星畫成同一條路徑 → 同一個區塊（分散小物件一起撕開）
const _stars = (list) => (c) => { c.beginPath(); for (const [x, y, s] of list) { for (let i = 0; i < 8; i++) { const a = -Math.PI/2 + i*Math.PI/4, rr = i%2 ? s*0.4 : s; const px = x+Math.cos(a)*rr, py = y+Math.sin(a)*rr; i ? c.lineTo(px, py) : c.moveTo(px, py); } c.closePath(); } };
const _wave = (topY, amp, ph) => (c) => { c.beginPath(); c.moveTo(0, 430); c.lineTo(0, topY); for (let x = 0; x <= 480; x += 12) { c.lineTo(x, topY + Math.sin(x*0.0185 + ph)*amp); } c.lineTo(480, 430); c.closePath(); };

// SVG 向量路徑 → 區塊。在 Illustrator / Figma / Inkscape 畫好匯出，把每段 path 的 d 字串貼進來。
// 預設座標系 480×480（請以 viewBox="0 0 480 480" 出圖，座標才會 1:1）。
// 若稿不是這尺寸，傳 {scale, dx, dy} 校正；要描邊輪廓傳 {stroke:true, lw:11}。
// 用法：svgRegion('#d23b3b', 'M240 168 C... Z')
function svgRegion(color, d, opt) {
  opt = opt || {};
  let p2d;
  if (opt.scale || opt.dx || opt.dy) {
    const s = opt.scale || 1;
    p2d = new Path2D();
    p2d.addPath(new Path2D(d), new DOMMatrix([s, 0, 0, s, opt.dx || 0, opt.dy || 0]));
  } else {
    p2d = new Path2D(d);
  }
  return { color, p2d, stroke: opt.stroke, lw: opt.lw, fillRule: opt.fillRule || 'nonzero' };
}

// 遮罩式區塊：把一張白色遮罩 canvas 染成指定顏色（依 mask+color 快取，免每幀重算）
const _tintCache = new WeakMap();
function tintMask(mask, color) {
  let m = _tintCache.get(mask); if (!m) { m = new Map(); _tintCache.set(mask, m); }
  let c = m.get(color); if (c) return c;
  c = document.createElement('canvas'); c.width = W; c.height = H;
  const x = c.getContext('2d');
  x.drawImage(mask, 0, 0);
  x.globalCompositeOperation = 'source-in';
  x.fillStyle = color; x.fillRect(0, 0, W, H);
  m.set(color, c); return c;
}

// 把一個區塊畫到 ctx
function paintRegion(ctx, region, opt) {
  const ownM = region.ownMask;                        // ownMask＝實際擁有像素（重疊已解決）
  if (ownM) {
    ctx.save();
    ctx.globalAlpha = opt.alpha == null ? 1 : opt.alpha;
    ctx.drawImage(tintMask(ownM, opt.color), 0, 0);
    ctx.restore();
    return;
  }
  ctx.save();
  ctx.globalAlpha = opt.alpha == null ? 1 : opt.alpha;
  ctx.fillStyle = opt.color; ctx.strokeStyle = opt.color;
  const strokeMode = opt.stroke != null ? opt.stroke : region.stroke;
  if (strokeMode) { ctx.lineWidth = opt.lw || region.lw || 9; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; }
  if (region.p2d) {                                   // SVG 向量路徑區塊（Path2D）
    if (strokeMode) ctx.stroke(region.p2d); else ctx.fill(region.p2d, region.fillRule);
  } else {
    region.shape(ctx);
    if (strokeMode) ctx.stroke(); else ctx.fill();
  }
  ctx.restore();
}

// 視覺工具：沙粒顆粒上色 + 程序紙纖維紋理（純繪製，不影響邏輯）
// ─────────────────────────────────────────────────────────────
function hexToRgb(h){ h=h.replace('#',''); if(h.length===3) h=h.split('').map(x=>x+x).join(''); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function clamp8(v){ return v<0?0:v>255?255:v|0; }
function mix(rgb, target, t){ return [clamp8(rgb[0]+(target-rgb[0])*t), clamp8(rgb[1]+(target-rgb[1])*t), clamp8(rgb[2]+(target-rgb[2])*t)]; }
function rgbStr(r){ return 'rgb('+r[0]+','+r[1]+','+r[2]+')'; }
const _grainCache = new Map();
function grainShades(hex){
  let s = _grainCache.get(hex);
  if (!s) {
    const c = hexToRgb(hex);
    s = {
      darkest: mix(c, 0, 0.34), dark: mix(c, 0, 0.18),
      base: c, light: mix(c, 255, 0.16), lightest: mix(c, 255, 0.34),
      hi: mix(c, 255, 0.5),
    };
    _grainCache.set(hex, s);
  }
  return s;
}

// ── 多角細沙：每色預烘焙數張「顆粒團」貼圖，drawImage 取代逐顆描路徑 ──
//   顆粒造型：'angular' = 多角不規則（預設）｜'faceted' = 方菱小面（可在開始畫面切換）
let GRAIN_SHAPE = 'angular';      // 固定多角（方菱外觀差異不大，已移除切換）
const SAND_SIZE = 0.42;           // 沙粒大小（固定；要改大小直接調此值）
const GRAIN_SCALE = 0.7;          // 顆粒相對大小（70%）：每團裝多顆更細的沙
const RP = 7;                     // sprite 內顆粒基準半徑
const SPRITE = 20;                // sprite 畫布尺寸（含陰影/高光邊距）
const GRAIN_VARIANTS = 8;         // 每色預烘焙的隨機變體數
const _spriteCache = new Map();   // hex -> [canvas,...]

function _gh(a, b){ const x = Math.sin(a*127.1 + b*311.7) * 43758.5453; return x - Math.floor(x); }
// 描出單顆造型路徑（中心 cx,cy、約略半徑 r、旋轉 rot）
function _traceGrain(ctx, cx, cy, r, rot, sd, shape){
  ctx.beginPath();
  if (shape === 'faceted') {                       // 方/菱
    const sq = sd < 0.5;
    for (let i = 0; i < 4; i++){ const a = rot + i*1.5708, rr = r*(sq ? 1 : (i%2 ? 0.7 : 1.15));
      const px = cx+Math.cos(a)*rr, py = cy+Math.sin(a)*rr; i ? ctx.lineTo(px,py) : ctx.moveTo(px,py); }
    ctx.closePath(); return;
  }
  const n = 4 + Math.floor(sd*3);                  // angular：4–6 邊不規則多角
  for (let i = 0; i < n; i++){
    const jr = 0.64 + _gh(r+sd, i)*0.6;            // 各頂點半徑抖動 → 稜角
    const ja = (i + (_gh(r+sd, i+9)-0.5)*0.55) / n * 6.283;
    const a = rot + ja, rr = r*jr, px = cx+Math.cos(a)*rr, py = cy+Math.sin(a)*rr;
    i ? ctx.lineTo(px,py) : ctx.moveTo(px,py);
  }
  ctx.closePath();
}
// 在 sprite 上畫一顆有立體感的細沙（接觸陰影＋球體漸層＋亮度抖動＋高光＋偶發反光）
function _drawOneGrain(ctx, x, y, r, g, sd, shape){
  const rot = sd*6.283;
  const lum = 0.299*g.base[0] + 0.587*g.base[1] + 0.114*g.base[2];
  const shA = lum > 195 ? 0.05 : lum > 158 ? 0.09 : 0.17;   // 淺色沙再淡接觸陰影 → 不偏髒
  const edge = lum > 195 ? 0.03 : lum > 158 ? 0.05 : 0.09;  // 淺色邊緣也少壓暗
  ctx.globalAlpha = shA; ctx.fillStyle = rgbStr(g.darkest);
  _traceGrain(ctx, x+r*0.15, y+r*0.2, r*0.96, rot, sd, shape); ctx.fill(); ctx.globalAlpha = 1;
  const jb = mix(g.base, sd<0.5 ? 0 : 255, _gh(sd, r)*0.12);
  const grd = ctx.createRadialGradient(x-r*0.3, y-r*0.34, r*0.08, x, y, r);
  grd.addColorStop(0, rgbStr(mix(jb,255,0.24))); grd.addColorStop(0.55, rgbStr(jb)); grd.addColorStop(1, rgbStr(mix(jb,0,edge)));
  ctx.fillStyle = grd; _traceGrain(ctx, x, y, r*0.92, rot, sd, shape); ctx.fill();
  // 反差細邊：只有近白沙(lum>195)才描深邊解決淺底看不見；其餘大地色一律描淺邊，避免中性色被壓濁變灰
  if (lum > 195) {                                  // 近白沙：極淡細邊，不再灰髒（仍保留一絲輪廓）
    ctx.globalAlpha = 0.20; ctx.lineWidth = Math.max(0.6, r*0.1); ctx.strokeStyle = rgbStr(mix(g.base, 0, 0.18));
    _traceGrain(ctx, x, y, r*0.92, rot, sd, shape); ctx.stroke(); ctx.globalAlpha = 1;
  } else if (lum > 158) {                            // 淺色（淺米/淺灰/粉彩）：細邊但不壓濁
    ctx.globalAlpha = 0.26; ctx.lineWidth = Math.max(0.7, r*0.12); ctx.strokeStyle = rgbStr(mix(g.base, 0, 0.24));
    _traceGrain(ctx, x, y, r*0.92, rot, sd, shape); ctx.stroke(); ctx.globalAlpha = 1;
  } else {                                          // 其餘色：淡淺邊提輪廓，不弄濁顏色
    ctx.globalAlpha = 0.32; ctx.lineWidth = Math.max(0.7, r*0.14); ctx.strokeStyle = rgbStr(mix(g.base, 255, 0.5));
    _traceGrain(ctx, x, y, r*0.92, rot, sd, shape); ctx.stroke(); ctx.globalAlpha = 1;
  }
  ctx.globalAlpha = 0.55; ctx.fillStyle = rgbStr(g.hi);
  ctx.beginPath(); ctx.arc(x-r*0.3, y-r*0.32, r*0.22, 0, 7); ctx.fill(); ctx.globalAlpha = 1;
  if (sd > 0.9){ ctx.globalAlpha = 0.85; ctx.fillStyle = rgbStr(mix(g.hi,255,0.45));
    ctx.beginPath(); ctx.arc(x-r*0.18, y-r*0.2, r*0.12, 0, 7); ctx.fill(); ctx.globalAlpha = 1; }
}
// 烘焙一張「顆粒團」：3–4 顆 70% 細多角沙填滿一個物理沙粒的範圍
function _bakeGrain(hex, vi, shape){
  const g = grainShades(hex);
  const c = document.createElement('canvas'); c.width = SPRITE; c.height = SPRITE;
  const ctx = c.getContext('2d');
  const cx = SPRITE/2, cy = SPRITE/2, sb = vi*2.71 + 0.13;
  const sub = 3 + Math.floor(_gh(sb, 7)*2);
  const arr = [{ dx:0, dy:0, gr: RP*0.5 }];   // 主粒（基準半徑，下方再乘 GRAIN_SCALE）
  for (let k = 1; k < sub; k++){ const a = _gh(sb,k)*6.283, d = RP*(0.3 + _gh(sb,k+3)*0.35);
    arr.push({ dx: Math.cos(a)*d, dy: Math.sin(a)*d, gr: RP*(0.36 + _gh(sb,k+5)*0.16) }); }
  arr.sort((a,b)=> a.dy - b.dy);
  for (const o of arr){ const x = cx+o.dx, y = cy+o.dy, sd = _gh(sb, x*0.7+y);
    _drawOneGrain(ctx, x, y, o.gr*GRAIN_SCALE, g, sd, shape); }
  return c;
}
function grainSprites(hex){
  const key = hex + '|' + GRAIN_SHAPE;
  let a = _spriteCache.get(key);
  if (!a){ a = []; for (let i = 0; i < GRAIN_VARIANTS; i++) a.push(_bakeGrain(hex, i, GRAIN_SHAPE)); _spriteCache.set(key, a); }
  return a;

// 取代原 paintGrain：貼一張預烘焙的多角細沙團，依半徑挑變體（穩定不閃爍）
function paintGrain(ctx, x, y, r, hex){
  const sprites = grainSprites(hex);
  const spr = sprites[(Math.floor(r*997)) % GRAIN_VARIANTS];
  const ds = r * 2.4;                                // sprite 覆蓋約 2.4r → 維持原覆蓋
  ctx.drawImage(spr, x - ds/2, y - ds/2, ds, ds);

// 切換顆粒造型（sprite 依 hex|shape 分別快取，不需清除）

const _fiberTex = {};
function fiberTexFor(themeKey){

    x.fillStyle = Math.random() < 0.5 ? t.fiberDark : t.fiberLight;

    x.fillRect(Math.random()*W, Math.random()*H, s, s);
  }
  for (let i = 0; i < 240; i++) {                     // 少量短纖維
    x.strokeStyle = Math.random() < 0.5 ? t.fiberDark : t.fiberLight;
    x.globalAlpha = Math.random() * 0.4; x.lineWidth = 0.6;
    const px = Math.random()*W, py = Math.random()*H, a = Math.random()*Math.PI, len = 3 + Math.random()*5;
    x.beginPath(); x.moveTo(px, py); x.lineTo(px + Math.cos(a)*len, py + Math.sin(a)*len); x.stroke();
  }
  _fiberTex[themeKey] = c; return c;
}

// ─────────────────────────────────────────────────────────────
// LayerManager：依圖案建立遮罩、撕膜狀態、進度
// ─────────────────────────────────────────────────────────────
class LayerManager {
  constructor(pattern) {
    this.pattern = pattern;
    // 若 pattern 有 fillRule，套用到所有未指定的 region
    if (pattern.fillRule) {
      pattern.regions.forEach(r => { if (!r._fillRuleSet) { r.fillRule = pattern.fillRule; r._fillRuleSet = true; } });
    }
    this.regions = pattern.regions;
    this.regionId = new Uint8Array(W * H);   // 0 = 無，1..n
    this.filled   = new Uint8Array(W * H);
    this.peeled   = new Set();                // 已撕膜的區塊 id (1..n)
    this.bgIds    = new Set();                // 背景區塊 id：可撕可填，但不計完整度、不進剪影
    this.objIds   = [];                       // 物件（主體）區塊 id：完成度只看這些
    this.pxCount  = [0];
    this.coveredCount = 0;                     // 已填像素數（增量維護，免每幀全掃）
    this.totalCount = 0;                       // 已撕區塊的總像素數
    this._build();
  }
  _build() {
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const oc = off.getContext('2d');
    this.regions.forEach((region, i) => {
      const rid = i + 1;
      if (region.bg) this.bgIds.add(rid); else this.objIds.push(rid);
      oc.clearRect(0, 0, W, H);
      paintRegion(oc, region, { color:'#fff' });
      const data = oc.getImageData(0, 0, W, H).data;
      for (let p = 0; p < W * H; p++) if (data[p * 4 + 3] > 40) this.regionId[p] = rid;
      this.pxCount[rid] = 0;
    });
    for (let p = 0; p < W * H; p++) { const r = this.regionId[p]; if (r) this.pxCount[r]++; }
    // 每塊「實際擁有的像素」遮罩：取自 regionId（重疊處後畫的贏），讓顯示/質感/高亮與「撕」的歸屬一致。
    // 只給向量填色區塊套用；描線型(stroke)維持原本畫法。
    {
      const ids = this.regions.map(() => null);
      this.regions.forEach((region, i) => {
        if (region.stroke) return;
        ids[i] = new ImageData(W, H);
      });
      for (let p = 0; p < W * H; p++) {
        const r = this.regionId[p]; if (!r) continue;
        const id = ids[r - 1]; if (!id) continue;
        const o = p * 4; id.data[o] = 255; id.data[o + 1] = 255; id.data[o + 2] = 255; id.data[o + 3] = 255;
      }
      this.regions.forEach((region, i) => {
        if (!ids[i]) return;
        const c = document.createElement('canvas'); c.width = W; c.height = H;
        c.getContext('2d').putImageData(ids[i], 0, 0);
        region.ownMask = c;
      });
    }
    this.bgMaskUnion = null;
  }
  peel(rid) {
    if (this.peeled.has(rid)) return;          // 防止重複撕導致總數重複累加
    this.peeled.add(rid);
    if (!this.bgIds.has(rid)) this.totalCount += this.pxCount[rid];   // 背景不計入完整度分母
  }
  covered() { return this.coveredCount; }
  ratio() { return this.totalCount ? this.coveredCount / this.totalCount : 0; }
  allPeeled() { return this.objIds.every(id => this.peeled.has(id)); }   // 只要主體都撕開即可，背景與否不影響完成
  maskAt(x, y) {
    if (x < 0 || y < 0 || x >= W || y >= H) return 0;
    const p = (y | 0) * W + (x | 0);
    const r = this.regionId[p];
    return (r && this.peeled.has(r) && !this.filled[p]) ? r : 0;
  }
  stamp(x, y, r) {
    const x0 = Math.max(0, x - r | 0), x1 = Math.min(W - 1, x + r | 0);
    const y0 = Math.max(0, y - r | 0), y1 = Math.min(H - 1, y + r | 0);
    const r2 = r * r;
    for (let yy = y0; yy <= y1; yy++)
      for (let xx = x0; xx <= x1; xx++) {
        const dx = xx - x, dy = yy - y;
        if (dx * dx + dy * dy > r2) continue;
        const p = yy * W + xx;
        const rg = this.regionId[p];
        if (rg && this.peeled.has(rg) && !this.filled[p]) {
          this.filled[p] = 1;
          if (!this.bgIds.has(rg)) this.coveredCount++;   // 背景沙照樣黏住、照樣顯示，只是不算進完整度
        }
      }
  }
}

// ─────────────────────────────────────────────────────────────
// ParticleSystem
// ─────────────────────────────────────────────────────────────
class ParticleSystem {
  constructor() { this.list = []; }
  scoop(color, n) {
    let added = 0;
    const [px, py] = POUR_POS[pourKey] || POUR_POS.center;   // 依目前落沙點決定湧沙位置
    for (let i = 0; i < n && this.list.length < MAX_PARTICLES; i++) {
      const a = Math.random() * 7, rr = Math.random() * 48;
      this.list.push({
        x: px + Math.cos(a) * rr,
        y: py + Math.sin(a) * rr,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: (3 + Math.random() * 2) * SAND_SIZE,
        c: color,
      });
      added++;
    }
    return added;                                // 回傳實際倒出顆數：0＝容器已滿（供音效判斷）
  }
  scoopAt(color, n, cx, cy) {                  // 桌面測試：在指定座標撒沙（Shift+拖曳畫沙用）
    for (let i = 0; i < n && this.list.length < MAX_PARTICLES; i++) {
      const a = Math.random() * 7, rr = Math.random() * 10;
      this.list.push({
        x: cx + Math.cos(a) * rr,
        y: cy + Math.sin(a) * rr,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: (3 + Math.random() * 2) * SAND_SIZE,
        c: color,
      });
    }
  }
  step(gx, gy, layers, stuckCtx) {
    const ax = gx * ACCEL * speedMult, ay = (gy + BASE_GRAVITY) * ACCEL * speedMult;
    const maxSp = MAX_SPEED * speedMult;
    // 傾斜／拖曳改變重力方向 → 喚醒整堆，讓沙重新流動
    if (this._lgx === undefined || Math.abs(gx - this._lgx) + Math.abs(gy - this._lgy) > 0.05) {
      for (const s of this.list) { s.sleep = false; s.still = 0; }
    }
    this._lgx = gx; this._lgy = gy;
    // 1. 套用重力、阻尼、移動、撞牆（睡著的沙不動，不被重力反覆推 → 靜止不抖）
    for (const s of this.list) {
      s.ox = s.x; s.oy = s.y;
      if (s.sleep) continue;
      s.vx = (s.vx + ax) * DAMP;
      s.vy = (s.vy + ay) * DAMP;
      const sp = Math.hypot(s.vx, s.vy);
      if (sp > maxSp) { s.vx = s.vx / sp * maxSp; s.vy = s.vy / sp * maxSp; }
      else if (sp < REST_SPEED) { s.vx = 0; s.vy = 0; }   // 太慢就停，不漂浮
      s.x += s.vx; s.y += s.vy;
      if (s.x < s.r) { s.x = s.r; s.vx = 0; }
      else if (s.x > W - s.r) { s.x = W - s.r; s.vx = 0; }
      if (s.y < s.r) { s.y = s.r; s.vy = 0; }
      else if (s.y > H - s.r) { s.y = H - s.r; s.vy = 0; }
    }
    // 2. 沙粒互相推開＝堆疊出厚度與落地感
    this._separate();
    // 2b. 沉睡判定：這一幀淨位移幾乎為零的沙，累積數幀後睡著；被推動或傾斜時自動醒來
    for (const s of this.list) {
      const moved = Math.abs(s.x - s.ox) + Math.abs(s.y - s.oy);
      if (moved < SLEEP_EPS) {
        if (!s.sleep && (s.still = (s.still || 0) + 1) >= SLEEP_FRAMES) { s.sleep = true; s.vx = 0; s.vy = 0; }
      } else { s.still = 0; s.sleep = false; }
    }
    // 3. 滑過膠水時黏住
    const keep = [];
    for (const s of this.list) {
      if (layers && layers.maskAt(s.x, s.y) && Math.random() < STICK_CHANCE) {
        layers.stamp(s.x, s.y, s.r);
        // 同色實底（半徑小於顆粒貼圖、藏在底下）→ 保證填滿不露貼紙、又不會讓單顆看起來偏大；
        // 再密疊數顆「同尺寸」顆粒做堆疊質感（仿檢視圖）。
        const _sh = grainShades(s.c);
        // B 沙混色（減法風格 RGB 相乘）：探落點底下是否已有「別色」舊沙 →
        //   底色 × 新色算出混色實心畫（不再用半透明）；空白底/同色維持純新色（純色區乾淨）。
        let _baseRGB = _sh.base, _grainHex = s.c;
        const _px = stuckCtx.getImageData(s.x | 0, s.y | 0, 1, 1).data;
        if (_px[3] > 40) {
          const _d = Math.abs(_px[0] - _sh.base[0]) + Math.abs(_px[1] - _sh.base[1]) + Math.abs(_px[2] - _sh.base[2]);
          const _nl = 0.299 * _sh.base[0] + 0.587 * _sh.base[1] + 0.114 * _sh.base[2];
          // 不同色才混；只有「近純白」跳過（相乘下白＝單位元會被底色吃掉）。
          // 用「最低色版 > 240」判白：純白三版皆 255；米白/奶油帶黃，最低版偏低 → 照常混。
          const _wht = Math.min(_sh.base[0], _sh.base[1], _sh.base[2]) > 240;
          if (_d > MIX_THRESH && !_wht) {
            let t = MIX_STRENGTH;
            const _ol = 0.299 * _px[0] + 0.587 * _px[1] + 0.114 * _px[2];
            // 有暗色參與就放輕：相乘碰到暗色易過強/塌黑，依「較暗者」亮度收斂強度
            //   （淺+深、深+深都會軟下來；淺+淺較暗者仍亮 → 不受影響）
            const _dk = Math.min(_ol, _nl);
            if (_dk < 130) t *= 0.35 + 0.65 * (_dk / 130);
            const _m = i => clamp8(_sh.base[i] + (_px[i] * _sh.base[i] / 255 - _sh.base[i]) * t);
            _baseRGB = [_m(0), _m(1), _m(2)];
            // grain 量化成 32 階混色 hex（步幅減半，過渡更平滑、不像單色雜質），仍避免 sprite cache 失控
            _grainHex = '#' + _baseRGB.map(v => (((v >> 3) << 3) | 4).toString(16).padStart(2, '0')).join('');
          }
        }
        stuckCtx.fillStyle = rgbStr(_baseRGB);
        stuckCtx.beginPath(); stuckCtx.arc(s.x, s.y, s.r * 0.95, 0, 7); stuckCtx.fill();
        paintGrain(stuckCtx, s.x, s.y, s.r, _grainHex);
        for (let k = 0; k < 3; k++) {
          const a = Math.random() * 6.283, d = s.r * (0.25 + Math.random() * 0.45);
          paintGrain(stuckCtx, s.x + Math.cos(a) * d, s.y + Math.sin(a) * d, s.r * (0.82 + Math.random() * 0.26), _grainHex);
        }
      } else keep.push(s);
    }
    this.list = keep;
  }
  // 空間網格做鄰近沙粒分離，避免重疊、形成沙堆。多迭代＝堆得更緊實
  _separate() {
    const cs = 11;
    const key = (cx, cy) => cx * 100000 + cy;
    const L = this.list;
    for (let iter = 0; iter < SEPARATE_ITERS; iter++) {
      const buckets = new Map();
      for (let i = 0; i < L.length; i++) {
        const cx = (L[i].x / cs) | 0, cy = (L[i].y / cs) | 0;
        const k = key(cx, cy);
        let arr = buckets.get(k); if (!arr) { arr = []; buckets.set(k, arr); }
        arr.push(i);
      }
      for (let i = 0; i < L.length; i++) {
        const a = L[i];
        const cx = (a.x / cs) | 0, cy = (a.y / cs) | 0;
        for (let ox = -1; ox <= 1; ox++) for (let oy = -1; oy <= 1; oy++) {
          const arr = buckets.get(key(cx + ox, cy + oy));
          if (!arr) continue;
          for (const j of arr) {
            if (j <= i) continue;
            const b = L[j];
            let dx = b.x - a.x, dy = b.y - a.y;
            const min = (a.r + b.r) * PACK;
            let d2 = dx * dx + dy * dy;
            if (d2 >= min * min || d2 === 0) {
              if (d2 === 0) { dx = (Math.random() - 0.5) * 0.5; dy = (Math.random() - 0.5) * 0.5; d2 = dx * dx + dy * dy; }
              else continue;
            }
            const d = Math.sqrt(d2) || 0.01;
            const push = (min - d) * 0.5;
            const nx = dx / d, ny = dy / d;
            a.x -= nx * push; a.y -= ny * push;
            b.x += nx * push; b.y += ny * push;
            if (a.sleep || b.sleep) { a.sleep = false; b.sleep = false; a.still = b.still = 0; }  // 被擠到就醒
          }
        }
      }
    }
    // 推開後再夾回邊界
    for (const s of L) {
      if (s.x < s.r) s.x = s.r; else if (s.x > W - s.r) s.x = W - s.r;
      if (s.y < s.r) s.y = s.r; else if (s.y > H - s.r) s.y = H - s.r;
    }
  }
  draw(ctx) {
    for (const s of this.list) {
      // 先鋪一塊實心底圓＝找回美化前的團塊體積感，再疊顆粒紋理（保留美化質感）
      ctx.fillStyle = rgbStr(grainShades(s.c).base);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.92, 0, 7); ctx.fill();
      paintGrain(ctx, s.x, s.y, s.r, s.c);   // 散沙：顆粒明暗 + 微高光
    }
  }
  clear() { this.list = []; }
}

// ─────────────────────────────────────────────────────────────
// InputManager
// ─────────────────────────────────────────────────────────────
class InputManager {
  constructor() {
    this.gx = 0; this.gy = 1; this.tilt = false;
    this.manual = null;
    this._tiltBound = false;
    this._keys = { x: 0, y: 0 };
    window.addEventListener('keydown', e => this._key(e, 1));
    window.addEventListener('keyup', e => this._key(e, 0));
  }
  _key(e, v) {
    if (e.key === 'ArrowLeft') this._keys.x = -v;
    else if (e.key === 'ArrowRight') this._keys.x = v;
    else if (e.key === 'ArrowUp') this._keys.y = -v;
    else if (e.key === 'ArrowDown') this._keys.y = v;
    else return;
    e.preventDefault();
  }
  gravity() {
    if (this.manual) return this.manual;
    if (this.tilt) return { x: this.gx, y: this.gy };
    if (this._keys.x || this._keys.y) return { x: this._keys.x, y: this._keys.y || 0.2 };
    return { x: 0, y: 1 };
  }
  async enableTilt() {
    // 只在真正有觸控的裝置啟用（桌面無傳感器時 beta=0 會造成重力反向）
    const hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (!hasTouch) return false;
    if (this._tiltBound) return true;   // 已綁定就跳過，避免每次開始圖案重複加 listener
    const handler = (e) => {
      const g = e.gamma || 0, b = e.beta || 0;
      this.gx = Math.max(-1, Math.min(1, g / 35));
      this.gy = Math.max(-1, Math.min(1, (b - 35) / 35));
      this.tilt = true;
    };
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') { window.addEventListener('deviceorientation', handler); this._tiltBound = true; return true; }
        return false;
      } catch { return false; }
    } else if (typeof DeviceOrientationEvent !== 'undefined') {
      window.addEventListener('deviceorientation', handler); this._tiltBound = true; return true;
    }
    return false;
  }
}

const stage = document.getElementById('stage');
const bg = document.getElementById('bg');
const glueCv = document.getElementById('glue');
const stuck = document.getElementById('stuck');
const main = document.getElementById('main');
[bg, glueCv, stuck, main].forEach(c => { c.width = W; c.height = H; });
const bgCtx = bg.getContext('2d');
const glueCtx = glueCv.getContext('2d');
const stuckCtx = stuck.getContext('2d');
const mainCtx = main.getContext('2d');

// 主題狀態 + 套用
let themeKey = 'dark';   // dark = 深灰沉穩（預設） · light = 淨白簡約
function drawTray() {
  const t = TH;
  const g = bgCtx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, t.trayA); g.addColorStop(1, t.trayB);
  bgCtx.fillStyle = g; bgCtx.fillRect(0, 0, W, H);
  bgCtx.save();
  for (let i = 0; i < 46; i++) {                      // 木紋／長纖維直紋
    const px = Math.random() * W;
    bgCtx.strokeStyle = Math.random() < 0.5 ? t.woodGrain : t.woodHi;
    bgCtx.globalAlpha = 0.3 + Math.random() * 0.5;
    bgCtx.lineWidth = 0.4 + Math.random() * 1.1;
    bgCtx.beginPath();
    for (let yy = 0; yy <= H; yy += 10) {
      const xx = px + Math.sin(yy * 0.025 + px) * 3;
      if (yy === 0) bgCtx.moveTo(xx, yy); else bgCtx.lineTo(xx, yy);
    }
    bgCtx.stroke();
  }
  bgCtx.globalAlpha = 0.5;
  bgCtx.drawImage(fiberTexFor(themeKey), 0, 0);        // 疊上紙纖維斑點
  bgCtx.restore();
}
// 把紙纖維/膜光澤質感貼進某個「面」區塊
function textureRegion(region, peeled) {
  const ownM = region.ownMask;
  if (ownM) {                                         // 遮罩式區塊：先做質感再用遮罩裁形
    const t = document.createElement('canvas'); t.width = W; t.height = H;
    const tx = t.getContext('2d');
    if (peeled) { tx.globalAlpha = 0.9; tx.drawImage(fiberTexFor(themeKey), 0, 0); }
    else {
      const g = tx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, 'rgba(255,255,255,0)'); g.addColorStop(0.42, TH.filmHi); g.addColorStop(0.62, 'rgba(255,255,255,0)');
      tx.fillStyle = g; tx.fillRect(0, 0, W, H);
    }
    tx.globalCompositeOperation = 'destination-in'; tx.drawImage(ownM, 0, 0);
    glueCtx.drawImage(t, 0, 0);
    return;
  }
  glueCtx.save();
  if (region.p2d) glueCtx.clip(region.p2d, region.fillRule);
  else { region.shape(glueCtx); glueCtx.clip(); }
  if (peeled) {                                        // 撕開＝黏貼面紙纖維
    glueCtx.globalAlpha = 0.9;
    glueCtx.drawImage(fiberTexFor(themeKey), 0, 0);
  } else {                                             // 未撕＝膜的斜向光澤
    const g = glueCtx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.42, TH.filmHi);
    g.addColorStop(0.62, 'rgba(255,255,255,0)');
    glueCtx.fillStyle = g; glueCtx.fillRect(0, 0, W, H);
  }
  glueCtx.restore();
}

const particles = new ParticleSystem();
const input = new InputManager();
let layers = null;
let armedRegion = 0;                  // 撕之前確認：第一下點選的待撕區塊 id（0=無）
const ARMED_HI = '#FFC83D';          // 待撕高亮色（暖金，深淺底都看得到；要換亮色改這裡）
let won = false;
let currentKey = null;

// ── 音效（Web Audio 即時合成，無外部檔案）──
const Sound = {
  ctx: null, muted: false, _noise: null, _slideOut: null,
  _bedSrc: null, _bedGain: null,   // 方案A：顆粒層底下的連續底噪（黏合劑，極低音量）
  init() {
    if (this.ctx) { if (this.ctx.state === 'suspended') this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    const len = Math.floor(this.ctx.sampleRate * 1.0);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    this._noise = buf;
  },
  pour() {                                    // 倒沙：依參考檔＝一段持續約1秒的「沙流」（漸起→維持→漸收），非短促拋落
    if (this.muted || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const t = this.ctx.currentTime;
    const src = this.ctx.createBufferSource(); src.buffer = this._noise; src.loop = true;
    const hp = this.ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 900;   // 砍掉低頻轟鳴＝去鑼鼓感
    const lp = this.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 9000; lp.Q.value = 0.3;  // 明亮輕盈（rainstick）
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.07, t + 0.08);            // 音量降低、柔起
    g.gain.setValueAtTime(0.07, t + 0.34);                     // 維持＝傾倒流
    g.gain.exponentialRampToValueAtTime(0.0004, t + 0.72);     // 漸收
    src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(this.ctx.destination);
    src.start(t); src.stop(t + 0.76);
  },
  _fullAt: 0,
  full() {                                    // 容器已滿提示：柔和下行兩音（G4→D4），與倒沙(噪音流)、完成(上行三音)明顯區隔
    if (this.muted || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const now = this.ctx.currentTime;
    if (now - this._fullAt < 0.4) return;     // 節流：連點不洗版
    this._fullAt = now;
    const lp = this.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3200; lp.Q.value = 0.5;  // 低通拉高＝亮度透出，iPad 小喇叭才聽得到
    lp.connect(this.ctx.destination);
    [523.25, 392.0].forEach((f, i) => {       // 下行兩音 C5→G4：提到中頻(iPad 喇叭最響段)，仍是「不行/滿了」語意（對比 ding 上行）
      const t = now + i * 0.13;
      const o = this.ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.13, t + 0.02);       // iPad 實測加大音量
      g.gain.exponentialRampToValueAtTime(0.0006, t + 0.28);
      o.connect(g); g.connect(lp);
      o.start(t); o.stop(t + 0.3);
    });
  },
  _ensureSlideOut() {
    if (this._slideOut || !this.ctx) return;
    this._slideOut = this.ctx.createGain(); this._slideOut.gain.value = 1.0;
    this._slideOut.connect(this.ctx.destination);
    // 連續噪音床：HP+LP 塑形後接可調音量節點
    const hp = this.ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 800;
    const lp = this.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 7000;
    this._bedGain = this.ctx.createGain(); this._bedGain.gain.value = 0;
    const bedSrc = this.ctx.createBufferSource(); bedSrc.buffer = this._noise; bedSrc.loop = true;
    bedSrc.connect(hp); hp.connect(lp); lp.connect(this._bedGain); this._bedGain.connect(this._slideOut);
    bedSrc.start();
    this._bedSrc = bedSrc;
  },
  slideTick(activity) {
    if (this.muted || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this._ensureSlideOut();
    const now = this.ctx.currentTime;
    // 音量跟著活躍度平滑升降，無離散 burst → 不會啪啪
    const target = activity > 4 ? Math.min(0.018, activity / 900) : 0;
    const tc = target > 0 ? 1.6 : 0.12;
    this._bedGain.gain.setTargetAtTime(target, now, tc);
  },
  slideOff() {
    if (this._bedGain && this.ctx) this._bedGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.12);
  },
  ding() {                                    // 完成：柔和三音
    if (this.muted || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    [523.25, 659.25, 783.99].forEach((f, i) => {
      const t = this.ctx.currentTime + i * 0.16;
      const o = this.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.16, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0008, t + 0.9);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(t); o.stop(t + 1.0);
    });
  },
  toggle() {
    this.muted = !this.muted;
    if (this.muted) { this.slideOff(); }
    else { this.init(); }
    return this.muted;
  },
};

function captureSnapshot() {

  // 貼紙板：把背景區挨掉，未填的背景露出乾淨底紙（填了的背景沙在 stuck 上照常顯示）

// 畫貼紙板：未撕膜＝灰、撕掉＝黏貼面；加紙纖維/光澤質感與刀模壓痕
function drawBoard() {
  glueCtx.clearRect(0, 0, W, H);
  if (!layers) return;
  // 1. 底色：灰膜 / 撕開的黏貼面
  layers.regions.forEach((region, i) => {
    const peeled = layers.peeled.has(i + 1);
    paintRegion(glueCtx, region, { color: peeled ? TH.peeled : TH.film });
  });
  // 2. 質感：只處理「面」區塊（描線型如亮面/黑框略過）
  layers.regions.forEach((region, i) => {
    if (region.stroke) return;
    textureRegion(region, layers.peeled.has(i + 1));
  });
  // 3. 刀模壓痕：只畫「未撕」區塊邊緣，做亮邊+暗溝的浮雕感，撕開後消失
  glueCtx.save();
  glueCtx.lineCap = 'round'; glueCtx.lineJoin = 'round';
  glueCtx.setLineDash([5, 3]);
  layers.regions.forEach((region, i) => {
    if (layers.peeled.has(i + 1)) return;
    glueCtx.globalAlpha = 0.5; glueCtx.lineWidth = 1; glueCtx.strokeStyle = TH.filmHi;
    glueCtx.save(); glueCtx.translate(0, -0.7);
    if (region.p2d) glueCtx.stroke(region.p2d); else { region.shape(glueCtx); glueCtx.stroke(); }
    glueCtx.restore();
    glueCtx.globalAlpha = 0.6; glueCtx.lineWidth = 1.3; glueCtx.strokeStyle = TH.diecut;
    if (region.p2d) glueCtx.stroke(region.p2d); else { region.shape(glueCtx); glueCtx.stroke(); }
  });
  glueCtx.restore();
  // 5. 待確認撕除高亮：畫在最上層（連同輪廓線/黑框一起變亮金），第二下才撕
  if (armedRegion && !layers.peeled.has(armedRegion)) {
    const region = layers.regions[armedRegion - 1];
    if (region) {
      paintRegion(glueCtx, region, { color: ARMED_HI, alpha: 0.75 });
    }
  }
  updatePeelBtn();
}

// 同步「撕下」鈕：選中可撕的貼紙才亮起可按，否則灰掉
function updatePeelBtn() {
  const b = document.getElementById('peelBtn');
  if (!b) return;
  const ready = !!(armedRegion && layers && !layers.peeled.has(armedRegion));
  b.disabled = !ready;
  b.classList.toggle('armed', ready);
}

// 把螢幕座標換算成畫布(W×H)座標
function mapToBoard(clientX, clientY) {
  const rect = stage.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width * W;
  const y = (clientY - rect.top) / rect.height * H;
  return { x, y };
}

// 點圖面撕貼紙：點到哪一塊就撕開那塊
function tapToPeel(clientX, clientY) {
  if (!layers) return;
  const { x, y } = mapToBoard(clientX, clientY);
  if (x < 0 || y < 0 || x >= W || y >= H) return;
  const rid = layers.regionId[(y | 0) * W + (x | 0)];
  if (!rid || layers.peeled.has(rid)) { if (armedRegion) { armedRegion = 0; drawBoard(); } return; }  // 點空白/已撕→取消確認
  if (armedRegion === rid) { layers.peel(rid); armedRegion = 0; drawBoard(); }   // 同區第二下→撕下
  else { armedRegion = rid; drawBoard(); }                                       // 第一下或換區→變色待確認
}
// 盤面互動：輕點 = 擕開貼紙；拖曳 = 傾斜（無陕螺裝置、桌面也能玩，可測完成）
let _pd = null, _dragged = false;
main.addEventListener('pointerdown', e => { _pd = { x: e.clientX, y: e.clientY }; _dragged = false; });
main.addEventListener('pointermove', e => {
  if (!_pd) return;
  // 桌面測試：按住 Shift 拖曳＝直接在游標處畫沙（不傾斜）
  if (e.shiftKey) {
    _dragged = true; input.manual = null;
    const { x, y } = mapToBoard(e.clientX, e.clientY);
    if (x >= 0 && y >= 0 && x < W && y < H) particles.scoopAt(selColor, 6, x, y);
    return;
  }
  const dx = e.clientX - _pd.x, dy = e.clientY - _pd.y;
  if (!_dragged && Math.hypot(dx, dy) < 7) return;
  _dragged = true;
  input.manual = { x: Math.max(-1, Math.min(1, dx / 90)), y: Math.max(-1, Math.min(1, dy / 90)) };
});
function _endDrag(e) {
  if (_pd && !_dragged) tapToPeel(_pd.x, _pd.y);
  _pd = null; input.manual = null;
}
main.addEventListener('pointerup', _endDrag);
main.addEventListener('pointercancel', _endDrag);
main.addEventListener('pointerleave', e => { if (_pd) { _pd = null; input.manual = null; } });

// 線稿縮圖（描出每塊輪廓，辨識度遠高於實心剪影；描線色跟主題 silTone 走）
function drawLineart(canvas, pattern, S) {
  canvas.width = S * 2; canvas.height = S * 2;
  canvas.style.width = S + 'px'; canvas.style.height = S + 'px';
  const x = canvas.getContext('2d'); x.setTransform(1,0,0,1,0,0); x.scale(2, 2);
  x.clearRect(0, 0, S, S);
  x.fillStyle = TH.thumbPaper; x.fillRect(0, 0, S, S);
  x.save(); x.globalAlpha = 0.5; x.drawImage(fiberTexFor(themeKey), 0, 0, W, H, 0, 0, S, S); x.restore();
  x.save(); x.scale(S / W, S / W);
  x.strokeStyle = TH.silTone; x.lineCap = 'round'; x.lineJoin = 'round';
  pattern.regions.forEach(r => {
    if (r.bg) return;                        // 背景不畫：縮圖維持物件外型
    x.lineWidth = r.stroke ? (r.lw || 9) : 7;   // 描線型沿用原線寬；填色型一律描成 7px 輪廓
    if (r.p2d) { x.stroke(r.p2d); }
    else { r.shape(x); x.stroke(); }
    x.beginPath();
  });
  x.restore();
}

speedSeg.querySelectorAll('.segBtn').forEach(b => b.addEventListener('click', () => applySpeed(b.dataset.speed)));

// 落沙點（色票下方）：中央 / 左下，記憶於 localStorage；切換時盤面閃現落沙位置標記
const pourSeg = document.getElementById('pourSeg');
let pourMarkT = 0;   // 標記顯示的起始時間戳（0＝不顯示）；只在切換時設定
function applyPour(key, flash) {
  pourKey = POUR_POS[key] ? key : 'center';
  try { localStorage.setItem(POUR_KEY, pourKey); } catch (e) {}
  pourSeg.querySelectorAll('.segBtn').forEach(b => b.classList.toggle('sel', b.dataset.pour === pourKey));
  if (flash) pourMarkT = performance.now();
}
pourSeg.querySelectorAll('.segBtn').forEach(b => b.addEventListener('click', () => applyPour(b.dataset.pour, true)));
applyPour(pourKey, false);   // 開機同步選中態（不閃標記）

// ── 收藏（展示）頁：相簿牆＋編輯模式批次刪 ──
const albumEl = document.getElementById('album');
const albGrid = document.getElementById('albGrid');
const albEmpty = document.getElementById('albEmpty');
const albSelN = document.getElementById('albSelN');
const albEditBtn = document.getElementById('albEdit');
let albSel = {};
function updateAlbSel() { albSelN.textContent = Object.keys(albSel).filter(k => albSel[k]).length; }
function buildAlbum() {
  albGrid.innerHTML = '';
  const items = ALBUM.slice().sort((a, b) => b.at - a.at);   // 最新完成在前
  albEmpty.style.display = items.length ? 'none' : 'block';
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'albCard' + (albSel[item.id] ? ' sel' : '');
    card.dataset.id = item.id;
    const cv = document.createElement('canvas');
    drawSavedThumb(cv, item.thumb, 150);
    card.appendChild(cv);
    const chk = document.createElement('span'); chk.className = 'chk';
    chk.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-10"/></svg>';
    card.appendChild(chk);
    card.addEventListener('click', () => {
      if (!albumEl.classList.contains('editing')) { openLightbox(item.thumb); return; }   // 非編輯：點開放大檢視
      albSel[item.id] = !albSel[item.id];
      card.classList.toggle('sel', !!albSel[item.id]);
      updateAlbSel();
    });
    albGrid.appendChild(card);
  });
}
function openAlbum() {
  albumEl.classList.remove('editing'); albEditBtn.textContent = '編輯'; albSel = {};
  buildAlbum();
  gallery.classList.remove('show'); albumEl.classList.add('show');
}
document.getElementById('albumBtn').addEventListener('click', openAlbum);
document.getElementById('albBack').addEventListener('click', () => {
  albumEl.classList.remove('show'); gallery.classList.add('show');
});
albEditBtn.addEventListener('click', () => {
  const on = !albumEl.classList.contains('editing');
  albumEl.classList.toggle('editing', on);
  albEditBtn.textContent = on ? '完成' : '編輯';
  albSel = {}; buildAlbum(); updateAlbSel();
});
document.getElementById('albDel').addEventListener('click', () => {
  const ids = Object.keys(albSel).filter(k => albSel[k]);
  if (!ids.length) return;
  if (!confirm('刪除所選的 ' + ids.length + ' 張作品嗎？此動作無法復原。')) return;
  ALBUM = ALBUM.filter(x => !albSel[x.id]); saveAlbum();
  albSel = {}; buildAlbum(); updateAlbSel();
});

// 重製這一幅（遊玩中）— 清掉目前的沙、重新開始填同一幅
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!currentKey) return;
  if (layers && layers.covered() > 0 && !won && !confirm('重新開始這一幅嗎？目前填的沙會清掉。')) return;
  startPattern(currentKey);
  openPanel(false);
});

// 開始一個圖案
function startPattern(key) {
  Sound.init(); Sound.slideOff();   // 切換圖案時重置滑沙聲
  sessionEntryId = null;            // 新的一場：完成時會存成新一筆收藏（再玩可重複收藏）
  currentKey = key;
  layers = new LayerManager(PATTERNS[key]);
  armedRegion = 0;                  // 換圖案時清掉待撕標記
  particles.clear();
  stuckCtx.clearRect(0, 0, W, H);
  mainCtx.clearRect(0, 0, W, H);
  drawBoard();
  won = false;
  winBanner.classList.remove('show');
  gallery.classList.remove('show');
  focusEl.classList.remove('show');
  appEl.classList.remove('picking');
  document.getElementById('progressBar').style.width = '0%';
}

// 回到畫廊
function showPicker() {
  Sound.slideOff();
  // 離開一幅已完成的作品時，用「當下更滿的版本」更新本場那一筆收藏（同場不另存新筆）
  if (won && currentKey && sessionEntryId) {
    const e = ALBUM.find(x => x.id === sessionEntryId);
    if (e) { e.thumb = captureSnapshot(); saveAlbum(); }
  }
  focusEl.classList.remove('show');
  gallery.classList.add('show');
  winBanner.classList.remove('show');
  appEl.classList.add('picking');
}

// 完成揭曉：微光掃過一次 + 襯線小字，三秒后淡出
let _revealT = null;
function playReveal() {
  if (winShimmer) { winShimmer.classList.remove('play'); void winShimmer.offsetWidth; winShimmer.classList.add('play'); }
  winBanner.classList.add('show');
  clearTimeout(_revealT);
  _revealT = setTimeout(() => winBanner.classList.remove('show'), 3600);
}

// 主迴圈
const progressBar = document.getElementById('progressBar');
function loop() {
  const g = input.gravity();
  particles.step(g.x, g.y, layers, stuckCtx);
  // 滑沙聲（顆粒合成）：依「實際移動的沙量」灑沙粒；回畫廊（picking）時不發聲
  if (layers && !appEl.classList.contains('picking')) {
    let act = 0;
    for (const p of particles.list) { const sp = Math.abs(p.vx) + Math.abs(p.vy); if (sp > REST_SPEED) act += sp; }
    Sound.slideTick(act);
  } else {
    Sound.slideOff();
  }
  mainCtx.clearRect(0, 0, W, H);
  particles.draw(mainCtx);
  // 落沙點標記：只在切換後短暫閃現（約 1.2 秒淡出），提示下一杓從哪出
  if (pourMarkT) {
    const el = performance.now() - pourMarkT, dur = 1200;
    if (el >= dur) pourMarkT = 0;
    else {
      const a = 1 - el / dur, [mx, my] = POUR_POS[pourKey] || POUR_POS.center;
      const ac = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#A9744F';
      mainCtx.save();
      mainCtx.globalAlpha = a * 0.85; mainCtx.strokeStyle = ac; mainCtx.fillStyle = ac; mainCtx.lineWidth = 2.5;
      mainCtx.beginPath(); mainCtx.arc(mx, my, 16, 0, 7); mainCtx.stroke();
      mainCtx.beginPath(); mainCtx.arc(mx, my, 3.5, 0, 7); mainCtx.fill();
      mainCtx.restore();
    }
  }
  if (layers) {
    const r = layers.ratio();
    progressBar.style.width = (r * 100).toFixed(0) + '%';
    if (!won && layers.allPeeled() && r >= WIN_RATIO) {
      won = true;
      if (currentKey) { sessionEntryId = genId(); ALBUM.push({ id: sessionEntryId, key: currentKey, thumb: captureSnapshot(), at: Date.now() }); saveAlbum(); }
      Sound.ding();   // 完成音；滑沙聲交給主迴圈依沙動續播，不強制切斷
      playReveal();
    }
  }
  requestAnimationFrame(loop);
}
loop();

// 控制鈕
document.getElementById('dumpBtn').addEventListener('click', () => { particles.clear(); Sound.slideOff(); });
// 「撕下」鈕：撕掉目前選中（變黃）的那塊貼紙——手機上比雙擊精準好按
document.getElementById('peelBtn').addEventListener('click', () => {
  if (armedRegion && layers && !layers.peeled.has(armedRegion)) {
    layers.peel(armedRegion); armedRegion = 0; drawBoard();
  }
});
// 功能按鈕圖示（inline SVG，吃 currentColor 跟主題／accent 走）：切換態用
const ICON = {
  vol:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5a.8.8 0 0 1 1.5.5v14a.8.8 0 0 1-1.5.5L6 15"/><path d="M15 8a5 5 0 0 1 0 8"/><path d="M17.7 5a9 9 0 0 1 0 14"/></svg>',
  volOff: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5a.8.8 0 0 1 1.5.5v14a.8.8 0 0 1-1.5.5L6 15"/><path d="M16 9l5 6M21 9l-5 6"/></svg>',
  sun:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v1M12 20v1M3 12h1M20 12h1M5.6 5.6l.7.7M17.7 17.7l.7.7M5.6 18.4l.7-.7M17.7 6.3l.7-.7"/></svg>',
  moon:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13a8 8 0 1 1-9-9 6 6 0 0 0 9 9Z"/></svg>',
  phone:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2.5" width="10" height="19" rx="2.3"/><line x1="11" y1="18.5" x2="13" y2="18.5"/></svg>',
  tablet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.2"/><line x1="17.4" y1="12" x2="17.5" y2="12"/></svg>',
};
(() => {
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', () => {
    const m = Sound.toggle();
    muteBtn.innerHTML = m ? ICON.volOff : ICON.vol;
  });
})();

// Service Worker 註冊 + 更新按鈕
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
document.getElementById('updateBtn').addEventListener('click', async () => {
  const btn = document.getElementById('updateBtn');
  btn.classList.add('spin');
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) await r.unregister();
    const keys = await caches.keys();
    for (const k of keys) await caches.delete(k);
  } catch(e) {}
  location.reload(true);
});
document.getElementById('changeBtn').addEventListener('click', () => {
  // 已完成（已存起來）或沒進度 → 直接換；有未存的進度才確認
  if (layers && layers.covered() > 0 && !won && !confirm('要換圖案嗎？目前的作品會清掉。')) return;
  showPicker();
});
// （傾斜權限改在「開始這一幅」按鈕觸發時請求）

// 主題切換（深灰沉穩 ↔ 淨白簡約）— 影響 CSS 與盤面/托盤質感，不動沙作品
function applyTheme(key) {
  _grainCache.clear(); _spriteCache.clear();
  themeKey = key; TH = THEMES[key];
  document.documentElement.classList.toggle('light', key === 'light');
  const tg = document.getElementById('themeBtnG'); if (tg) tg.innerHTML = key === 'light' ? ICON.moon : ICON.sun;
  const tp = document.getElementById('themeBtnP'); if (tp) tp.innerHTML = key === 'light' ? ICON.moon : ICON.sun;
  document.querySelectorAll('#panelTheme .segBtn').forEach(b => b.classList.toggle('sel', b.dataset.theme === key));
  drawTray();
  drawBoard();
  if (typeof buildGrid === 'function') buildGrid();
}
document.getElementById('themeBtnG').addEventListener('click', () => applyTheme(themeKey === 'dark' ? 'light' : 'dark'));
document.getElementById('themeBtnP').addEventListener('click', () => applyTheme(themeKey === 'dark' ? 'light' : 'dark'));
applyTheme('dark');   // 初始：繪製托盤底色、設定圖示

// iOS Safari fallback: aspect-ratio on block may still fail on older versions
// （必須在 applyLayout 首次呼叫前宣告，否則 fitBoard 會讀到 TDZ、開機 IIFE 中斷）
const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// 介面尺寸切換（平板 ⇄ 手機）— 使用者手動切，存 localStorage 記住；平板版面為預設（無 .phone class）
const LAYOUT_KEY = 'sandplay.layout';
const layoutBtn = document.getElementById('layoutBtn');
function applyLayout(mode) {
  const phone = mode === 'phone';
  document.body.classList.toggle('phone', phone);
  if (layoutBtn) layoutBtn.innerHTML = phone ? ICON.tablet : ICON.phone;   // 顯示「切回去」的目標圖示
  fitBoard(); drawBoard();   // 沙盤尺寸變了 → 重新貼合並重繪
}
if (layoutBtn) layoutBtn.addEventListener('click', () => {
  const next = document.body.classList.contains('phone') ? 'tablet' : 'phone';
  try { localStorage.setItem(LAYOUT_KEY, next); } catch (e) {}
  applyLayout(next);
});
applyLayout((() => { try { return localStorage.getItem(LAYOUT_KEY) === 'phone' ? 'phone' : 'tablet'; } catch (e) { return 'tablet'; } })());

// 徹底防縮放（雙擊放大 + 雙指縮放）— 避免進入縮放狀態打斷 AudioContext
let _lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - _lastTap < 350) e.preventDefault();   // 雙擊放大多在 touchend 觸發，攔這裡才有效
  _lastTap = now;
}, { passive: false });
// iOS Safari 的雙指縮放手勢
['gesturestart', 'gesturechange', 'gestureend'].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault(), { passive: false }));
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });

function fitBoard() {
  if (!_isIOS) return;
  const stageEl = document.getElementById('stage');
  if (!stageEl) return;
  const w = stageEl.clientWidth;
  if (!w) return;
  if (Math.abs(stageEl.clientHeight - w) > 2) stageEl.style.height = w + 'px';
}
setTimeout(fitBoard, 150);
window.addEventListener('resize', fitBoard);
window.addEventListener('orientationchange', () => setTimeout(fitBoard, 300));

})();
</script>
</body>
