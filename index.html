<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>沙畫遊戲 · Peel. Pour. Paint.</title>
<style>
  :root {
    --bg: #1a1208;
    --panel: #2a1f12;
    --gold: #e8b96b;
    --text: #f3e4cc;
    --accent: #d98a4b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: env(safe-area-inset-top, 6px) 8px env(safe-area-inset-bottom, 6px);
  }
  header { text-align: center; }
  header h1 { font-size: 19px; letter-spacing: 1px; color: var(--gold); font-weight: 600; }
  header .sub { font-size: 11px; letter-spacing: 3px; color: var(--accent); margin-top: 2px; opacity: .85; }

  #stage {
    position: relative;
    width: min(80vmin, 460px);
    height: min(80vmin, 460px);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(232,185,107,.15);
  }
  #stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  #progressWrap {
    width: min(80vmin, 460px);
    height: 10px;
    background: var(--panel);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.4);
  }
  #progressBar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width .15s ease-out;
  }

  /* 貼紙列 */
  .row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .label { font-size: 11px; color: var(--accent); opacity: .8; width: 100%; text-align: center; margin-bottom: -2px; }
  .sticker {
    font-size: 13px; color: var(--text);
    background: var(--panel); border: 1px solid rgba(232,185,107,.25);
    padding: 7px 12px; border-radius: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: transform .08s, opacity .15s;
  }
  .sticker:active { transform: scale(.94); }
  .sticker .dot { width: 12px; height: 12px; border-radius: 50%; }
  .sticker.placed { opacity: .45; }
  .sticker.placed::after { content: '✓'; color: var(--gold); font-size: 12px; }

  /* 顏色盤 */
  .swatch {
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent; transition: transform .08s;
  }
  .swatch:active { transform: scale(.9); }
  .swatch.sel { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,185,107,.4); }

  button {
    font-family: inherit; font-size: 13px;
    color: var(--text); background: var(--panel);
    border: 1px solid rgba(232,185,107,.25);
    padding: 8px 14px; border-radius: 11px;
    cursor: pointer; transition: transform .08s, background .15s;
  }
  button:active { transform: scale(.95); }
  button.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .hint { font-size: 11px; color: var(--accent); opacity: .85; min-height: 15px; text-align: center; }

  #win {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: rgba(26,18,8,.82); backdrop-filter: blur(4px);
    z-index: 5; text-align: center;
  }
  #win.show { display: flex; }
  #win .big { font-size: 30px; color: var(--gold); }
  #win .small { font-size: 14px; color: var(--text); opacity: .85; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>沙畫遊戲</h1>
    <div class="sub">PEEL · POUR · PAINT</div>
  </header>

  <div id="stage">
    <canvas id="bg"></canvas>
    <canvas id="sticker"></canvas>
    <canvas id="stuck"></canvas>
    <canvas id="main"></canvas>
    <div id="win">
      <div class="big">✨ 完成！</div>
      <div class="small">圖案顯現了</div>
      <button class="primary" id="nextBtn">再玩一次</button>
    </div>
  </div>

  <div id="progressWrap"><div id="progressBar"></div></div>

  <div class="row" id="stickerRow"><div class="label">① 撕貼紙（選一層貼上）</div></div>
  <div class="row" id="colorRow"><div class="label">② 點顏色 → 在中央倒一堆沙</div></div>

  <div class="row">
    <button id="dumpBtn">倒掉散沙</button>
    <button id="tiltBtn">啟用傾斜</button>
    <button id="resetBtn">重來</button>
  </div>
  <div class="hint" id="hint">③ 傾斜 iPad 讓沙滑過膠水黏住 · 填好按「倒掉散沙」換下一色</div>
</div>

<script>
"use strict";
(() => {

// ─────────────────────────────────────────────────────────────
// 設定
// ─────────────────────────────────────────────────────────────
const W = 480, H = 480;          // 內部邏輯解析度
const MAX_PARTICLES = 520;       // 盤上散沙上限（少而胖）
const SCOOP_AMOUNT = 210;        // 點一次顏色倒下的沙量
const STICK_CHANCE = 0.16;       // 黏附機率（沙滑過膠水時黏住的機率）
const ACCEL = 0.85;              // 重力加速係數（大一點＝有重量感）
const DAMP = 0.84;               // 速度阻尼（低一點＝不飄、會停下堆積）
const MAX_SPEED = 6.5;           // 最大速度
const WIN_RATIO = 0.85;          // 過關門檻（已貼圖層的填滿比）
const BG_COLOR = '#e9dcc2';      // 淺暖米色盤底

// 深色開頭，淺底上才看得清；對應蘋果各部位
const SAND_COLORS = ['#262626', '#d23b3b', '#4caf50', '#7a4a22', '#e7c08a', '#e0c84a', '#5aa9e6'];

// ─────────────────────────────────────────────────────────────
// 圖層定義：蘋果。path() 只畫幾何，描邊/填色由呼叫端決定
// ─────────────────────────────────────────────────────────────
const LAYERS = [
  { id:'body',  label:'果身', color:'#d23b3b', mode:'fill', path(c){
      c.beginPath(); c.ellipse(195, 270, 110, 130, 0, 0, 7); c.fill();
      c.beginPath(); c.ellipse(285, 270, 110, 130, 0, 0, 7); c.fill();
      c.beginPath(); c.ellipse(240, 250, 130, 120, 0, 0, 7); c.fill();
  }},
  { id:'leaf',  label:'葉', color:'#4caf50', mode:'fill', path(c){
      c.save(); c.translate(300, 135); c.rotate(-0.5);
      c.beginPath(); c.ellipse(0, 0, 46, 22, 0, 0, 7); c.fill(); c.restore();
  }},
  { id:'stem',  label:'梗', color:'#7a4a22', mode:'stroke', lw:12, path(c){
      c.lineCap='round'; c.beginPath();
      c.moveTo(242, 150); c.quadraticCurveTo(250, 110, 268, 100); c.stroke();
  }},
  { id:'shine', label:'亮面', color:'#ffd9d9', mode:'fill', path(c){
      c.save(); c.translate(180, 220); c.rotate(-0.4);
      c.beginPath(); c.ellipse(0, 0, 26, 46, 0, 0, 7); c.fill(); c.restore();
  }},
  { id:'outline', label:'外框', color:'#3a1010', mode:'stroke', lw:7, path(c){
      c.beginPath(); c.ellipse(195, 270, 110, 130, 0, 0, 7); c.stroke();
      c.beginPath(); c.ellipse(285, 270, 110, 130, 0, 0, 7); c.stroke();
  }},
];

// 用指定顏色（含透明度）把一層畫到 ctx
function renderLayer(ctx, layer, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha == null ? 1 : alpha;
  ctx.fillStyle = color; ctx.strokeStyle = color;
  if (layer.mode === 'stroke') ctx.lineWidth = layer.lw;
  layer.path(ctx);
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────
// LayerManager：遮罩、貼紙狀態、進度
// ─────────────────────────────────────────────────────────────
class LayerManager {
  constructor() {
    this.layerId = new Uint8Array(W * H);    // 0 = 無，1..n
    this.filled  = new Uint8Array(W * H);     // 已被沙覆蓋
    this.placed  = new Set();                 // 已貼上的圖層 id (1..n)
    this.pxCount = [0];                        // 每層遮罩像素數
    this._build();
  }
  _build() {
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const oc = off.getContext('2d');
    LAYERS.forEach((layer, i) => {
      const lid = i + 1;
      oc.clearRect(0, 0, W, H);
      renderLayer(oc, layer, '#fff', 1);
      const data = oc.getImageData(0, 0, W, H).data;
      let cnt = 0;
      for (let p = 0; p < W * H; p++) {
        if (data[p * 4 + 3] > 30) { this.layerId[p] = lid; }  // 後層覆蓋前層
      }
      // 重新統計（覆蓋後）稍後做
      this.pxCount[lid] = 0;
    });
    for (let p = 0; p < W * H; p++) {
      const lid = this.layerId[p];
      if (lid) this.pxCount[lid]++;
    }
  }
  place(lid) { this.placed.add(lid); }
  total() { let t = 0; this.placed.forEach(lid => t += this.pxCount[lid]); return t; }
  covered() {
    let c = 0;
    for (let p = 0; p < W * H; p++) if (this.filled[p] && this.placed.has(this.layerId[p])) c++;
    return c;
  }
  ratio() { const t = this.total(); return t ? this.covered() / t : 0; }
  allPlaced() { return this.placed.size === LAYERS.length; }
  // 是否落在「已貼且未填」的遮罩
  maskAt(x, y) {
    if (x < 0 || y < 0 || x >= W || y >= H) return 0;
    const p = (y | 0) * W + (x | 0);
    const lid = this.layerId[p];
    return (lid && this.placed.has(lid) && !this.filled[p]) ? lid : 0;
  }
  stamp(x, y, r) {
    const x0 = Math.max(0, x - r | 0), x1 = Math.min(W - 1, x + r | 0);
    const y0 = Math.max(0, y - r | 0), y1 = Math.min(H - 1, y + r | 0);
    const r2 = r * r;
    for (let yy = y0; yy <= y1; yy++)
      for (let xx = x0; xx <= x1; xx++) {
        const dx = xx - x, dy = yy - y;
        if (dx * dx + dy * dy > r2) continue;
        const p = yy * W + xx;
        if (this.layerId[p] && this.placed.has(this.layerId[p]) && !this.filled[p]) this.filled[p] = 1;
      }
  }
  reset() { this.filled.fill(0); this.placed.clear(); }
}

// ─────────────────────────────────────────────────────────────
// ParticleSystem
// ─────────────────────────────────────────────────────────────
class ParticleSystem {
  constructor() { this.list = []; }
  // 在畫面正中央倒一堆散沙
  scoop(color, n) {
    for (let i = 0; i < n && this.list.length < MAX_PARTICLES; i++) {
      const a = Math.random() * 7, rr = Math.random() * 46;
      this.list.push({
        x: W / 2 + Math.cos(a) * rr,
        y: H / 2 + Math.sin(a) * rr,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: 3 + Math.random() * 2,            // 3~5px 胖沙粒
        c: color,
      });
    }
  }
  step(gx, gy, layers, stuckCtx) {
    const ax = gx * ACCEL, ay = gy * ACCEL;
    const keep = [];
    for (const s of this.list) {
      s.vx = (s.vx + ax) * DAMP;
      s.vy = (s.vy + ay) * DAMP;
      const sp = Math.hypot(s.vx, s.vy);
      if (sp > MAX_SPEED) { s.vx = s.vx / sp * MAX_SPEED; s.vy = s.vy / sp * MAX_SPEED; }
      s.x += s.vx; s.y += s.vy;
      // 撞到邊緣就停住、堆積（不環繞），像真的沙堆在牆角
      if (s.x < s.r) { s.x = s.r; s.vx = 0; }
      else if (s.x > W - s.r) { s.x = W - s.r; s.vx = 0; }
      if (s.y < s.r) { s.y = s.r; s.vy = 0; }
      else if (s.y > H - s.r) { s.y = H - s.r; s.vy = 0; }
      if (layers.maskAt(s.x, s.y) && Math.random() < STICK_CHANCE) {
        layers.stamp(s.x, s.y, s.r);
        stuckCtx.fillStyle = s.c;
        stuckCtx.beginPath(); stuckCtx.arc(s.x, s.y, s.r, 0, 7); stuckCtx.fill();
      } else keep.push(s);
    }
    this.list = keep;
  }
  draw(ctx) {
    for (const s of this.list) {
      ctx.fillStyle = s.c;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
    }
  }
  clear() { this.list = []; }
}

// ─────────────────────────────────────────────────────────────
// InputManager：傾斜 + 預設向下 + 方向鍵
// ─────────────────────────────────────────────────────────────
class InputManager {
  constructor() {
    this.gx = 0; this.gy = 1; this.tilt = false;
    this._keys = { x: 0, y: 0 };
    window.addEventListener('keydown', e => this._key(e, 1));
    window.addEventListener('keyup', e => this._key(e, 0));
  }
  _key(e, v) {
    if (e.key === 'ArrowLeft') this._keys.x = -v;
    else if (e.key === 'ArrowRight') this._keys.x = v;
    else if (e.key === 'ArrowUp') this._keys.y = -v;
    else if (e.key === 'ArrowDown') this._keys.y = v;
    else return;
    e.preventDefault();
  }
  gravity() {
    if (this.tilt) return { x: this.gx, y: this.gy };
    if (this._keys.x || this._keys.y) return { x: this._keys.x, y: this._keys.y || 0.2 };
    return { x: 0, y: 1 };
  }
  async enableTilt() {
    const handler = (e) => {
      const g = e.gamma || 0, b = e.beta || 0;
      this.gx = Math.max(-1, Math.min(1, g / 35));
      this.gy = Math.max(-1, Math.min(1, (b - 35) / 35));
      this.tilt = true;
    };
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') { window.addEventListener('deviceorientation', handler); return true; }
        return false;
      } catch { return false; }
    } else if (typeof DeviceOrientationEvent !== 'undefined') {
      window.addEventListener('deviceorientation', handler); return true;
    }
    return false;
  }
}

// ─────────────────────────────────────────────────────────────
// 組裝
// ─────────────────────────────────────────────────────────────
const stage = document.getElementById('stage');
const bg = document.getElementById('bg');
const stickerCv = document.getElementById('sticker');
const stuck = document.getElementById('stuck');
const main = document.getElementById('main');
[bg, stickerCv, stuck, main].forEach(c => { c.width = W; c.height = H; });
const bgCtx = bg.getContext('2d');
const stickerCtx = stickerCv.getContext('2d');
const stuckCtx = stuck.getContext('2d');
const mainCtx = main.getContext('2d');

const layers = new LayerManager();
const particles = new ParticleSystem();
const input = new InputManager();

bgCtx.fillStyle = BG_COLOR;
bgCtx.fillRect(0, 0, W, H);

// 重畫已貼貼紙（淡色填 + 描邊輪廓，像撕下的貼紙）
function redrawStickers() {
  stickerCtx.clearRect(0, 0, W, H);
  LAYERS.forEach((layer, i) => {
    if (!layers.placed.has(i + 1)) return;
    renderLayer(stickerCtx, layer, layer.color, 0.3);           // 膠水區的填色提示
    // 外圈描邊
    stickerCtx.save();
    stickerCtx.globalAlpha = 0.85;
    stickerCtx.strokeStyle = layer.color;
    stickerCtx.lineWidth = layer.mode === 'stroke' ? layer.lw : 2.5;
    stickerCtx.setLineDash(layer.mode === 'stroke' ? [] : [6, 5]);
    layer.path(stickerCtx);
    stickerCtx.restore();
  });
}

// 沙色
let selectedColor = SAND_COLORS[0];

// 貼紙列 UI
const stickerRow = document.getElementById('stickerRow');
LAYERS.forEach((layer, i) => {
  const b = document.createElement('div');
  b.className = 'sticker';
  b.innerHTML = `<span class="dot" style="background:${layer.color}"></span>${layer.label}`;
  b.addEventListener('click', () => {
    layers.place(i + 1);
    b.classList.add('placed');
    redrawStickers();
  });
  stickerRow.appendChild(b);
});

// 顏色盤 UI
const colorRow = document.getElementById('colorRow');
SAND_COLORS.forEach((col, i) => {
  const s = document.createElement('div');
  s.className = 'swatch' + (i === 0 ? ' sel' : '');
  s.style.background = col;
  s.addEventListener('click', () => {
    selectedColor = col;
    colorRow.querySelectorAll('.swatch').forEach(el => el.classList.remove('sel'));
    s.classList.add('sel');
    particles.scoop(col, SCOOP_AMOUNT);   // 點顏色＝選色＋在中央倒一堆沙
  });
  colorRow.appendChild(s);
});

const progressBar = document.getElementById('progressBar');
const winEl = document.getElementById('win');
const hint = document.getElementById('hint');
let won = false;

function loop() {
  const g = input.gravity();
  particles.step(g.x, g.y, layers, stuckCtx);

  mainCtx.clearRect(0, 0, W, H);
  particles.draw(mainCtx);

  const r = layers.ratio();
  progressBar.style.width = (r * 100).toFixed(0) + '%';
  if (!won && layers.allPlaced() && r >= WIN_RATIO) {
    won = true; winEl.classList.add('show');
  }
  requestAnimationFrame(loop);
}
loop();

// 控制鈕
document.getElementById('dumpBtn').addEventListener('click', () => {
  particles.clear();   // 清掉盤上的散沙（已黏住的不受影響）
});
document.getElementById('tiltBtn').addEventListener('click', async (e) => {
  const ok = await input.enableTilt();
  hint.textContent = ok ? '傾斜已啟用 · 按住畫面倒沙' : '此裝置不支援傾斜，改用預設向下重力';
  if (ok) e.target.textContent = '傾斜中';
});
function resetGame() {
  layers.reset();
  particles.clear();
  stuckCtx.clearRect(0, 0, W, H);
  redrawStickers();
  won = false;
  winEl.classList.remove('show');
  progressBar.style.width = '0%';
  document.querySelectorAll('.sticker').forEach(el => el.classList.remove('placed'));
}
document.getElementById('resetBtn').addEventListener('click', resetGame);
document.getElementById('nextBtn').addEventListener('click', resetGame);

})();
</script>
</body>
</html>
