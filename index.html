<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>沙畫遊戲 · Peel. Pour. Paint.</title>
<style>
  :root {
    --bg: #1a1208;
    --panel: #2a1f12;
    --gold: #e8b96b;
    --text: #f3e4cc;
    --accent: #d98a4b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: env(safe-area-inset-top, 8px) 8px env(safe-area-inset-bottom, 8px);
  }
  header { text-align: center; }
  header h1 { font-size: 20px; letter-spacing: 1px; color: var(--gold); font-weight: 600; }
  header .sub { font-size: 12px; letter-spacing: 3px; color: var(--accent); margin-top: 2px; opacity: .85; }

  #stage {
    position: relative;
    width: min(86vmin, 480px);
    height: min(86vmin, 480px);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(232,185,107,.15);
  }
  #stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  #progressWrap {
    width: min(86vmin, 480px);
    height: 12px;
    background: var(--panel);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.4);
  }
  #progressBar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width .15s ease-out;
  }

  #controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  button {
    font-family: inherit; font-size: 14px;
    color: var(--text); background: var(--panel);
    border: 1px solid rgba(232,185,107,.25);
    padding: 9px 16px; border-radius: 12px;
    cursor: pointer; transition: transform .08s, background .15s;
  }
  button:active { transform: scale(.95); }
  button.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .hint { font-size: 12px; color: var(--accent); opacity: .8; min-height: 16px; text-align: center; }

  #win {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: rgba(26,18,8,.82); backdrop-filter: blur(4px);
    z-index: 5; text-align: center;
  }
  #win.show { display: flex; }
  #win .big { font-size: 30px; color: var(--gold); }
  #win .small { font-size: 14px; color: var(--text); opacity: .85; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>沙畫遊戲</h1>
    <div class="sub">PEEL · POUR · PAINT</div>
  </header>

  <div id="stage">
    <canvas id="bg"></canvas>
    <canvas id="stuck"></canvas>
    <canvas id="main"></canvas>
    <div id="win">
      <div class="big">✨ 完成！</div>
      <div class="small">圖案顯現了</div>
      <button class="primary" id="nextBtn">再玩一次</button>
    </div>
  </div>

  <div id="progressWrap"><div id="progressBar"></div></div>

  <div id="controls">
    <button class="primary" id="tiltBtn">啟用傾斜</button>
    <button id="resetBtn">清空重來</button>
  </div>
  <div class="hint" id="hint">點畫面倒沙 · 傾斜 iPad 把沙導進圖案</div>
</div>

<script>
"use strict";
(() => {

// ─────────────────────────────────────────────────────────────
// 設定
// ─────────────────────────────────────────────────────────────
const W = 480, H = 480;          // 內部邏輯解析度
const MAX_PARTICLES = 300;       // 同時移動的沙粒上限（少而胖）
const POUR_PER_TAP = 36;         // 每次點擊倒下的沙量
const STICK_CHANCE = 0.14;       // 黏附機率
const ACCEL = 0.35;              // 重力加速係數
const DAMP = 0.97;               // 速度阻尼
const MAX_SPEED = 3.2;           // 最大速度
const WIN_RATIO = 0.85;          // 過關門檻

// ─────────────────────────────────────────────────────────────
// 圖層定義：蘋果（body → leaf → stem → shine → outline）
// 每層一個繪製函式，畫到 offscreen 後讀 alpha 建立遮罩
// ─────────────────────────────────────────────────────────────
const LAYERS = [
  { id: 'body',  color: '#d23b3b', draw(c){
      c.fillStyle = '#fff';
      // 左半與右半兩瓣，組成蘋果飽滿輪廓
      c.beginPath(); c.ellipse(195, 270, 110, 130, 0, 0, 7); c.fill();
      c.beginPath(); c.ellipse(285, 270, 110, 130, 0, 0, 7); c.fill();
      c.beginPath(); c.ellipse(240, 250, 130, 120, 0, 0, 7); c.fill();
  }},
  { id: 'leaf',  color: '#4caf50', draw(c){
      c.fillStyle = '#fff'; c.save();
      c.translate(300, 135); c.rotate(-0.5);
      c.beginPath(); c.ellipse(0, 0, 46, 22, 0, 0, 7); c.fill();
      c.restore();
  }},
  { id: 'stem',  color: '#7a4a22', draw(c){
      c.strokeStyle = '#fff'; c.lineWidth = 12; c.lineCap = 'round';
      c.beginPath(); c.moveTo(242, 150); c.quadraticCurveTo(250, 110, 268, 100); c.stroke();
  }},
  { id: 'shine', color: '#ffd9d9', draw(c){
      c.fillStyle = '#fff'; c.save();
      c.translate(180, 220); c.rotate(-0.4);
      c.beginPath(); c.ellipse(0, 0, 26, 46, 0, 0, 7); c.fill();
      c.restore();
  }},
  { id: 'outline', color: '#3a1010', draw(c){
      c.strokeStyle = '#fff'; c.lineWidth = 7;
      c.beginPath(); c.ellipse(195, 270, 110, 130, 0, 0, 7); c.stroke();
      c.beginPath(); c.ellipse(285, 270, 110, 130, 0, 0, 7); c.stroke();
  }},
];

// ─────────────────────────────────────────────────────────────
// LayerManager：建立每層遮罩、合併成 layerId map、計算進度
// ─────────────────────────────────────────────────────────────
class LayerManager {
  constructor() {
    this.layerId = new Uint8Array(W * H);   // 0 = 無，1..n = 該層
    this.filled  = new Uint8Array(W * H);   // 是否已被沙覆蓋
    this.colors  = ['', ...LAYERS.map(l => l.color)];
    this.total = 0;
    this.covered = 0;
    this.guide = document.createElement('canvas');
    this.guide.width = W; this.guide.height = H;
    this._build();
  }
  _build() {
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const oc = off.getContext('2d');
    const gc = this.guide.getContext('2d');

    LAYERS.forEach((layer, i) => {
      const lid = i + 1;
      oc.clearRect(0, 0, W, H);
      layer.draw(oc);
      const data = oc.getImageData(0, 0, W, H).data;
      for (let p = 0; p < W * H; p++) {
        if (data[p * 4 + 3] > 30) this.layerId[p] = lid; // 後層覆蓋前層
      }
      // 淡淡的引導圖
      gc.globalAlpha = 0.16; gc.fillStyle = layer.color;
      gc.save(); layer.draw(gc); gc.restore();
    });
    gc.globalAlpha = 1;

    for (let p = 0; p < W * H; p++) if (this.layerId[p]) this.total++;
  }
  // 在 (x,y) 蓋一個半徑 r 的圓，回傳是否真的覆蓋到新的遮罩像素
  stamp(x, y, r) {
    let hit = false, lid = 0;
    const x0 = Math.max(0, x - r | 0), x1 = Math.min(W - 1, x + r | 0);
    const y0 = Math.max(0, y - r | 0), y1 = Math.min(H - 1, y + r | 0);
    const r2 = r * r;
    for (let yy = y0; yy <= y1; yy++) {
      for (let xx = x0; xx <= x1; xx++) {
        const dx = xx - x, dy = yy - y;
        if (dx * dx + dy * dy > r2) continue;
        const p = yy * W + xx;
        if (this.layerId[p] && !this.filled[p]) {
          this.filled[p] = 1; this.covered++; hit = true; lid = this.layerId[p];
        } else if (this.layerId[p]) { lid = lid || this.layerId[p]; }
      }
    }
    return { hit, color: this.colors[lid] || '#caa06a' };
  }
  // 某點是否落在尚未填滿的遮罩上（用於黏附判定）
  maskAt(x, y) {
    if (x < 0 || y < 0 || x >= W || y >= H) return 0;
    const p = (y | 0) * W + (x | 0);
    return this.filled[p] ? 0 : this.layerId[p];
  }
  ratio() { return this.total ? this.covered / this.total : 0; }
  reset() { this.filled.fill(0); this.covered = 0; }
}

// ─────────────────────────────────────────────────────────────
// ParticleSystem：移動中的沙粒（黏住的沙直接畫到 stuck canvas）
// ─────────────────────────────────────────────────────────────
class ParticleSystem {
  constructor() { this.list = []; }
  pour(x, y, n) {
    for (let i = 0; i < n && this.list.length < MAX_PARTICLES; i++) {
      this.list.push({
        x: x + (Math.random() - 0.5) * 24,
        y: y + (Math.random() - 0.5) * 24,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        r: 3 + Math.random() * 2,            // 3~5px 胖沙粒
        c: SAND_COLORS[(Math.random() * SAND_COLORS.length) | 0],
      });
    }
  }
  step(gx, gy, layers, stuckCtx) {
    const ax = gx * ACCEL, ay = gy * ACCEL;
    const keep = [];
    for (const s of this.list) {
      s.vx = (s.vx + ax) * DAMP;
      s.vy = (s.vy + ay) * DAMP;
      const sp = Math.hypot(s.vx, s.vy);
      if (sp > MAX_SPEED) { s.vx = s.vx / sp * MAX_SPEED; s.vy = s.vy / sp * MAX_SPEED; }
      s.x += s.vx; s.y += s.vy;
      // 邊界環繞
      if (s.x < 0) s.x += W; else if (s.x >= W) s.x -= W;
      if (s.y < 0) s.y += H; else if (s.y >= H) s.y -= H;
      // 黏附判定
      if (layers.maskAt(s.x, s.y) && Math.random() < STICK_CHANCE) {
        const res = layers.stamp(s.x, s.y, s.r);
        stuckCtx.fillStyle = res.hit ? res.color : s.c;
        stuckCtx.beginPath(); stuckCtx.arc(s.x, s.y, s.r, 0, 7); stuckCtx.fill();
      } else {
        keep.push(s);
      }
    }
    this.list = keep;
  }
  draw(ctx) {
    for (const s of this.list) {
      ctx.fillStyle = s.c;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
    }
  }
  clear() { this.list = []; }
}
const SAND_COLORS = ['#e7c08a', '#dcae72', '#e9cd9c', '#d49a5c'];

// ─────────────────────────────────────────────────────────────
// InputManager：傾斜（iPad）+ 預設向下重力 + 桌面方向鍵 + 點擊倒沙
// ─────────────────────────────────────────────────────────────
class InputManager {
  constructor(onPour) {
    this.gx = 0; this.gy = 1;          // 預設往下
    this.tilt = false;
    this.onPour = onPour;
    this._keys = { x: 0, y: 0 };
    window.addEventListener('keydown', e => this._key(e, 1));
    window.addEventListener('keyup', e => this._key(e, 0));
  }
  _key(e, v) {
    if (e.key === 'ArrowLeft')  this._keys.x = -v;
    else if (e.key === 'ArrowRight') this._keys.x = v;
    else if (e.key === 'ArrowUp')   this._keys.y = -v;
    else if (e.key === 'ArrowDown') this._keys.y = v;
    else return;
    e.preventDefault();
  }
  gravity() {
    if (this.tilt) return { x: this.gx, y: this.gy };
    // 桌面：方向鍵覆寫，否則預設向下
    if (this._keys.x || this._keys.y) return { x: this._keys.x, y: this._keys.y || 0.2 };
    return { x: 0, y: 1 };
  }
  async enableTilt() {
    const handler = (e) => {
      const g = e.gamma || 0, b = e.beta || 0;   // gamma左右, beta前後
      this.gx = Math.max(-1, Math.min(1, g / 35));
      this.gy = Math.max(-1, Math.min(1, (b - 35) / 35)); // 約略握持角度補償
      this.tilt = true;
    };
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') { window.addEventListener('deviceorientation', handler); return true; }
        return false;
      } catch { return false; }
    } else if (typeof DeviceOrientationEvent !== 'undefined') {
      window.addEventListener('deviceorientation', handler); return true;
    }
    return false;
  }
}

// ─────────────────────────────────────────────────────────────
// 組裝與主迴圈
// ─────────────────────────────────────────────────────────────
const stage = document.getElementById('stage');
const bg = document.getElementById('bg');
const stuck = document.getElementById('stuck');
const main = document.getElementById('main');
[bg, stuck, main].forEach(c => { c.width = W; c.height = H; });
const bgCtx = bg.getContext('2d');
const stuckCtx = stuck.getContext('2d');
const mainCtx = main.getContext('2d');

const layers = new LayerManager();
const particles = new ParticleSystem();
const input = new InputManager();

function paintBg() {
  bgCtx.fillStyle = '#1a1208';
  bgCtx.fillRect(0, 0, W, H);
  bgCtx.drawImage(layers.guide, 0, 0);   // 淡淡的引導圖案
}
paintBg();

// 座標換算：螢幕 → 邏輯
function toLogical(clientX, clientY) {
  const rect = stage.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / rect.width * W,
    y: (clientY - rect.top) / rect.height * H,
  };
}
function pourAt(clientX, clientY) {
  const p = toLogical(clientX, clientY);
  particles.pour(p.x, p.y, POUR_PER_TAP);
}
main.addEventListener('pointerdown', e => { pourAt(e.clientX, e.clientY); });

const progressBar = document.getElementById('progressBar');
const winEl = document.getElementById('win');
const hint = document.getElementById('hint');
let won = false;

function loop() {
  const g = input.gravity();
  particles.step(g.x, g.y, layers, stuckCtx);

  mainCtx.clearRect(0, 0, W, H);
  particles.draw(mainCtx);

  const r = layers.ratio();
  progressBar.style.width = (r * 100).toFixed(0) + '%';
  if (!won && r >= WIN_RATIO) {
    won = true;
    winEl.classList.add('show');
  }
  requestAnimationFrame(loop);
}
loop();

// 控制鈕
document.getElementById('tiltBtn').addEventListener('click', async (e) => {
  const ok = await input.enableTilt();
  hint.textContent = ok ? '傾斜已啟用 · 點畫面倒沙' : '此裝置不支援傾斜，改用預設重力';
  if (ok) e.target.textContent = '傾斜中';
});
function resetGame() {
  layers.reset();
  particles.clear();
  stuckCtx.clearRect(0, 0, W, H);
  won = false;
  winEl.classList.remove('show');
  progressBar.style.width = '0%';
}
document.getElementById('resetBtn').addEventListener('click', resetGame);
document.getElementById('nextBtn').addEventListener('click', resetGame);

})();
</script>
</body>
</html>
